<title>Quads / Hamstrings / Glutes</title>
<style>
:root{--accent:#fb923c;--accent-rgb:251,146,60;}
.header{background:linear-gradient(135deg,#120a04,#060c16);}
.schedule{display:inline-block;background:rgba(var(--accent-rgb),0.15);border:1px solid rgba(var(--accent-rgb),0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:700;}
.tabs-bar{background:var(--body-bg);border-bottom:1px solid rgba(var(--accent-rgb),0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;border:none;cursor:pointer;font-weight:800;font-size:12px;background:transparent;color:#334155;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.04em;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.workout-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.01em;}
.workout-note{font-size:12px;color:#94a3b8;margin-bottom:16px;line-height:1.5;background:rgba(var(--accent-rgb),0.06);border-left:3px solid rgba(var(--accent-rgb),0.4);padding:10px 14px;border-radius:0 6px 6px 0;}
.section-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:900;letter-spacing:0.2em;padding:5px 14px;border-radius:6px;margin:18px 0 12px;text-transform:uppercase;color:#fff;}
.ex-sets-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ex-tempo{display:inline-block;background:rgba(255,255,255,0.05);color:#64748b;font-size:11px;font-weight:800;padding:3px 7px;border-radius:5px;font-family:monospace;border:1px solid rgba(255,255,255,0.08);}
.rest-pill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);color:#64748b;transition:all 0.15s;vertical-align:middle;}
.rest-pill:active{transform:scale(0.95);}
.rest-pill.running{background:rgba(var(--accent-rgb),0.15);border-color:rgba(var(--accent-rgb),0.35);color:var(--accent);animation:rp 1s ease-in-out infinite;}
.rest-pill.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.35);color:#34d399;}
.rest-pill.over{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.35);color:#f87171;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.65;}}
</style>

<script>

const TMR={interval:null,startTime:null,duration:0,activeEl:null,
  parseSeconds(s){if(!s||s==='—')return 0;s=s.toLowerCase().trim();const m=s.match(/(\d+)\s*min/),sec=s.match(/(\d+)\s*sec/);let t=0;if(m)t+=parseInt(m[1])*60;if(sec)t+=parseInt(sec[1]);if(!t){const p=s.match(/^(\d+)/);if(p)t=parseInt(p[1]);}return t;},
  formatTime(s){const n=s<0,a=Math.abs(s),m=Math.floor(a/60),sc=a%60;return(n?'+':'')+(m>0?m+':'+String(sc).padStart(2,'0'):sc+'s');},
  buzz(){try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);const c=new(window.AudioContext||window.webkitAudioContext)();[0,0.3,0.6].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=i===2?880:660;g.gain.setValueAtTime(0.4,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.25);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.25);});}catch(e){}},
  start(el,secs,nm){this.stop();this.duration=secs;this.startTime=Date.now();this.activeEl=el;el.className='rest-timer running';const ft=document.getElementById('timerFloat');if(ft){ft.querySelector('.timer-float-label').textContent='REST';ft.querySelector('.timer-float-ex').textContent=nm;ft.querySelector('.timer-float-time').className='timer-float-time';ft.querySelector('.timer-float-progress').style.width='100%';ft.classList.add('visible');}this.interval=setInterval(()=>{const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);if(el)el.querySelector('.rest-timer-label').textContent=this.formatTime(rem);const tt=document.querySelector('.timer-float-time'),tp=document.querySelector('.timer-float-progress'),tl=document.querySelector('.timer-float-label');if(tt)tt.textContent=this.formatTime(rem);if(rem>0){if(tp)tp.style.width=Math.round((rem/this.duration)*100)+'%';if(tt)tt.className='timer-float-time';if(tp)tp.className='timer-float-progress';if(el)el.className='rest-timer running';}else if(rem===0){this.buzz();if(tt)tt.className='timer-float-time done';if(tp){tp.className='timer-float-progress done';tp.style.width='100%';}if(tl)tl.textContent='DONE!';if(el)el.className='rest-timer done';}else{if(tt){tt.textContent='+'+this.formatTime(-rem);tt.className='timer-float-time overtime';}if(tp)tp.className='timer-float-progress overtime';if(tl)tl.textContent='OVERTIME';if(el)el.className='rest-timer overtime';}},500);},
  stop(){if(this.interval)clearInterval(this.interval);this.interval=null;if(this.activeEl){this.activeEl.querySelector('.rest-timer-label').textContent=this.activeEl.dataset.label;this.activeEl.className='rest-timer idle';this.activeEl=null;}const ft=document.getElementById('timerFloat');if(ft)ft.classList.remove('visible');},
  toggle(el,secs,nm){this.activeEl===el&&this.interval?this.stop():this.start(el,secs,nm);}
};
function buildTimerFloat(){if(document.getElementById('timerFloat'))return;const d=document.createElement('div');d.id='timerFloat';d.className='timer-float';d.innerHTML='<div class="timer-float-label">REST</div><div class="timer-float-time">0s</div><div class="timer-float-ex"></div><div class="timer-float-bar"><div class="timer-float-progress"></div></div><div class="timer-float-actions"><button class="timer-float-btn timer-float-skip" onclick="TMR.stop()">✓ Done</button><button class="timer-float-btn timer-float-reset" onclick="TMR.stop()">✕ Cancel</button></div>';document.body.appendChild(d);}
buildTimerFloat();
function makeRT(rest,nm){const s=TMR.parseSeconds(rest);if(!s)return '<span style="opacity:0.5">'+rest+'</span>';return '<span class="rest-timer idle" data-label="'+rest+'" onclick="buildTimerFloat();TMR.toggle(this,'+s+',\''+nm.substring(0,25).replace(/['"]/g,'')+'\')"><span class="rest-timer-icon">⏱️</span><span class="rest-timer-label">'+rest+'</span></span>';}
function updateProgress(){const all=document.querySelectorAll('.ex-card');const done=document.querySelectorAll('.ex-card.checked');const pct=all.length?Math.round((done.length/all.length)*100):0;const fill=document.getElementById('progFill');if(fill)fill.style.width=pct+'%';}


const WORKOUTS=[{id:'v1',label:'V1',title:'Heavy Base Day',note:'Follow the Split 3 structure: highset compound work, pyramid isolation, superset finishers.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Smith Machine Cannonball Squats',sets:'5×10',tempo:'3:0:1:0',rest:'90 sec',note:'Close stance · deep squat · heels elevated'},{name:'Leg Press (feet together, close stance)',sets:'12,10,8,8',tempo:'',rest:'90 sec',note:'Pyramid up · toes forward · quad emphasis'},{name:'Quad Extensions',sets:'4×15',tempo:'1:0:1:2',rest:'60 sec',note:'High rep · 2-second squeeze at full extension'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Barbell Squat (feet outside shoulder width)',sets:'5×5',tempo:'',rest:'2 min',note:'Wide stance · shifts emphasis to posterior chain'},{name:'Romanian Deadlift',sets:'4×10',tempo:'3:0:1:0',rest:'90 sec',note:'Bilateral · 3-second eccentric · feel the stretch'},{name:'Goblet Squat (feet pointed out, outside shoulder width)',sets:'4×12',tempo:'1:2:1:0',rest:'60 sec',note:'Heels flat · deep squat · glute emphasis'},{name:'DB Walking Lunges',sets:'3×12 each leg',tempo:'1:2:1:0',rest:'60 sec',note:'Required for leg days · torso upright'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Seated Calf Raises (toes pointed out)',sets:'4×20',tempo:'1:2:1:2',rest:'60 sec',note:'Slight outward toe targets inner calf head'}]}]},{id:'v2',label:'V2',title:'Deadlift & Hack Focus',note:'Heavy posterior chain anchor with hack squat quad variation and walking lunges.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Barbell Squat (feet inside shoulder width)',sets:'5×10',tempo:'3:0:1:0',rest:'90 sec',note:'Close stance · toes forward · quad sweep focus'},{name:'Hack Squat (low and inside shoulder width)',sets:'12,10,8,8',tempo:'4:0:1:0',rest:'90 sec',note:'Pyramid up · low foot placement'},{name:'Quad Extensions',sets:'4×12',tempo:'1:0:1:2',rest:'60 sec',note:'2-second squeeze at full extension'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Deadlifts',sets:'5×5',tempo:'',rest:'2 min',note:'Low rep heavy · reset each rep · full stop at bottom'},{name:'Leg Press (high and wide)',sets:'4×10',tempo:'2:0:1:0',rest:'90 sec',note:'High foot placement · wide stance · glute/ham emphasis'},{name:'Smith Machine Hip Thrust',sets:'4×15',tempo:'1:0:1:2',rest:'60 sec',note:'Full hip extension · 2-second squeeze at top'},{name:'DB Walking Lunges',sets:'3×12 each leg',tempo:'1:2:1:0',rest:'60 sec',note:'Required · torso upright · drive through front heel'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Smith Machine Calf Raises',sets:'4×20',tempo:'1:2:1:2',rest:'60 sec',note:'Full plantarflexion at top · deep stretch at bottom'}]}]},{id:'v3',label:'V3',title:'Drop Set Volume Day',note:'Pyramid into drop sets on key lifts. Posterior chain heavy anchor keeps intensity high.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Goblet Squat (heels elevated and together)',sets:'5×10',tempo:'3:0:1:0',rest:'90 sec',note:'Heels elevated · close stance · deep range'},{name:'Leg Press (feet together)',sets:'12,10,8 drop 8',tempo:'',rest:'90 sec',note:'Drop set final — drop weight, no rest, 8 more'},{name:'Quad Extensions',sets:'12,10,8 drop 8',tempo:'1:0:1:2',rest:'60 sec',note:'Drop set — squeeze at full extension'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Romanian Dead Lift',sets:'5×5',tempo:'',rest:'2 min',note:'Low rep heavy · bilateral · full hip hinge'},{name:'Smith Machine Hip Thrust',sets:'4×12',tempo:'1:0:1:2',rest:'60 sec',note:'Full hip extension · 2-second squeeze at top'},{name:'Goblet Squat (feet pointed out, outside shoulder width)',sets:'4×15',tempo:'1:2:1:0',rest:'60 sec',note:'Toes out · heels flat · glute focus'},{name:'DB Walking Lunges',sets:'3×12 each leg',tempo:'1:2:1:0',rest:'60 sec',note:'Required · continuous · drive through front heel'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Seated Calf Raises',sets:'12,10,8 drop 15',tempo:'1:2:1:2',rest:'60 sec',note:'Drop set finisher — drop weight, pump out 15 more'}]}]},{id:'v4',label:'V4',title:'Pause & Isometric Day',note:'Isometric holds and long eccentrics. Heavy posterior chain anchor with pause squats.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Hack Squat (low and inside shoulder width)',sets:'4×8',tempo:'4:3:1:0',rest:'90 sec',note:'3-second isometric hold at bottom · heavy'},{name:'Barbell Squat (feet inside shoulder width)',sets:'4×10',tempo:'1:2:1:0',rest:'90 sec',note:'Pause at bottom eliminates bounce'},{name:'Leg Press (feet together)',sets:'4×10',tempo:'2:2:1:0',rest:'90 sec',note:'2-second pause at bottom of each rep'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Barbell Squat (feet outside shoulder width)',sets:'5×5',tempo:'',rest:'2 min',note:'Wide stance · heavy · posterior chain anchor'},{name:'Romanian Deadlift',sets:'4×8',tempo:'4:2:1:0',rest:'90 sec',note:'4-second eccentric · 2-second stretch hold at bottom'},{name:'Smith Machine Hip Thrust',sets:'4×15',tempo:'1:0:1:2',rest:'60 sec',note:'2-second squeeze at top each rep'},{name:'DB Walking Lunges',sets:'3 sets to failure',tempo:'1:2:1:0',rest:'90 sec',note:'Required · walk to technical failure'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Seated Calf Raises (toes pointed out)',sets:'4×15',tempo:'1:3:1:2',rest:'60 sec',note:'3-second isometric stretch at bottom · matches pause theme'}]}]},{id:'v5',label:'V5',title:'High Volume Pump Day',note:'Moderate weight, maximum reps. High-set quad burnout and hamstring volume.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Goblet Squat (heels elevated and together)',sets:'5×10',tempo:'3:0:1:0',rest:'60 sec',note:'High rep primer · heels elevated · deep range'},{name:'Quad Extensions',sets:'5×15',tempo:'1:0:1:2',rest:'60 sec',note:'High sets · 2-second squeeze at full extension'},{name:'Leg Press (feet together)',sets:'4×20',tempo:'1:0:1:0',rest:'60 sec',note:'High rep pump · moderate weight'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Deadlifts',sets:'5×5',tempo:'',rest:'2 min',note:'Low rep heavy anchor · reset each rep'},{name:'Leg Press (high and wide)',sets:'4×15',tempo:'2:0:1:0',rest:'60 sec',note:'High foot placement · glute/ham emphasis'},{name:'Goblet Squat (feet pointed out, outside shoulder width)',sets:'4×15',tempo:'1:2:1:0',rest:'60 sec',note:'Toes out · high rep glute pump'},{name:'DB Walking Lunges',sets:'4×12 each leg',tempo:'1:2:1:0',rest:'60 sec',note:'Required · high rep · continuous'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Standing Leg Press Calf Raise',sets:'4×20',tempo:'1:2:1:2',rest:'60 sec',note:'20 reps · full ROM · 2-second pause at top'}]}]},{id:'v6',label:'V6',title:'Pyramid & Superset Day',note:'Pyramid loading into supersets. Full quad/posterior chain coverage with finisher lunges.',sections:[{label:'Quads',emoji:'🦵',color:'rgba(251,146,60,0.15)',exercises:[{name:'Smith Machine Cannonball Squats',sets:'12,10,8,8',tempo:'3:0:1:0',rest:'90 sec',note:'Pyramid up · close stance · deep squat'},{name:'Hack Squat (low and inside shoulder width)',sets:'12,10,8,8',tempo:'4:0:1:0',rest:'90 sec',note:'Pyramid up · quad emphasis'},{name:'Leg Press (feet together) / Quad Extensions (superset)',sets:'4×10 / 15',tempo:'',rest:'90 sec',note:'Complete leg press immediately into extensions — no rest'}]},{label:'Hamstrings & Glutes',emoji:'🏋️',color:'rgba(251,146,60,0.10)',exercises:[{name:'Barbell Squat (feet outside shoulder width)',sets:'5×5',tempo:'',rest:'2 min',note:'Wide stance · heavy · posterior chain anchor'},{name:'Romanian Deadlift',sets:'4×12',tempo:'3:0:1:0',rest:'90 sec',note:'Bilateral · 3-second eccentric'},{name:'Goblet Squat (feet pointed out, outside shoulder width)',sets:'4×15',tempo:'1:2:1:0',rest:'60 sec',note:'Toes out · glute emphasis'},{name:'DB Walking Lunges',sets:'3 sets to failure',tempo:'1:2:1:0',rest:'90 sec',note:'Required · walk to technical failure'}]},{label:'Calves',emoji:'🦶',color:'rgba(251,146,60,0.08)',exercises:[{name:'Smith Machine Calf Raises',sets:'12,10,8,8',tempo:'1:2:1:2',rest:'60 sec',note:'Pyramid up · 2-second squeeze at top'}]}]}];

let activeIdx=0;
const checkState={};

function render(){
  const w=WORKOUTS[activeIdx];
  const tabs=WORKOUTS.map((wo,i)=>'<button class="tab '+(i===activeIdx?'active':'')+'" data-i="'+i+'">'+wo.label+'</button>').join('');
  let body='';
  w.sections.forEach(sec=>{
    body+='<div class="section-label" style="background:'+sec.color+'">'+sec.emoji+' '+sec.label.toUpperCase()+'</div>';
    sec.exercises.forEach((ex,ei)=>{
      const id=activeIdx+'-'+sec.label.substring(0,2)+'-'+ei;
      const ck=checkState[id]?'checked':'';
      const tpo=ex.tempo?'<span class="ex-tempo">'+ex.tempo+'</span>':'';
      const note=ex.note?'<div class="ex-note">'+ex.note+'</div>':'';
      body+='<div class="ex-card '+ck+'" data-id="'+id+'"><div class="ex-row"><div class="ex-num">'+(ei+1)+'</div><div class="ex-content"><div class="ex-name">'+ex.name+'</div><div class="ex-sets-row"><span class="ex-sets">'+ex.sets+'</span>'+tpo+'</div><div>'+makeRT(ex.rest||'60 sec',ex.name)+'</div>'+note+'</div></div></div>';
    });
  });
  const noteHtml=w.note?'<div class="workout-note">'+w.note+'</div>':'';
  document.getElementById('app').innerHTML=
    '<div class="header"><a href="cat-pump-new4.html" class="back-link">← Back</a><div class="header-inner"><div class="eyebrow">🦵 Daily Pump · Split #3 · Legs</div><div class="title">Quads / Hamstrings / Glutes</div></div></div>'+
    '<div class="tabs-bar"><div class="tabs">'+tabs+'</div></div>'+
    '<div class="content"><div style="font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;">'+w.title+'</div>'+noteHtml+'<div class="tap-hint">Tap any exercise to check off</div>'+body+'</div>';
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{activeIdx=parseInt(b.dataset.i);render();updateProgress();setTimeout(initNotes,200);}));
  document.querySelectorAll('.ex-card').forEach(c=>c.addEventListener('click',()=>{const id=c.dataset.id;checkState[id]=!checkState[id];c.classList.toggle('checked');updateProgress();}));
  updateProgress();setTimeout(initNotes,200);
}
render();

const NOTES_KEY='mc_notes_legs-s3-pump';
function getNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY)||'{}');}catch(e){return{};}}
function saveNote(id,val){const n=getNotes();if(val.trim())n[id]=val.trim();else delete n[id];localStorage.setItem(NOTES_KEY,JSON.stringify(n));}
function initNotes(){
  const notes=getNotes();
  document.querySelectorAll('.ex-card[data-id]').forEach(card=>{
    const id=card.dataset.id;
    if(!id||card.querySelector(');
    const ta=wrap.querySelector('textarea');ta.addEventListener('input',()=>{saveNote(id,ta.value);tog.innerHTML=ta.value.trim()?'✏️ '+ta.value.trim().substring(0,20):'✚ Add weight/notes';});
    const cont=card.querySelector('.ex-content');if(cont){cont.appendChild(tog);cont.appendChild(wrap);}
  });
}
