function makeRestTimer(restStr, exerciseName) {
  const secs = TMR.parseSeconds(restStr);
  if (!secs) return '<span class="ex-sets" style="opacity:0.5">⏱️ ' + restStr + '</span>';
  const label = restStr;
  return '<span class="rest-timer idle" data-rest="' + restStr + '" data-label="' + label + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + secs + ',\'' + exerciseName.replace(/'/g,"\'").substring(0,30) + '...\')" ' +
    'title="Tap to start rest timer">' +
    '<span class="rest-timer-icon">⏱️</span>' +
    '<span class="rest-timer-label">' + label + '</span>' +
    '</span>';
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}
let activePhase = "p1";

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// A drop/burnout AMRAP set renders as a bare "∞" (one per AMRAP set), never
// a "2×∞" shorthand. "Drop AMRAP" and "+ N×AMRAP" always convert (the word
// "Drop" or a leading "+" signals an added set after real working sets,
// regardless of context). A BARE "N×AMRAP"/"AMRAP" with neither marker only
// converts when it's one leg of a multi-exercise superset (a burnout round
// paired against a partner leg's real working sets) — never when it's a
// standalone exercise's entire prescription (a finisher) or free-text
// circuit notation like "AMRAP OCE" (not a bare AMRAP token on its own).
function amrapToInfinity(s,isMultiLeg){
  s=String(s).replace(/(\+\s*)?(\d+)\s*[x×]\s*(drop\s*)?amrap\b/gi,(m,plus,n,dropWord)=>(!plus&&!dropWord&&!isMultiLeg)?m:(plus||'')+Array(parseInt(n,10)).fill('∞').join(' '));
  s=s.replace(/\bdrop\s+amrap\b/gi,'∞');
  if(isMultiLeg)s=s.replace(/^\s*amrap\s*$/i,'∞');
  return s;
}

function renderReps(sets){
  if(!sets||sets==="—")return '<span style="color:#9ca3af;font-style:italic">—</span>';
  // Handle group-style descriptions
  if(sets.includes("G1:")||sets.includes("Group 1")){
    return '<div style="font-size:11px;color:#fdba74;line-height:1.6;font-weight:600">'+escapeHtml(sets).replace(/\//g,'<br/>')+'</div>';
  }
  const parts=sets.split("/").map(s=>s.trim());
  return '<div class="reps-wrap">'+parts.map((part,pi)=>{
    const reps=part.split(",").map(r=>r.trim());
    const row='<div class="reps-row">'+reps.map((rep,i)=>{
      const special=rep.toUpperCase().includes("AMRAP")||rep.includes("Drop");
      const cls=special?"rep special":(i===0?"rep first":"rep");
      return `<span class="${cls}">${escapeHtml(rep)}</span>`;
    }).join("")+(pi<parts.length-1?'<span class="divider">╱</span>':'')+'</div>';
    return row;
  }).join("")+'</div>';
}

function renderExercise(ex,dIdx,eIdx){
  // Concept A — accent-driven exercise card. Preserves all behavioural hooks
  // (.ex-card/.ex-body/.ex-name/[data-field=sets|name|rest]/.rest-timer) that
  // mc-setlog.js, mc-card-actions.js, mc-summary.js and stndr-checkoff.js use.
  const ssCls=ex.tag==="SUPERSET"?" is-ss":(ex.tag==="TRI-SET"?" is-tri":(ex.tag==="CLUSTER"?" is-cluster":""));
  const legsArr=String(ex.sets||"—").split("/").map(s=>s.trim());
  const repsHtml=legsArr.map((part,pi)=>{
    const reps=part.split(",").map(r=>r.trim());
    const legTag=legsArr.length>1?`<span class="a-legtag">${pi===0?"A":"B"}</span>`:"";
    const chips=reps.map((rep,ri)=>{
      const special=rep.toUpperCase().includes("AMRAP")||rep.includes("Drop")||rep.includes("×");
      const cls=special?"a-rep special":(ri===0?"a-rep live":"a-rep");
      const sep=ri<reps.length-1?'<span class="a-sep">·</span>':"";
      return `<span class="${cls}">${escapeHtml(amrapToInfinity(rep,legsArr.length>1))}</span>${sep}`;
    }).join("");
    return `<div class="a-leg">${legTag}${chips}</div>`;
  }).join("");
  const badges=[];
  if(ex.tag)badges.push(`<span class="a-pill grp">${escapeHtml(ex.tag)}</span>`);
  if(ex.tempo)ex.tempo.split("/").forEach(t=>badges.push(`<span class="a-pill tempo">⏱ ${escapeHtml(t.trim())}</span>`));
  const badgeHtml=badges.length?`<div class="a-badges">${badges.join("")}</div>`:"";
  const notesHtml=ex.notes?`<div class="a-notes">📝 ${escapeHtml(ex.notes)}</div>`:"";
  return `<div class="ex-card a-card${ssCls}"><div class="ex-body">
    <div class="a-top">
      <div class="a-idx">${eIdx+1}</div>
      <div class="a-head">
        <div class="ex-name a-name"><span class="editable" data-field="name" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.name)}</span></div>
        ${badgeHtml}
      </div>
    </div>
    <div class="a-reps">${repsHtml}</div>
    <div class="a-strip">
      <div class="a-cell"><span class="k">Sets</span><span class="v"><span class="editable" data-field="sets" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.sets)}</span></span></div>
      <div class="a-cell"><span class="k">Rest</span><span class="v"><span class="editable" data-field="rest" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.rest)}</span></span></div>
    </div>
    <div class="a-timerbar">${makeRestTimer(ex.rest||'60 sec',ex.name)}</div>
    ${notesHtml}
  </div></div>`;
}

function renderDay(day,dIdx){
  if(day.type==="rest"){
    return `<div class="rest-day"><span style="font-size:20px">😴</span><div><div class="rest-label">REST DAY</div><div class="rest-sub">Recovery & Growth</div></div></div>`;
  }
  const exHtml=day.exercises.map((ex,eIdx)=>renderExercise(ex,dIdx,eIdx)).join("");
  return `<div class="day-card" data-d="${dIdx}" style="">
    <div class="day-header">
      <div class="day-icon" style="background:${day.color};box-shadow:0 2px 10px ${day.color}66">${day.icon}</div>
      <div class="day-info">
        <div class="day-session">${escapeHtml(day.session)}</div>
        <div class="day-meta">${escapeHtml(day.label)} · ${day.exercises.length} exercises</div>
      </div>
      <div class="day-toggle">▼</div>
    </div>
    <div class="exercises" style="border-top-color:${day.color}33">${exHtml}</div>
  </div>`;
}

function render(){
  const phase=DATA.phases.find(p=>p.id===activePhase);
  const tabs=DATA.phases.map(p=>`<button class="tab ${p.id===activePhase?"active":""}" data-phase="${p.id}">${p.label}</button>`).join("");
  const days=phase.days.map((d,i)=>renderDay(d,i)).join("");
  document.getElementById("app").innerHTML=`
    <div class="header">
      <a href="dashboard.html" class="back-link">← Plans</a>
      <div class="header-inner">
        <div class="eyebrow">PPL · Two Phases</div>
        <div class="title">Push / Pull / Legs</div>
        <div><span class="schedule">${DATA.schedule}</span></div>
      </div>
    </div>
    <div class="tabs-bar"><div class="tabs">${tabs}</div></div>
    <div class="content">
      <div class="phase-note"><strong>${phase.label}:</strong> ${DATA.note}</div>
      <div class="hint">Tap a session to expand · Tap any field to edit</div>
      ${days}
    </div>`;
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll(".tab").forEach(b=>{
    b.addEventListener("click",()=>{activePhase=b.dataset.phase;render();});
  });
  document.querySelectorAll(".day-card").forEach(card=>{
    const header=card.querySelector(".day-header");
    header.addEventListener("click",e=>{
      if(e.target.classList.contains("editable"))return;
      card.classList.toggle("open");
      const toggle=card.querySelector(".day-toggle");
      const dIdx=card.dataset.d;
      const day=DATA.phases.find(p=>p.id===activePhase).days[dIdx];
      if(card.classList.contains("open")){
        toggle.textContent="▲";
        toggle.style.background=day.color;
        card.style.borderColor=day.color;
        card.style.boxShadow=`0 4px 18px ${day.color}33`;
        header.style.background=`${day.color}10`;
      }else{
        toggle.textContent="▼";
        toggle.style.background="rgba(255,255,255,0.06)";
        card.style.borderColor="rgba(255,255,255,0.06)";
        card.style.boxShadow="none";
        header.style.background="transparent";
      }
    });
  });
  document.querySelectorAll(".editable").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const field=el.dataset.field;
      const dIdx=el.dataset.d;
      const eIdx=el.dataset.e;
      const day=DATA.phases.find(p=>p.id===activePhase).days[dIdx];
      const ex=day.exercises[eIdx];
      const input=document.createElement("input");
      input.value=ex[field];
      input.className="edit-input";
      el.replaceWith(input);
      input.focus();
      const save=()=>{ex[field]=input.value;render();};
      input.addEventListener("blur",save);
      input.addEventListener("keydown",ev=>{if(ev.key==="Enter")input.blur();});
    });
  });
}

render();
if(typeof updateProgress!=="undefined")updateProgress();
