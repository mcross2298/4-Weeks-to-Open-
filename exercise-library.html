<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Exercise Library — MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#050d1a;min-height:100vh;padding-bottom:60px;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);padding:60px 20px 24px;border-bottom:1px solid rgba(212,175,55,0.15);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#d4af37;text-decoration:none;font-size:13px;font-weight:700;background:rgba(212,175,55,0.12);padding:6px 14px;border-radius:20px;border:1px solid rgba(212,175,55,0.35);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#d4af37;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;}
.subtitle{font-size:13px;color:#64748b;font-weight:600;}
.content{max-width:680px;margin:0 auto;padding:0 16px;}
/* SEARCH */
.search-wrap{position:sticky;top:0;z-index:10;background:#050d1a;padding:14px 0 10px;border-bottom:1px solid rgba(255,255,255,0.06);}
.search-box{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 16px 12px 40px;color:#e2e8f0;font-size:14px;font-weight:600;outline:none;}
.search-box::placeholder{color:#334155;}
.search-icon{position:absolute;left:29px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-rel{position:relative;}
/* FILTERS */
.filter-wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;-webkit-overflow-scrolling:touch;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#64748b;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:0.04em;transition:all 0.15s;}
.filter-btn.active{background:rgba(212,175,55,0.2);border-color:rgba(212,175,55,0.5);color:#fbbf24;}
/* RESULTS */
.results-count{font-size:11px;color:#475569;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:14px 0 8px;}
.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-item{background:#0d1f3c;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;}
.ex-item:active{transform:scale(0.99);background:#0a2a3a;}
.ex-item.selected{background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.4);}
.ex-muscle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ex-name{flex:1;font-size:13px;font-weight:700;color:#e2e8f0;line-height:1.4;}
.ex-muscle-tag{font-size:10px;font-weight:800;color:#475569;letter-spacing:0.06em;text-align:right;}
.ex-programs{font-size:10px;color:#334155;font-weight:600;margin-top:2px;}
.empty-state{text-align:center;padding:60px 20px;color:#334155;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:700;}
/* REPLACE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#0d1628;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:80vh;overflow-y:auto;border-top:1px solid rgba(212,175,55,0.2);}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:15px;font-weight:900;color:#fff;margin-bottom:6px;}
.modal-sub{font-size:12px;color:#64748b;margin-bottom:20px;line-height:1.5;}
.modal-ex-name{font-size:14px;font-weight:800;color:#d4af37;background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:8px 12px;margin-bottom:16px;}
.modal-search{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:13px;outline:none;margin-bottom:10px;}
.modal-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.modal-ex{padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;font-size:12px;font-weight:700;color:#e2e8f0;cursor:pointer;display:flex;align-items:center;gap:8px;}
.modal-ex:active{background:rgba(212,175,55,0.15);}
.modal-ex-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.modal-cancel{width:100%;margin-top:14px;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#64748b;font-size:13px;font-weight:800;cursor:pointer;}
</style>
</head>

</div>

const REPLACE_KEY = 'mc_replacements';
const MUSCLE_COLORS = {
  'Back':'#22d3ee','Chest':'#f472b6','Shoulders':'#60a5fa','Biceps':'#a78bfa',
  'Triceps':'#fb923c','Legs - Quads':'#4ade80','Legs - Hamstrings':'#34d399',
  'Legs - Glutes':'#86efac','Calves':'#fde68a','Core':'#f87171','Forearms':'#94a3b8',
  'Cardio':'#f59e0b','Full Body':'#e879f9','Adductors':'#67e8f9'
};
const MUSCLE_ICONS = {
  'Back':'🔙','Chest':'🫁','Shoulders':'🏔️','Biceps':'💪','Triceps':'💥',
  'Legs - Quads':'🦵','Legs - Hamstrings':'🍑','Legs - Glutes':'🍑','Calves':'🦶',
  'Core':'🔥','Forearms':'🔧','Cardio':'🏃','Full Body':'⚡','Adductors':'⬅️'
};

let activeFilter = 'All';
let selectedEx = null;

// Build filter buttons
function buildFilters() {
  const muscles = ['All', ...Object.keys(MUSCLE_COLORS).sort()];
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = muscles.map(m =>
    '<button class="filter-btn' + (m==='All'?' active':'') + '" onclick="setFilter(\'' + m + '\')">' +
    (MUSCLE_ICONS[m]||'') + ' ' + m + '</button>'
  ).join('');
}

function setFilter(muscle) {
  activeFilter = muscle;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().endsWith(muscle) || (muscle==='All' && b.textContent.trim().startsWith('All')));
  });
  filterExercises();
}

function filterExercises() {
  const q = (document.getElementById('searchBox').value||'').toLowerCase();
  const list = document.getElementById('exList');
  const count = document.getElementById('resultsCount');
  
  let filtered = EXERCISES;
  if (activeFilter !== 'All') filtered = filtered.filter(e => e.muscle === activeFilter);
  if (q) filtered = filtered.filter(e => e.name.toLowerCase().includes(q));
  
  count.textContent = filtered.length + ' exercise' + (filtered.length!==1?'s':'') + (activeFilter!=='All'?' in '+activeFilter:'') + (q?' matching "'+q+'"':'');
  
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No exercises found</div></div>';
    return;
  }
  
  const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
  list.innerHTML = filtered.map(ex => {
    const color = MUSCLE_COLORS[ex.muscle] || '#64748b';
    const replaced = replacements[ex.name.toLowerCase()];
    const progList = ex.programs.join(' · ');
    return '<div class="ex-item" onclick="openReplace(\'' + ex.name.replace(/'/g,"&apos;") + '\',\'' + ex.muscle + '\')">' +
      '<div class="ex-muscle-dot" style="background:' + color + ';box-shadow:0 0 5px ' + color + '44;"></div>' +
      '<div style="flex:1">' +
        '<div class="ex-name">' + ex.name + (replaced?'<span style="margin-left:6px;font-size:10px;color:#22d3ee;font-weight:900;">↔ REPLACED</span>':'') + '</div>' +
        '<div class="ex-programs">' + progList + '</div>' +
      '</div>' +
      '<div class="ex-muscle-tag">' + (MUSCLE_ICONS[ex.muscle]||'') + '</div>' +
    '</div>';
  }).join('');
}

// Replace modal
function openReplace(exName, muscle) {
  selectedEx = { name: exName, muscle };
  document.getElementById('modalExName').textContent = exName;
  document.getElementById('modalSearch').value = '';
  document.getElementById('replaceModal').classList.add('open');
  filterModal();
}

function filterModal() {
  const q = (document.getElementById('modalSearch').value||'').toLowerCase();
  const list = document.getElementById('modalList');
  const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
  
  let options = EXERCISES.filter(e => e.muscle === selectedEx.muscle && e.name !== selectedEx.name);
  if (q) options = options.filter(e => e.name.toLowerCase().includes(q));
  
  const color = MUSCLE_COLORS[selectedEx.muscle] || '#64748b';
  list.innerHTML = options.slice(0,50).map(ex => {
    const isCurrent = replacements[selectedEx.name.toLowerCase()] === ex.name;
    return '<div class="modal-ex" onclick="saveReplacement(\'' + ex.name.replace(/'/g,"&apos;") + '\')">' +
      '<div class="modal-ex-dot" style="background:' + color + ';"></div>' +
      ex.name + (isCurrent?' ✓ current':'') +
    '</div>';
  }).join('');
}

function saveReplacement(newName) {
  const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
  replacements[selectedEx.name.toLowerCase()] = newName;
  localStorage.setItem(REPLACE_KEY, JSON.stringify(replacements));
  closeModal();
  filterExercises();
  // Show confirmation
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0d1f3c;color:#22d3ee;border:1px solid rgba(34,211,238,0.3);border-radius:10px;padding:10px 20px;font-size:12px;font-weight:800;z-index:999;white-space:nowrap;';
  toast.textContent = '↔ Replacement saved!';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function closeModal() {
  document.getElementById('replaceModal').classList.remove('open');
  selectedEx = null;
}

// Close modal on overlay click
document.getElementById('replaceModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
const muscles = [...new Set(EXERCISES.map(e=>e.muscle))];
document.getElementById('totalCount').textContent = EXERCISES.length + ' exercises across ' + muscles.length + ' muscle groups';
buildFilters();
filterExercises();

// Handle ?replace= URL param (from workout page long-press)
(function() {
  const params = new URLSearchParams(window.location.search);
  const replaceEx = params.get('replace');
  if (replaceEx) {
    // Auto-open the replace modal for this exercise
    const ex = EXERCISES.find(e => e.name.toLowerCase() === replaceEx.toLowerCase());
    if (ex) {
      setTimeout(function() { openReplace(ex.name, ex.muscle); }, 400);
    } else {
      // Search for it
      document.getElementById('searchBox').value = replaceEx;
      filterExercises();
    }
  }
})();
</script>
