<title>Exercise Library &mdash; MC Training</title>

*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#050d1a;min-height:100vh;padding-bottom:60px;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);padding:60px 20px 24px;border-bottom:1px solid rgba(212,175,55,0.15);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#d4af37;text-decoration:none;font-size:13px;font-weight:700;background:rgba(212,175,55,0.12);padding:6px 14px;border-radius:20px;border:1px solid rgba(212,175,55,0.35);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#d4af37;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;}
.subtitle{font-size:13px;color:#64748b;font-weight:600;}
.content{max-width:680px;margin:0 auto;padding:0 16px;}
.search-wrap{position:sticky;top:0;z-index:10;background:#050d1a;padding:14px 0 10px;border-bottom:1px solid rgba(255,255,255,0.06);}
.search-box{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 16px 12px 40px;color:#e2e8f0;font-size:14px;font-weight:600;outline:none;}
.search-box::placeholder{color:#334155;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-rel{position:relative;}
.filter-wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;-webkit-overflow-scrolling:touch;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#64748b;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:0.04em;transition:all 0.15s;}
.filter-btn.active{background:rgba(212,175,55,0.2);border-color:rgba(212,175,55,0.5);color:#fbbf24;}
.results-count{font-size:11px;color:#475569;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:14px 0 8px;}
.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-item{background:#0d1f3c;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ex-muscle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ex-name{flex:1;font-size:13px;font-weight:700;color:#e2e8f0;line-height:1.4;}
.ex-programs{font-size:10px;color:#334155;font-weight:600;margin-top:2px;}
.ex-muscle-tag{font-size:14px;flex-shrink:0;}
.master-group{border-radius:10px;overflow:hidden;border:1px solid rgba(212,175,55,0.2);background:#0d1f3c;}
.master-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.master-header:active{background:#112240;}
.master-chevron{font-size:10px;color:#d4af37;transition:transform 0.2s;flex-shrink:0;margin-left:auto;}
.master-group.open .master-chevron{transform:rotate(180deg);}
.master-label{font-size:10px;font-weight:800;letter-spacing:0.08em;color:#d4af37;text-transform:uppercase;margin-top:2px;}
.variations{display:none;flex-direction:column;border-top:1px solid rgba(255,255,255,0.06);}
.master-group.open .variations{display:flex;}
.var-item{background:#091525;padding:10px 14px 10px 34px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.04);}
.var-item:last-child{border-bottom:none;}
.var-name{flex:1;font-size:13px;font-weight:600;color:#94a3b8;line-height:1.4;}
.var-programs{font-size:10px;color:#1e3050;font-weight:600;margin-top:2px;}
.var-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:0.6;}
.empty-state{text-align:center;padding:60px 20px;color:#334155;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:700;}
.lib-note{margin:14px 0 0;font-size:11px;color:#334155;line-height:1.5;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;}
.phase8-badge{display:inline-block;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.3);color:#d4af37;font-size:9px;font-weight:800;letter-spacing:0.1em;padding:2px 8px;border-radius:20px;margin-left:8px;text-transform:uppercase;vertical-align:middle;}
</style>

var MUSCLE_COLORS={"Back":"#22d3ee","Chest":"#f472b6","Shoulders":"#60a5fa","Biceps":"#a78bfa","Triceps":"#fb923c","Legs - Quads":"#4ade80","Legs - Hamstrings":"#34d399","Legs - Glutes":"#86efac","Calves":"#fde68a","Core":"#f87171","Forearms":"#94a3b8","Cardio":"#f59e0b","Full Body":"#e879f9","Adductors":"#67e8f9"};
var MUSCLE_ICONS={"Back":"&#128281;","Chest":"&#129521;","Shoulders":"&#127956;","Biceps":"&#128170;","Triceps":"&#128165;","Legs - Quads":"&#129461;","Legs - Hamstrings":"&#127825;","Legs - Glutes":"&#127825;","Calves":"&#129462;","Core":"&#128293;","Forearms":"&#128295;","Cardio":"&#127939;","Full Body":"&#9889;","Adductors":"&#8592;"};
var activeFilter="All";

function buildFilters(){
  var muscles=["All"].concat(Object.keys(MUSCLE_COLORS).sort());
  var html="";
  for(var i=0;i<muscles.length;i++){
    var m=muscles[i];
    var cls="filter-btn"+(m===activeFilter?" active":"");
    html+='<button class="'+cls+'" data-muscle="'+m+'" onclick="setFilter(this.dataset.muscle)">'+(MUSCLE_ICONS[m]||"")+" "+m+"</button>";
  }
  document.getElementById("filterWrap").innerHTML=html;
}

function setFilter(m){
  activeFilter=m;
  var btns=document.querySelectorAll(".filter-btn");
  for(var i=0;i<btns.length;i++){
    btns[i].classList.toggle("active",btns[i].dataset.muscle===m);
  }
  filterExercises();
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleGroup(el){
  var grp=el.closest(".master-group");
  grp.classList.toggle("open");
}

function buildMasterGroup(masterName,variations,muscle){
  var col=MUSCLE_COLORS[muscle]||"#64748b";
  var varRows="";
  for(var i=0;i<variations.length;i++){
    var ex=variations[i];
    var progs=(ex.programs||[]).join(" &middot; ");
    varRows+='<div class="var-item">'
      +'<div class="var-dot" style="background:'+col+';"></div>'
      +'<div style="flex:1">'
      +'<div class="var-name">'+esc(ex.name)+"</div>"
      +(progs?'<div class="var-programs">'+progs+"</div>":"")
      +"</div></div>";
  }
  var safeid=masterName.replace(/ /g,"-").replace(/[^a-zA-Z0-9-]/g,"");
  return '<div class="master-group" id="mg-'+safeid+'">'
    +'<div class="master-header" onclick="toggleGroup(this)">'
    +'<div class="ex-muscle-dot" style="background:'+col+';box-shadow:0 0 5px '+col+'44;"></div>'
    +'<div style="flex:1">'
    +'<div class="ex-name">'+esc(masterName)+"</div>"
    +'<div class="master-label">'+esc(muscle)+' &nbsp;&middot;&nbsp; <span style="color:#475569;font-weight:700;">'+variations.length+" variations &mdash; tap to expand</span></div>"
    +"</div>"
    +'<span class="master-chevron">&#9660;</span>'
    +"</div>"
    +'<div class="variations">'+varRows+"</div>"
    +"</div>";
}

function exItemHTML(ex){
  var col=MUSCLE_COLORS[ex.muscle]||"#64748b";
  var progs=(ex.programs||[]).join(" &middot; ");
  return '<div class="ex-item">'
    +'<div class="ex-muscle-dot" style="background:'+col+';box-shadow:0 0 5px '+col+'44;"></div>'
    +'<div style="flex:1">'
    +'<div class="ex-name">'+esc(ex.name)+"</div>"
    +(progs?'<div class="ex-programs">'+progs+"</div>":"")
    +"</div>"
    +'<div class="ex-muscle-tag">'+(MUSCLE_ICONS[ex.muscle]||"")+"</div>"
    +"</div>";
}

function filterExercises(){
  var q=(document.getElementById("searchBox").value||"").toLowerCase().trim();
  var list=document.getElementById("exList");
  var countEl=document.getElementById("resultsCount");
  var filtered=[];
  var i;

  for(i=0;i<EXERCISES.length;i++){
    var e=EXERCISES[i];
    if(activeFilter!=="All" && e.muscle!==activeFilter) continue;
    if(q && e.name.toLowerCase().indexOf(q)===-1) continue;
    filtered.push(e);
  }

  var suffix=activeFilter!=="All"?" in "+activeFilter:"";

  if(q){
    if(!filtered.length){
      countEl.textContent="0 exercises"+suffix+" matching "+q;
      list.innerHTML='<div class="empty-state"><div class="empty-icon">&#127947;</div><div class="empty-text">No exercises found</div></div>';
      return;
    }
    countEl.textContent=filtered.length+" exercise"+(filtered.length!==1?"s":"")+suffix+" matching "+q;
    var rows="";
    for(i=0;i<filtered.length;i++) rows+=exItemHTML(filtered[i]);
    list.innerHTML=rows;
    return;
  }

  var masterMap={};
  var standalones=[];
  for(i=0;i<filtered.length;i++){
    var ex=filtered[i];
    if(ex.master){
      if(!masterMap[ex.master]) masterMap[ex.master]={muscle:ex.muscle,variations:[]};
      masterMap[ex.master].variations.push(ex);
    } else {
      standalones.push(ex);
    }
  }

  var masterKeys=Object.keys(masterMap).sort();
  var masterHTML="";
  for(i=0;i<masterKeys.length;i++){
    var key=masterKeys[i];
    masterHTML+=buildMasterGroup(key,masterMap[key].variations,masterMap[key].muscle);
  }
  var standaloneHTML="";
  for(i=0;i<standalones.length;i++) standaloneHTML+=exItemHTML(standalones[i]);

  countEl.textContent=filtered.length+" exercise"+(filtered.length!==1?"s":"")+suffix;
  list.innerHTML=masterHTML+standaloneHTML;
}

document.getElementById("totalCount").textContent=EXERCISES.length+" exercises across all programs";
buildFilters();
filterExercises();

</script>

        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          newWorker.postMessage('skipWaiting');
        }
      });
    });
  });
  // Reload once when new SW takes control
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(!refreshing){ refreshing = true; window.location.reload(); }
  });
}
</script>
