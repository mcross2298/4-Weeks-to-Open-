name: Deploy clean build to MC-Training-Rolodex

# On every push to main: extract the clean market tree (master minus all
# licensed/influencer content — see content-manifest.json) and force-push it
# to mcross2298/MC-Training-Rolodex as a single fresh commit.
#
# Roadmap 4.7 (unified market): also checks out mcross2298/Mikes-Cookbook
# (public repo, no token needed to read) and merges it under cookbook/ in the
# extracted tree — see content-manifest.json's "cookbook" block and
# tools/build-market.py's --cookbook-root. The two master repos stay
# independent; this merge only ever happens at deploy time, never committed
# to either source repo.
#
# Requires the repo secret ROLODEX_DEPLOY_TOKEN: a fine-grained PAT scoped to
# mcross2298/MC-Training-Rolodex with "Contents: read & write" permission.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "rolodex-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'mcross2298/4-Weeks-to-Open-'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Mikes-Cookbook
        uses: actions/checkout@v4
        with:
          repository: mcross2298/Mikes-Cookbook
          path: cookbook-src

      - name: Verify deploy token is configured
        env:
          TOKEN: ${{ secrets.ROLODEX_DEPLOY_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::ROLODEX_DEPLOY_TOKEN secret is not set. Create a fine-grained PAT with 'Contents: read & write' on mcross2298/MC-Training-Rolodex and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: JS syntax check (hard gate)
        run: |
          fail=0
          for f in $(git ls-files '*.js'); do
            node --check "$f" || { echo "::error file=$f::JavaScript syntax error"; fail=1; }
          done
          for f in cookbook-src/*.js; do
            node --check "$f" || { echo "::error file=$f::JavaScript syntax error"; fail=1; }
          done
          exit $fail

      - name: Leak check (hard gate)
        run: python3 tools/build-market.py --check --cookbook-root cookbook-src

      - name: Resolver / precedence unit tests (hard gate)
        run: node tools/test-naming.js

      - name: Extract clean market tree
        run: |
          python3 tools/build-market.py \
            --extract "$RUNNER_TEMP/market" \
            --base "https://mcross2298.github.io/MC-Training-Rolodex/" \
            --sw-version "market-ci-${{ github.run_number }}" \
            --cookbook-root cookbook-src

      - name: Push to MC-Training-Rolodex
        env:
          TOKEN: ${{ secrets.ROLODEX_DEPLOY_TOKEN }}
        run: |
          cd "$RUNNER_TEMP/market"
          git init -b main
          git config user.name "mc-market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Clean build from 4-Weeks-to-Open- @ ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${TOKEN}@github.com/mcross2298/MC-Training-Rolodex.git" \
            main
