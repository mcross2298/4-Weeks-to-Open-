name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: JS syntax check (node --check)
        run: |
          fail=0
          for f in $(git ls-files '*.js'); do
            node --check "$f" || { echo "::error file=$f::JavaScript syntax error"; fail=1; }
          done
          exit $fail
      - name: Weight-math regression tests (real source, not a duplicated copy)
        run: |
          node tools/test-mc-suggest.js
          node tools/test-mc-maxout.js
      - name: Cross-app bridge regression tests (mc-bridge.js read layer + mc-sync.js merge logic)
        run: |
          node tools/test-mc-bridge.js
          node tools/test-mc-sync-merge.js
      - name: Shared-module drift check (Mikes-Cookbook copies vs canonical — audit LS-1)
        # Downloads the cookbook's current copies and fails if any drifted from
        # this repo's canonical files. Landing order for a shared-module change:
        # merge this repo's PR first, then the cookbook's — the deploy run in
        # between fails here by design; re-run it after the cookbook PR merges.
        run: |
          mkdir -p /tmp/cookbook-mirror/tools
          base="https://raw.githubusercontent.com/mcross2298/Mikes-Cookbook/main"
          for f in tracker-foodapi.js tracker-calc.js tracker-barcode.js \
                   mc-bridge.js mc-install.js mc-backup-status.js tools/test-mc-bridge.js; do
            curl -fsSL --retry 3 "$base/$f" -o "/tmp/cookbook-mirror/$f"
          done
          python3 tools/sync-shared-modules.py --check --cookbook-dir /tmp/cookbook-mirror
      - name: Program color-sync check (mc-pm-data.js vs dashboard.html)
        run: node tools/check-program-colors.js
      - name: Multi-week program intensifier-coverage check (mm-p1/p2/p3.html)
        run: node tools/validate-programs.js
      - name: Generate service worker (auto version + precache list)
        run: python3 tools/build-sw.py --version "ci-${{ github.run_number }}"
      - name: Market-extraction leak check (content-manifest.json)
        run: python3 tools/build-market.py --check
      - name: Headless render smoke test (blocking)
        # CI-only tooling, installed into a scratch prefix outside the repo —
        # no package.json here, deliberately (see CLAUDE.md). Promoted from
        # report-only to blocking in audit LS-1 (finding W-19) after fixing
        # the one real failure it had been silently reporting
        # (exercise-library.html's legacy inline SW updater).
        run: |
          npm install --no-save --prefix /tmp/pw-ci playwright@latest
          /tmp/pw-ci/node_modules/.bin/playwright install --with-deps chromium
          python3 -m http.server 8080 &
          SERVER_PID=$!
          for i in $(seq 1 20); do curl -sf http://localhost:8080/index.html >/dev/null && break; sleep 0.5; done
          NODE_PATH=/tmp/pw-ci/node_modules node tools/smoke-test-pages.js http://localhost:8080
          EXIT=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $EXIT
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
