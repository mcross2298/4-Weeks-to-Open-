<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>30 Minute Turn & Burn</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#12001a;min-height:100vh;padding-bottom:40px;}
.app{background:linear-gradient(160deg,#12001a,#1e003a,#12001a);min-height:100vh;}
.back-link{position:absolute;top:18px;left:18px;color:#c084fc;text-decoration:none;font-size:13px;font-weight:700;background:rgba(192,132,252,0.15);padding:6px 14px;border-radius:20px;border:1px solid rgba(192,132,252,0.35);z-index:10;}
.back-link:active{background:rgba(239,68,68,0.25);}
.header{background:linear-gradient(90deg,#1e003a,#12001a);padding:60px 20px 24px;border-bottom:1px solid rgba(192,132,252,0.15);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#c084fc;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.schedule{display:inline-block;background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:#e9d5ff;font-weight:700;}
.tabs-bar{background:#12001a;border-bottom:1px solid rgba(192,132,252,0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:4px;}
.tab{flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:13px;background:transparent;color:#3b0764;border-bottom:3px solid transparent;text-align:center;letter-spacing:0.06em;}
.tab.active{color:#c084fc;border-bottom-color:#a855f7;}
.content{max-width:680px;margin:24px auto 0;padding:0 16px;}
.option-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:6px;}
.option-sub{font-size:12px;color:#f87171;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;opacity:0.8;}
.block{background:#1a0505;border-radius:14px;border:1px solid rgba(239,68,68,0.2);padding:20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.block-icon{font-size:28px;margin-bottom:8px;}
.block-name{font-size:16px;font-weight:900;color:#fff;margin-bottom:4px;}
.block-detail{font-size:13px;color:#fecaca;line-height:1.6;opacity:0.9;}
.block-detail strong{color:#fff;}
.block.highlight{border-color:rgba(239,68,68,0.5);background:linear-gradient(135deg,#2a0808,#1a0505);}
.target-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:14px 16px;margin-top:16px;}
.target-label{font-size:10px;font-weight:900;letter-spacing:0.2em;color:#f87171;text-transform:uppercase;margin-bottom:6px;}
.target-text{font-size:14px;color:#fecaca;line-height:1.5;}
.warning-box{background:rgba(168,85,247,0.08);border-left:3px solid #a855f7;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:20px;color:#e9d5ff;font-size:12px;line-height:1.6;}
.warning-box strong{color:#fff;}
.ladder-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(239,68,68,0.08);}
.ladder-row:last-child{border-bottom:none;}
.ladder-num{font-size:11px;font-weight:800;color:#f87171;width:20px;text-align:right;flex-shrink:0;}
.ladder-bar-wrap{flex:1;background:rgba(239,68,68,0.08);border-radius:4px;height:22px;overflow:hidden;}
.ladder-bar{height:100%;background:linear-gradient(90deg,#4c1d95,#a855f7);border-radius:4px;display:flex;align-items:center;padding-left:8px;}
.ladder-label{font-size:10px;font-weight:800;color:#fff;white-space:nowrap;}
.ladder-reps{font-size:11px;font-weight:700;color:#d8b4fe;width:28px;text-align:right;flex-shrink:0;}
.section-head{font-size:11px;font-weight:800;letter-spacing:0.18em;color:#f87171;text-transform:uppercase;margin:20px 0 10px;opacity:0.8;}

.sum-section{margin-top:28px;padding:0 16px 24px;}
.sum-hd{font-size:10px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;opacity:0.85;}
.sum-hd::after{content:'';flex:1;height:1px;}
.sum-card{border-radius:14px;padding:16px 18px;margin-bottom:8px;}
.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;opacity:0.75;}
.sum-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid;}
.sum-row:last-of-type{border-bottom:none;}
.sum-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.sum-nm{font-size:12px;font-weight:700;color:#e2e8f0;flex:1;line-height:1.3;}
.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.sum-st{font-size:11px;font-weight:900;text-align:right;}
.sum-rp{font-size:10px;text-align:right;opacity:0.75;}
.sum-div{height:1px;margin:12px 0;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
.sum-tot{border-radius:8px;padding:10px;text-align:center;}
.sum-tv{font-size:15px;font-weight:900;}
.sum-tl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;opacity:0.7;}


/* ── TIMER ── */
.rest-timer{
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
  padding:4px 10px;border-radius:8px;
  transition:all 0.15s;position:relative;
}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.rest-timer-icon{font-size:13px;}
.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;}
.rest-timer.idle .rest-timer-label{color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}
.rest-timer.overtime .rest-timer-label{color:#f87171;}
.rest-timer-hint{font-size:9px;color:#475569;margin-top:2px;font-style:italic;}

/* Floating timer display — shows when running */
.timer-float{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,16,0.95);backdrop-filter:blur(16px);
  border-radius:20px;padding:14px 24px;
  display:none;flex-direction:column;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  z-index:100;min-width:200px;
}
.timer-float.visible{display:flex;}
.timer-float-label{font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.timer-float-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.timer-float-time.done{color:#34d399;}
.timer-float-time.overtime{color:#f87171;}
.timer-float-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.timer-float-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-float-progress{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;width:100%;}
.timer-float-progress.done{background:#34d399;}
.timer-float-progress.overtime{background:#f87171;}
.timer-float-actions{display:flex;gap:8px;margin-top:6px;}
.timer-float-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.timer-float-skip{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.timer-float-reset{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}


.prog-bar-wrap{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:rgba(255,255,255,0.06);}
.prog-bar-fill{height:3px;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width 0.4s ease;border-radius:0 2px 2px 0;}
.timer-presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.timer-preset{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.05em;}
.timer-preset:active{background:rgba(212,175,55,0.2);color:#fbbf24;border-color:rgba(212,175,55,0.4);}

/* ── WEIGHT NOTES ── */
.ex-notes-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:6px;cursor:pointer;font-size:10px;font-weight:800;color:#475569;letter-spacing:0.06em;text-transform:uppercase;user-select:none;}
.ex-notes-toggle:active{color:#94a3b8;}
.ex-notes-wrap{display:none;margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08);}
.ex-notes-wrap.open{display:block;}
.ex-notes-input{width:100%;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:12px;font-weight:600;font-family:inherit;resize:none;line-height:1.5;}
.ex-notes-input::placeholder{color:#334155;}
.ex-notes-label{font-size:9px;font-weight:800;letter-spacing:0.15em;color:#475569;text-transform:uppercase;margin-bottom:4px;}



/* collapsed by default */
}
.setlog-wrap.open{ display:block; }

.setlog-toggle{
  display:flex;align-items:center;gap:5px;
  margin-top:6px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:900;
  color:#475569;letter-spacing:0.08em;
  text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.setlog-toggle .sl-chevron{ transition:transform 0.2s; }
.setlog-wrap.open ~ .setlog-toggle .sl-chevron,
.setlog-toggle.open .sl-chevron{ transform:rotate(180deg); }

.setlog-hist{
  font-size:10px;font-weight:700;
  color:rgba(212,175,55,0.55);
  margin-left:auto;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  max-width:140px;
}

.set-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;align-items:center;
  padding:7px 4px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.set-row:last-child{ border-bottom:none; }

.set-num{
  font-size:11px;font-weight:900;
  color:#475569;text-align:center;
}
.set-input{
  width:100%;padding:6px 4px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#e2e8f0;
  font-size:13px;font-weight:700;
  text-align:center;font-family:inherit;
  outline:none;
  -webkit-tap-highlight-color:transparent;
}
.set-input:focus{
  border-color:rgba(212,175,55,0.45);
  background:rgba(212,175,55,0.06);
}
.set-input::placeholder{ color:#2d3748;font-size:11px; }

.set-check{
  width:32px;height:32px;
  border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.set-check.done{
  background:rgba(52,211,153,0.15);
  border-color:rgba(52,211,153,0.4);
}
.set-row.done-row .set-input{
  opacity:0.45;
  text-decoration:line-through;
}

.setlog-header{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;padding:4px 4px 2px;
}
.setlog-col-label{
  font-size:9px;font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#334155;text-align:center;
}






/* ── WAVE3-SETLOG ── */
.setlog-wrap{margin-top:8px;border-top:1px solid rgba(255,255,255,0.07);padding-top:2px;display:none;}
.setlog-wrap.open{display:block;}
.setlog-toggle{display:flex;align-items:center;gap:5px;margin-top:8px;cursor:pointer;user-select:none;font-size:10px;font-weight:900;color:#475569;letter-spacing:0.08em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.setlog-hist{font-size:10px;font-weight:700;color:rgba(212,175,55,0.6);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;align-items:center;padding:6px 2px;border-bottom:1px solid rgba(255,255,255,0.04);}
.set-row:last-child{border-bottom:none;}
.set-num{font-size:11px;font-weight:900;color:#475569;text-align:center;}
.set-input{width:100%;padding:6px 4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#e2e8f0;font-size:13px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent;}
.set-input:focus{border-color:rgba(212,175,55,0.45);background:rgba(212,175,55,0.06);}
.set-input::placeholder{color:#2d3748;font-size:11px;}
.set-check{width:30px;height:30px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.set-check.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);}
.set-row.done-row .set-input{opacity:0.4;}
.setlog-hdr{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;padding:3px 2px 1px;}
.setlog-hl{font-size:9px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#2d3748;text-align:center;}
</style>
</head>
<body>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
<div class="app" id="app"></div>
<script>
let activeTab = 0;

function renderOption1() {
  return `
    <div class="option-title">Burpee Blitz</div>
    <div class="option-sub">⏱️ 30 minutes total</div>
    <div class="warning-box"><strong>⚠️ No quitting.</strong> This is a timed challenge. Push every set like it's your last.</div>
    <div class="block highlight">
      <div class="block-icon">🪢</div>
      <div class="block-name">Phase 1 — Jump Rope</div>
      <div class="block-detail"><strong>15 minutes</strong> continuous jump rope. Pace yourself — burpees are next.</div>
    </div>
    <div class="block highlight">
      <div class="block-icon">💀</div>
      <div class="block-name">Phase 2 — Burpee Rounds</div>
      <div class="block-detail">
        <strong>10 rounds</strong><br>
        1 minute max effort burpees<br>
        30 seconds rest between sets<br><br>
        <strong>Total time: ~15 minutes</strong>
      </div>
    </div>
    <div class="target-box">
      <div class="target-label">🎯 Goal</div>
      <div class="target-text">Complete all 10 rounds of max effort. Count your burpees each set and try to beat your previous round.</div>
    </div>`;
}

function renderOption2() {
  const sets = Array.from({length:18},(_,i)=>i+1);
  const ladderRows = sets.map(n => {
    const pct = Math.round((n/18)*100);
    return `<div class="ladder-row">
      <div class="ladder-num">${n}</div>
      <div class="ladder-bar-wrap">
        <div class="ladder-bar" style="width:${pct}%">
          <span class="ladder-label">Set ${n}</span>
        </div>
      </div>
      <div class="ladder-reps">${n} reps</div>
    </div>`;
  }).join("");

  return `
    <div class="option-title">1–18 Ladder Burn</div>
    <div class="option-sub">⏱️ 30 minutes total</div>
    <div class="warning-box"><strong>⚠️ When you hit failure</strong> — switch to knee push-ups. Keep going until you collapse. No skipping sets.</div>
    <div class="block highlight">
      <div class="block-icon">🪢</div>
      <div class="block-name">Phase 1 — Jump Rope</div>
      <div class="block-detail"><strong>15 minutes</strong> continuous jump rope.</div>
    </div>
    <div class="block highlight">
      <div class="block-icon">💪</div>
      <div class="block-name">Phase 2 — 1–18 Pushup Ladder</div>
      <div class="block-detail"><strong>18 sets · 15 sec rest between sets</strong><br>Set 1 = 1 rep, Set 2 = 2 reps… up to Set 18 = 18 reps</div>
    </div>
    <div class="section-head">Ladder Breakdown</div>
    ${ladderRows}
    <div class="target-box" style="margin-top:16px;">
      <div class="target-label">🎯 Targets</div>
      <div class="target-text">
        <strong>Total possible:</strong> 171 pushups (Sets 1–18)<br>
        <strong>Current target:</strong> 150 pushups total<br>
        <strong>On failure:</strong> Switch to knee push-ups — no rest, keep moving
      </div>
    </div>`;
}

function render() {
  document.getElementById("app").innerHTML = `
    <div class="header">
      <a href="cat-faint.html" class="back-link">← Back</a>
      <div class="header-inner">
        <div class="eyebrow">🔥 30 Min · Turn & Burn</div>
        <div class="title">30 Minute Turn & Burn</div>
        <div><span class="schedule">2 Options</span></div>
      </div>
    </div>
    <div class="tabs-bar">
      <div class="tabs">
        <button class="tab ${activeTab===0?'active':''}" data-t="0">OPTION 1</button>
        <button class="tab ${activeTab===1?'active':''}" data-t="1">OPTION 2</button>
      </div>
    </div>
    <div class="content">
<div id="swContainer" style="max-width:680px;margin:0 auto;padding:0 16px;">

</div>
      ${activeTab===0 ? renderOption1() : renderOption2()}
    </div>`;
  document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => {
    activeTab = parseInt(b.dataset.t); render();
  }));
}
render();
if(typeof updateProgress!=="undefined")updateProgress();
buildStopwatch(document.getElementById('swContainer'));

// ── TIMER ENGINE ──────────────────────────────────────────────────
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 500);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },500);
  }
};

function makeRestTimer(restStr, exerciseName) {

  const label = restStr;
  return '<span class="rest-timer idle" data-rest="' + restStr + '" data-label="' + label + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + secs + ',\'' + exerciseName.replace(/'/g,"\'").substring(0,30) + '...\')" ' +
    'title="Tap to start rest timer">' +

// ── STOPWATCH ENGINE (cardio pages) ──────────────────────────────
const SW = {
  interval: null,
  startTime: null,
  elapsed: 0,
  running: false,

  formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  },

  toggle() {
    if (this.running) {
      clearInterval(this.interval);
      this.elapsed += Date.now() - this.startTime;
      this.running = false;
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '▶ Resume'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
    } else {
      this.startTime = Date.now();
      this.running = true;
      this.interval = setInterval(() => {
        const total = this.elapsed + (Date.now() - this.startTime);
        const el = document.getElementById('swDisplay');
        if (el) el.textContent = this.formatTime(total);
      }, 100);
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '⏸ Pause'; btn.style.background = 'rgba(251,191,36,0.15)'; btn.style.color = '#fbbf24'; }
    }
  },

  reset() {
    clearInterval(this.interval);
    this.elapsed = 0;
    this.running = false;
    const el = document.getElementById('swDisplay');
    if (el) el.textContent = '00:00';
    const btn = document.getElementById('swBtn');
    if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
  },

  lap() {
    if (!this.running && this.elapsed === 0) return;
    const total = this.elapsed + (this.running ? Date.now() - this.startTime : 0);
    const list = document.getElementById('swLaps');
    if (list) {
      const count = list.children.length + 1;
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;';
      item.innerHTML = '<span style="color:#64748b;">Lap ' + count + '</span><span style="color:#e2e8f0;font-weight:700;">' + this.formatTime(total) + '</span>';
      list.prepend(item);
    }
  }
};

function buildStopwatch(container) {
  const el = document.createElement('div');
  el.style.cssText = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin:16px 0;text-align:center;';
  el.innerHTML = `
    <div style="font-size:10px;font-weight:900;letter-spacing:0.2em;color:#475569;text-transform:uppercase;margin-bottom:10px;">⏱️ Stopwatch</div>
    <div id="swDisplay" style="font-size:52px;font-weight:900;color:#e2e8f0;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;margin-bottom:16px;">00:00</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button id="swBtn" onclick="SW.toggle()" style="padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:800;background:rgba(52,211,153,0.15);color:#34d399;letter-spacing:0.06em;">▶ Start</button>
      <button onclick="SW.lap()" style="padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:12px;font-weight:800;background:transparent;color:#64748b;letter-spacing:0.06em;">Lap</button>
      <button onclick="SW.reset()" style="padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:800;background:rgba(239,68,68,0.1);color:#f87171;letter-spacing:0.06em;">Reset</button>
    </div>
    <div id="swLaps" style="margin-top:12px;max-height:120px;overflow-y:auto;"></div>
  `;
  container.appendChild(el);
}

<script>
// ── SESSION PROGRESS BAR ──
function updateProgress() {
  const all = document.querySelectorAll('.ex-card, .ss-ex');
  const done = document.querySelectorAll('.ex-card.checked, .ss-ex.checked');
  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;
  const fill = document.getElementById('progFill');
  if (fill) fill.style.width = pct + '%';
}
// Observe DOM for check changes
const _progObs = new MutationObserver(updateProgress);
document.addEventListener('DOMContentLoaded', function() {

  if (app) _progObs.observe(app, {subtree:true, attributes:true, attributeFilter:['class']});

});

<script>
// ── REPLACE EXERCISE ──
(function() {
  const REPLACE_KEY = 'mc_replacements';
  function applyReplacements() {
    const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';
        if (!card.querySelector('.replaced-badge')) {
          const badge = document.createElement('span');
          badge.className = 'replaced-badge';
          badge.style.cssText = 'font-size:9px;font-weight:900;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:2px 5px;margin-left:6px;letter-spacing:0.06em;vertical-align:middle;';
          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // Long press to replace
  let pressTimer;
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.ex-card, .ex-item, .lift-card');
    if (!card) return;
    pressTimer = setTimeout(function() {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.dataset.orig || nameEl.textContent.trim();
      nameEl.dataset.orig = origName;
      // Navigate to library with exercise pre-selected
      const url = 'exercise-library.html?replace=' + encodeURIComponent(origName);
      if (confirm('Replace "' + origName.substring(0,40) + '"?\nTap OK to open Exercise Library.')) {
        window.location.href = url;
      }
    }, 600);
  }, {passive: true});
  document.addEventListener('touchend', function() { clearTimeout(pressTimer); }, {passive: true});
  document.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, {passive: true});
})();
</script>

<script>
/* ── WAVE3-SETLOG MODULE ── */
(function(){
  var SKEY='mc_setlog_v1';
  var PID=location.pathname.split('/').pop().replace('.html','');
  function store(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return{}}}
  function ek(id){return PID+'|'+id}
  function saveSet(exId,sn,w,r){
    var s=store(),k=ek(exId);if(!s[k])s[k]=[];
    var d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var sess=s[k][0];
    if(!sess||sess.d!==d){sess={d:d,sets:{}};s[k].unshift(sess);s[k]=s[k].slice(0,20);}
    sess.sets[sn]={w:w,r:r};localStorage.setItem(SKEY,JSON.stringify(s));
  }
  function lastSess(exId){var s=store();return(s[ek(exId)]||[])[0]||null;}
  function lastSet(exId,sn){var sess=lastSess(exId);return sess?sess.sets[sn]||null:null;}
  function renderHist(exId){
    var el=document.getElementById('slh-'+exId);if(!el)return;
    var sess=lastSess(exId);if(!sess){el.textContent='';return;}
    var ws=Object.values(sess.sets).map(function(s){return parseFloat(s.w)||0;}).filter(Boolean);
    el.textContent=ws.length?'Last: '+Math.max.apply(null,ws)+' lb \u00b7 '+sess.d:sess.d;
  }
  function pCount(s){
    if(!s)return 3;
    var x=s.match(/^(\d+)\s*[x\u00d7]/i);if(x)return Math.min(parseInt(x[1]),10);
    var c=s.split(',');if(c.length>1)return c.length;
    var n=s.match(/^(\d+)/);return n?Math.min(parseInt(n[1]),8):3;
  }
  function pReps(s,i){
    if(!s)return'';
    var c=s.split(',');if(c.length>1)return(c[i]||c[c.length-1]).trim();
    var x=s.match(/[x\u00d7](\d+)/i);if(x)return x[1];return'';
  }
  function buildRows(exId,setsStr,restSecs){
    var n=pCount(setsStr),h='';
    h+='<div class="setlog-hdr"><div class="setlog-hl">SET</div><div class="setlog-hl">WEIGHT</div><div class="setlog-hl">REPS</div><div class="setlog-hl"></div></div>';
    for(var i=0;i<n;i++){
      var sn=i+1,last=lastSet(exId,sn),pr=pReps(setsStr,i);
      var wp=last&&last.w?last.w+' lb':'lb';
      var rp=pr||(last&&last.r?last.r:'reps');
      h+='<div class="set-row" id="sr-'+exId+'-'+sn+'">'+
        '<div class="set-num">'+sn+'</div>'+
        '<input class="set-input" id="slw-'+exId+'-'+sn+'" type="number" inputmode="decimal" placeholder="'+wp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<input class="set-input" id="slr-'+exId+'-'+sn+'" type="number" inputmode="numeric" placeholder="'+rp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<div class="set-check" id="slc-'+exId+'-'+sn+'" onclick="event.stopPropagation();_SL(\''+exId+'\','+sn+','+restSecs+')" title="Done">\u2610</div>'+
        '</div>';
    }
    return h;
  }
  function checkSet(exId,sn,restSecs){
    var wEl=document.getElementById('slw-'+exId+'-'+sn);
    var rEl=document.getElementById('slr-'+exId+'-'+sn);
    var ck=document.getElementById('slc-'+exId+'-'+sn);
    var row=document.getElementById('sr-'+exId+'-'+sn);
    if(!ck)return;
    if(ck.classList.contains('done')){
      ck.classList.remove('done');ck.innerHTML='\u2610';
      if(row)row.classList.remove('done-row');return;
    }
    saveSet(exId,sn,wEl?wEl.value.trim():'',rEl?rEl.value.trim():'');
    ck.classList.add('done');ck.textContent='\u2713';
    if(row)row.classList.add('done-row');
    if(restSecs>0&&typeof TMR!=='undefined'){
      var t=document.querySelector('.rest-timer');
      if(t)TMR.start(t,restSecs,'Rest');
    }
    renderHist(exId);
  }
  window._SL=checkSet;
  function getRestSecs(card){
    var t=card.querySelector('.rest-timer');
    if(t&&t.dataset&&t.dataset.rest&&typeof TMR!=='undefined')return TMR.parseSeconds(t.dataset.rest)||60;
    return 60;
  }
  function attachLogger(content,exId,setsStr,restSecs){
    if(!content||content.querySelector('.setlog-toggle'))return;
    var old=content.querySelector('.ex-notes-toggle,.ex-notes-wrap,.log-row');
    while(old){old.remove();old=content.querySelector('.ex-notes-toggle,.ex-notes-wrap,.log-row');}
    var tgl=document.createElement('div');
    tgl.className='setlog-toggle';tgl.id='slt-'+exId;
    tgl.innerHTML='<span id="sla-'+exId+'">\u25be</span>&nbsp;<span id="sll-'+exId+'">LOG SETS</span><span class="setlog-hist" id="slh-'+exId+'"></span>';
    tgl.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var wrap=document.getElementById('slwrap-'+exId);if(!wrap)return;
      var open=wrap.classList.toggle('open');
      document.getElementById('sll-'+exId).textContent=open?'HIDE':'LOG SETS';
      document.getElementById('sla-'+exId).textContent=open?'\u25b4':'\u25be';
    });
    var wrap=document.createElement('div');
    wrap.className='setlog-wrap';wrap.id='slwrap-'+exId;
    wrap.innerHTML=buildRows(exId,setsStr,restSecs);
    wrap.addEventListener('click',function(e){e.stopPropagation();});
    content.appendChild(tgl);
    content.appendChild(wrap);
    renderHist(exId);
  }
  function initLogger(){
    document.querySelectorAll('.ex-card[data-id]').forEach(function(card){
      var exId=card.dataset.id;
      var content=card.querySelector('.ex-content');if(!content)return;
      var setsEl=card.querySelector('.ex-sets');
      attachLogger(content,exId,setsEl?setsEl.textContent.trim():'3x10',getRestSecs(card));
    });
    document.querySelectorAll('.ss-ex[data-id]').forEach(function(row){
      var exId=row.dataset.id;
      var content=row.querySelector('.ss-content');if(!content)return;
      var setsEl=row.querySelector('.ex-sets');
      attachLogger(content,exId,setsEl?setsEl.textContent.trim():'4x12',90);
    });
  }
  function watchForCards(){
    var app=document.getElementById('app');
    if(!app){setTimeout(watchForCards,100);return;}
    if(app.querySelector('.ex-card')){initLogger();return;}
    var obs=new MutationObserver(function(muts,o){
      if(app.querySelector('.ex-card')){o.disconnect();setTimeout(initLogger,50);}
    });
    obs.observe(app,{childList:true,subtree:true});
    setTimeout(initLogger,600);
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',watchForCards);
  }else{
    watchForCards();
  }
})();
</script>
