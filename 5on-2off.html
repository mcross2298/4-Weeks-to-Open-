<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;padding-bottom:40px;}
.app{background:linear-gradient(135deg,#0a0f04 0%,#15803d 50%,#0a0f04 100%);min-height:100vh;}
.back-link{position:absolute;top:18px;left:18px;color:#86efac;text-decoration:none;font-size:13px;font-weight:600;background:rgba(132,204,22,0.18);padding:6px 12px;border-radius:20px;border:1px solid rgba(132,204,22,0.4);z-index:10;}
.back-link:active{background:rgba(132,204,22,0.3);}
.header{background:linear-gradient(90deg,#15803d,#0a0f04);padding:60px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.18em;color:#86efac;text-transform:uppercase;margin-bottom:6px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.schedule{display:inline-block;background:rgba(132,204,22,0.18);border:1px solid rgba(132,204,22,0.4);border-radius:6px;padding:4px 10px;font-size:12px;color:#86efac;font-weight:600;}
.content{max-width:680px;margin:24px auto 0;padding:0 16px;}
.hint{font-size:11px;color:#86efac;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
body .day-card{background:var(--card-bg);border-radius:14px;border:2px solid var(--border-dim);box-shadow:0 4px 20px rgba(0,0,0,0.15);margin-bottom:12px;overflow:hidden;transition:all 0.2s;}
.day-card.open{box-shadow:0 4px 20px rgba(132,204,22,0.15);}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
.day-icon{width:42px;height:42px;border-radius:11px;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff;font-weight:900;box-shadow:0 2px 10px #22c55e66;}
.day-info{flex:1;}
.day-session{font-weight:900;font-size:14px;color:var(--text);letter-spacing:-0.01em;}
.day-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.day-toggle{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.08);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.day-card.open .day-toggle{color:#fff;background:#22c55e;}
.exercises{padding:8px 14px 14px;border-top:1px solid #22c55e33;display:none;}
.day-card.open .exercises{display:block;}
.day-card.open{border-color:#22c55e;}
.day-card.open .day-header{background:#22c55e10;}
.ex-item{display:flex;gap:10px;align-items:center;padding:10px 12px;background:rgba(134,239,172,0.06);border-radius:8px;border:1px solid rgba(134,239,172,0.3);margin-bottom:6px;cursor:pointer;transition:all 0.15s;user-select:none;}
.ex-item:active{transform:scale(0.98);}
.ex-item.checked{opacity:0.6;}
.ex-item.checked .ex-name{text-decoration:line-through;color:#16a34a;}
.ex-item.checked .checkbox{background:#16a34a;border-color:#16a34a;}
.ex-item.checked .checkbox::after{content:"✓";color:#fff;font-weight:900;font-size:12px;}
.checkbox{width:20px;height:20px;border:2px solid rgba(134,239,172,0.5);border-radius:5px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-name{font-weight:700;font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.ex-sets{background:#15803d;color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:5px;flex-shrink:0;letter-spacing:0.02em;white-space:nowrap;}

.rest-pill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;
  padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;
  background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);
  color:#64748b;transition:all 0.15s;vertical-align:middle;}
.rest-pill:active{transform:scale(0.95);}
.rest-pill.running{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.35);color:#fbbf24;animation:rp 1s ease-in-out infinite;}
.rest-pill.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.35);color:#34d399;}
.rest-pill.over{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.35);color:#f87171;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.65;}}
.tf{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,16,0.96);backdrop-filter:blur(16px);
  border-radius:20px;padding:14px 24px;display:none;flex-direction:column;
  align-items:center;gap:4px;border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:200;min-width:200px;}
.tf.on{display:flex;}
.tf-lbl{font-size:11px;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.tf-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.tf-time.done{color:#34d399;}.tf-time.over{color:#f87171;}
.tf-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.tf-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.tf-prog{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;}
.tf-prog.done{background:#34d399;}.tf-prog.over{background:#f87171;}
.tf-btns{display:flex;gap:8px;margin-top:8px;}
.tf-btn{padding:7px 16px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.tf-done{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.tf-cancel{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}

.rest-timer{
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
  padding:4px 10px;border-radius:8px;
  transition:all 0.15s;position:relative;
}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.rest-timer-icon{font-size:13px;}
.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;}
.rest-timer.idle .rest-timer-label{color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}
.rest-timer.overtime .rest-timer-label{color:#f87171;}
.rest-timer-hint{font-size:11px;color:#475569;margin-top:2px;font-style:italic;}

/* Floating timer display — shows when running */
.timer-float{position:fixed;bottom:0;left:0;right:0;width:100%;height:64px;background:rgba(10,10,10,0.97);backdrop-filter:blur(16px);display:none;flex-direction:row;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;border-top:1px solid rgba(255,255,255,0.1);box-shadow:0 -4px 24px rgba(0,0,0,0.6);z-index:100;}
.timer-float.visible{display:flex;}
.timer-float-label{font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.timer-float-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.timer-float-time.done{color:#34d399;}
.timer-float-time.overtime{color:#f87171;}
.timer-float-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.timer-float-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-float-progress{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;width:100%;}
.timer-float-progress.done{background:#34d399;}
.timer-float-progress.overtime{background:#f87171;}
.timer-float-actions{display:flex;gap:8px;margin-top:6px;}
.timer-float-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.timer-float-skip{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.timer-float-reset{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
.sum-section{margin:32px 16px 0;}.sum-hd{font-size:11px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#22c55e;margin-bottom:12px;display:flex;align-items:center;gap:8px;}.sum-card{border-radius:14px;padding:16px;margin-bottom:32px;}.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;opacity:0.8;}.sum-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #ffffff08;}.sum-row:last-of-type{border-bottom:none;}.sum-ico{font-size:14px;width:22px;text-align:center;flex-shrink:0;}.sum-nm{flex:1;font-size:12px;font-weight:600;color:#e2e8f0;}.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}.sum-st{font-size:11px;font-weight:800;}.sum-rp{font-size:11px;font-weight:600;opacity:0.75;}.sum-div{height:1px;margin:14px 0;}.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.sum-tot{border-radius:10px;padding:10px 8px;text-align:center;}.sum-tv{font-size:13px;font-weight:900;letter-spacing:-0.01em;}.sum-tl{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;opacity:0.7;}

.prog-bar-wrap{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:rgba(255,255,255,0.06);}
.prog-bar-fill{height:3px;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width 0.4s ease;border-radius:0 2px 2px 0;}
.timer-presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.timer-preset{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.05em;}
.timer-preset:active{background:rgba(212,175,55,0.2);color:#fbbf24;border-color:rgba(212,175,55,0.4);}

/* — WAVE3-SETLOG — */
.setlog-wrap{margin-top:8px;border-top:1px solid rgba(255,255,255,0.07);padding-top:2px;display:none;}
.setlog-wrap.open{display:block;}
.setlog-toggle{display:flex;align-items:center;gap:5px;margin-top:8px;cursor:pointer;user-select:none;font-size:11px;font-weight:900;color:#475569;letter-spacing:0.08em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.setlog-hist{font-size:11px;font-weight:700;color:rgba(212,175,55,0.6);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.sl-row{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;align-items:center;padding:6px 2px;border-bottom:1px solid rgba(255,255,255,0.04);}
.sl-row:last-child{border-bottom:none;}
.sl-num{font-size:11px;font-weight:900;color:#475569;text-align:center;}
.sl-inp{width:100%;padding:6px 4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#e2e8f0;font-size:13px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent;}
.sl-inp:focus{border-color:rgba(212,175,55,0.45);background:rgba(212,175,55,0.06);}
.sl-inp::placeholder{color:#2d3748;font-size:11px;}
.sl-ck{width:30px;height:30px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.sl-ck.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);}
.sl-row.sl-done .sl-inp{opacity:0.4;}
.sl-hdr{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;padding:3px 2px 1px;}
.sl-hl{font-size:11px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#2d3748;text-align:center;}

/* ── FINISH-WORKOUT ── */
.fw-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.07);
  z-index:40;display:flex;gap:10px;align-items:center;
}
.fw-btn{
  flex:1;padding:13px;
  background:#d4af37;border:none;border-radius:12px;
  color:#000;font-size:15px;font-weight:900;
  cursor:pointer;font-family:inherit;letter-spacing:0.03em;
  -webkit-tap-highlight-color:transparent;
}
.fw-btn:active{opacity:0.85;transform:scale(0.98);}
.fw-progress{
  font-size:11px;font-weight:700;color:#475569;
  white-space:nowrap;letter-spacing:0.04em;
}
.fw-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;padding:16px;z-index:60;
}
.fw-modal-overlay.open{display:flex;}
.fw-modal{
  width:100%;background:#0e0e0e;
  border:1px solid rgba(255,255,255,0.1);border-radius:20px;
  padding:24px 20px 20px;
}
.fw-modal-title{font-size:20px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;}
.fw-modal-sub{font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.5;}
.fw-summary{background:#111;border-radius:12px;padding:14px;margin-bottom:16px;}
.fw-summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.fw-summary-row:last-child{border-bottom:none;}
.fw-summary-label{color:#64748b;font-weight:600;}
.fw-summary-val{color:#fff;font-weight:800;}
.fw-modal-btns{display:flex;gap:10px;}
.fw-cancel{flex:1;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.fw-confirm{flex:2;padding:12px;background:#d4af37;border:none;border-radius:12px;color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:0.02em;}
.fw-auto-banner{
  position:fixed;top:0;left:0;right:0;
  background:rgba(52,211,153,0.12);border-bottom:1px solid rgba(52,211,153,0.3);
  padding:12px 16px;text-align:center;
  font-size:13px;font-weight:800;color:#34d399;
  z-index:50;display:none;letter-spacing:0.02em;
  cursor:pointer;
}
.fw-auto-banner.show{display:block;}

</style>

<script>// ── TIMER ENGINE ──
buildTimerFloat();

function makeRestTimer(r, n) {
  var s = TMR.parseSeconds(r);
  if (!s) return '<span style="opacity:0.5">' + r + '</span>';
  var nm = (n||'').substring(0,25).replace(/['"/\\]/g,'');
  return '<span class="rest-timer idle" data-rest="' + r + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + s + ',&quot;' + nm + '&quot;)" ' +
    'title="Tap to start">' +
    '<span class="rest-timer-label">' + r + '</span></span>';
}


const DATA = {"days": [{"name": "Day 1 — Back & Biceps", "icon": "💪", "exercises": [{"name": "HIIT Cardio", "sets": "15 min"}, {"name": "Pull-ups", "sets": "4 × failure"}, {"name": "Deadlifts", "sets": "5 × 4–6"}, {"name": "T-Bar Row", "sets": "4 × 8–12"}, {"name": "Lat Pulldown (drop set)", "sets": "3 × 12–15"}, {"name": "Seated Alternating DB Curl", "sets": "3 × 8–12"}, {"name": "Cable Curl", "sets": "3 × 8–12"}, {"name": "DB Preacher Curl", "sets": "3 × 8–12"}, {"name": "Post Cardio Low Intensity", "sets": "30 min"}]}, {"name": "Day 2 — Chest & Triceps", "icon": "💚", "exercises": [{"name": "HIIT Cardio", "sets": "15 min"}, {"name": "Cable Crossover (drop set)", "sets": "3 × 12–15"}, {"name": "Bench", "sets": "4 × 8–12"}, {"name": "Incline Hammer Press (drop set)", "sets": "4 × 8–12"}, {"name": "Pushups", "sets": "5 × failure"}, {"name": "Skullcrushers", "sets": "4 × 8–12"}, {"name": "V Grip Pressdown (drop set)", "sets": "3 × 12–15"}, {"name": "Rope Pressdown", "sets": "3 × 8–12"}, {"name": "Low Intensity Cardio", "sets": "20–30 min"}]}, {"name": "Day 3 — Legs", "icon": "🦵", "exercises": [{"name": "Low Intensity Cardio", "sets": "5–10 min"}, {"name": "Squat", "sets": "5 × 8–10"}, {"name": "Leg Press", "sets": "3 × 8–12"}, {"name": "Hack Squat", "sets": "3 × 8–12"}, {"name": "Leg Extensions (drop set)", "sets": "3 × 20–25"}, {"name": "Leg Curl (drop set)", "sets": "5 × 12–15"}, {"name": "Seated Calf Raises", "sets": "5 × 12–15"}, {"name": "Low Intensity Cardio", "sets": "20–30 min"}]}, {"name": "Day 4 — Shoulders & Abs", "icon": "🏔️", "exercises": [{"name": "Pre Cardio HIIT", "sets": "15 min"}, {"name": "Reverse Pec Deck", "sets": "3 × 12–15"}, {"name": "DB Side Raises", "sets": "3 × 12–15"}, {"name": "DB Front Raises", "sets": "3 × 8–12"}, {"name": "Machine Shoulder Press", "sets": "4 × 8–12"}, {"name": "Cable Upright Row (drop set)", "sets": "3 × 12–15"}, {"name": "Barbell Shrugs", "sets": "5 × 12–15"}, {"name": "Hanging Leg Raises / Ab Wheel", "sets": "100 / 50 reps"}, {"name": "Post Cardio", "sets": "20–30 min"}]}, {"name": "Day 5 — Biceps & Triceps", "icon": "💪", "exercises": [{"name": "HIIT Cardio", "sets": "15 min"}, {"name": "Barbell Curl (drop set)", "sets": "5 × 8–10"}, {"name": "Reverse Grip Barbell Curl", "sets": "3 × 12–15"}, {"name": "Hammer Curl", "sets": "3 × 8–12"}, {"name": "Close Grip Smith Bench (drop set)", "sets": "5 × 8–10"}, {"name": "DB Kickback", "sets": "3 × 8–12"}, {"name": "DB Overhead Extensions", "sets": "3 × 12–15"}, {"name": "DB Wrist Curl", "sets": "3 × 25"}, {"name": "Cardio", "sets": "20–30 min"}]}]};
let openDayIdx = null;
const checkState = {};

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderDay(day,dIdx){
  const isOpen=openDayIdx===dIdx;
  const exHtml=day.exercises.map((ex,eIdx)=>{
    const id=`d${dIdx}e${eIdx}`;
    const checked=checkState[id]?"checked":"";
    return `<div class="ex-item ${checked}" data-id="${id}">
      <div class="checkbox"></div>
      <span class="ex-name">${escapeHtml(ex.name)}</span>
      <span class="ex-sets">${escapeHtml(ex.sets)}</span>
    <div style="margin-top:4px;">${makeRestTimer(ex.rest||"60 sec",ex.name)}</div>
    </div>`;
  }).join("");
  return `<div class="day-card ${isOpen?'open':''}" data-d="${dIdx}">
    <div class="day-header">
      <div class="day-icon">${day.icon}</div>
      <div class="day-info">
        <div class="day-session">${escapeHtml(day.name)}</div>
        <div class="day-meta">${day.exercises.length} exercises</div>
      </div>
      <div class="day-toggle">${isOpen?'▲':'▼'}</div>
    </div>
    <div class="exercises">${exHtml}</div>
  </div>`;
}


function _restFor(name, tag){
  const compounds=['squat','deadlift','bench','barbell row','pendlay','rdl','romanian',
    'hack squat','leg press','military','overhead press','pull-up','pullup','chin','high pull',
    'hang clean','power clean','trap bar','incline press','decline press'];
  if(tag==='SUPERSET'||tag==='TRI-SET') return {secs:120,lbl:'120 sec'};
  const n=name.toLowerCase();
  for(const c of compounds){if(n.includes(c))return {secs:105,lbl:'90-120 sec'};}
  return {secs:60,lbl:'60 sec'};
}
function render(){
  const days=DATA.days.map((d,i)=>renderDay(d,i)).join("");
  document.getElementById("app").innerHTML=`
    <div class="header">
      <a href="cat-gainz.html" class="back-link">← Back</a>
      <div class="header-inner">
        <div class="eyebrow">5 On / 2 Off</div>
        <div class="title">5-on-2-off</div>
        <div><span class="schedule">Classic 5-Day Split</span></div>
      </div>
    </div>
    <div class="content">
      <div class="hint">Tap a day to expand · Tap exercises to check off</div>
      ${days}
    </div>`;
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll(".day-card").forEach(card=>{
    const header=card.querySelector(".day-header");
    header.addEventListener("click",e=>{
      if(e.target.classList.contains("ex-item")||e.target.closest(".ex-item"))return;
      const dIdx=parseInt(card.dataset.d);
      openDayIdx=openDayIdx===dIdx?null:dIdx;
      render();
    });
  });
  document.querySelectorAll(".ex-item").forEach(item=>{
    item.addEventListener("click",e=>{
      e.stopPropagation();
      const id=item.dataset.id;
      checkState[id]=!checkState[id];
      item.classList.toggle("checked");
    });
  });
}

render();
if(typeof updateProgress!=="undefined")updateProgress();

const _T={iv:null,st:null,dur:0,el:null,nm:'',
  fmt(s){const n=s<0,a=Math.abs(s),m=Math.floor(a/60),sc=a%60;return(n?'+':'')+(m>0?m+':'+String(sc).padStart(2,'0'):sc+'s');},
  parse(s){if(!s||s==='—')return 0;s=s.toLowerCase();
    let r=0;const mm=s.match(/(\d+)\s*min/),ss=s.match(/(\d+)\s*sec/);
    if(mm)r+=parseInt(mm[1])*60;if(ss)r+=parseInt(ss[1]);
    if(!r){const p=s.match(/^(\d+)/);if(p)r=parseInt(p[1]);}return r;},
  buzz(){try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=i===2?880:660;
      g.gain.setValueAtTime(0.4,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.25);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+0.25);});}catch(e){}},
  stop(){clearInterval(this.iv);this.iv=null;
    if(this.el){this.el.className='rest-pill';this.el.querySelector('span').textContent=this.el.dataset.lbl;this.el=null;}
    const f=document.getElementById('_tf');if(f)f.classList.remove('on');},
  start(el,secs,nm){this.stop();this.dur=secs;this.st=Date.now();this.el=el;this.nm=nm;
    el.className='rest-pill running';
    const f=document.getElementById('_tf');
    if(f){f.querySelector('._tf_lbl').textContent='REST';
      f.querySelector('._tf_ex').textContent=nm;
      f.querySelector('._tf_time').className='tf-time';
      f.querySelector('._tf_prog').className='tf-prog';
      f.querySelector('._tf_prog').style.width='100%';
      f.classList.add('on');}
    this.iv=setInterval(()=>{
      const rem=Math.ceil(this.dur-(Date.now()-this.st)/1000);
      if(el)el.querySelector('span').textContent=this.fmt(rem);
      const ft=document.querySelector('._tf_time'),fp=document.querySelector('._tf_prog'),fl=document.querySelector('._tf_lbl');
      if(ft)ft.textContent=this.fmt(rem);
      if(rem>0){const p=(rem/this.dur)*100;if(fp)fp.style.width=p+'%';
        if(ft)ft.className='tf-time';if(fp)fp.className='tf-prog';if(el)el.className='rest-pill running';}
      else if(rem===0){this.buzz();if(ft)ft.className='tf-time done';if(fp)fp.className='tf-prog done';
        if(fp)fp.style.width='100%';if(fl)fl.textContent='DONE!';if(el)el.className='rest-pill done';}
      else{if(ft){ft.textContent='+'+this.fmt(-rem);ft.className='tf-time over';}
        if(fp)fp.className='tf-prog over';if(fl)fl.textContent='OVERTIME';if(el)el.className='rest-pill over';}
    },1000);},
  toggle(el,secs,nm){this.el===el&&this.iv?this.stop():this.start(el,secs,nm);}};

function _initTF(){if(document.getElementById('_tf'))return;
  const d=document.createElement('div');d.id='_tf';d.className='tf';
  d.innerHTML='<div class="_tf_lbl tf-lbl">REST</div><div class="_tf_time tf-time">0s</div>'+
    '<div class="_tf_ex tf-ex"></div><div class="tf-bar"><div class="_tf_prog tf-prog"></div></div>'+
    '<div class="tf-btns"><button class="tf-btn tf-done" onclick="_T.stop()">✓ Done</button>'+
    '<button class="tf-btn tf-cancel" onclick="_T.stop()">✕ Cancel</button></div>';
  document.body.appendChild(d);}

function _rp(secs,label,name){
  return '<span class="rest-pill" data-lbl="'+label+'" '+
    'onclick="_initTF();_T.toggle(this,'+secs+',\''+name.replace(/'/g,"\'").substring(0,25)+'\')" '+
    'title="Tap to start rest timer">⏱ <span>'+label+'</span></span>';}

</script>
