<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battle Ropes</title>
<style>
:root{--accent:#2dd4bf;--accent-rgb:45,212,191;}
.header{background:linear-gradient(135deg,#00302e,#001a1a);}
.schedule{display:inline-block;background:rgba(var(--accent-rgb),0.15);border:1px solid rgba(var(--accent-rgb),0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:700;}
.tabs-bar{background:var(--body-bg);border-bottom:1px solid rgba(var(--accent-rgb),0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;border:none;cursor:pointer;font-weight:800;font-size:12px;background:transparent;color:#334155;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.04em;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.workout-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.01em;}
.workout-note{font-size:12px;color:#94a3b8;margin-bottom:16px;line-height:1.5;background:rgba(var(--accent-rgb),0.06);border-left:3px solid rgba(var(--accent-rgb),0.4);padding:10px 14px;border-radius:0 6px 6px 0;}
.section-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:900;letter-spacing:0.2em;padding:5px 14px;border-radius:6px;margin:18px 0 12px;text-transform:uppercase;color:#fff;}
.ex-sets-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ex-tempo{display:inline-block;background:rgba(255,255,255,0.05);color:#64748b;font-size:11px;font-weight:800;padding:3px 7px;border-radius:5px;font-family:monospace;border:1px solid rgba(255,255,255,0.08);}
.rest-pill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);color:#64748b;transition:all 0.15s;vertical-align:middle;}
.rest-pill:active{transform:scale(0.95);}
.rest-pill.running{background:rgba(var(--accent-rgb),0.15);border-color:rgba(var(--accent-rgb),0.35);color:var(--accent);animation:rp 1s ease-in-out infinite;}
.rest-pill.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.35);color:#34d399;}
.rest-pill.over{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.35);color:#f87171;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.65;}}
</style>
<link rel="stylesheet" href="base.css"/>
<link rel="stylesheet" href="mc-card-actions.css"/>
<link rel="stylesheet" href="mc-nav.css"/>
<link rel="stylesheet" href="mc-summary.css"/>

<div id="app"></div>
<script>
let activeLevel = 0;
const checkState = {};

const ROPE_MOVEMENTS = [
  'Alternating Waves (Small/Fast)',
  'Double Arm Waves (Small/Fast)',
  'Alternating Waves 2.0 (Large/Exaggerated)',
  'Double Arm Waves 2.0 (Large/Exaggerated)',
  'Snake Waves (Small/Fast)',
  'Snake Waves (Large/Exaggerated)',
  'Clockwise Waves',
  'Counter-Clockwise Waves',

const LEVELS = [
  {
    id: 'basic',
    label: 'Basic',
    name: 'Battle Ropes Phase 1 — Basic',
    rounds: 2,
    workOn: '30 sec',
    workOff: '30 sec',
    metas: [{cls:'lm-green',t:'Phase 1 · Basic'},{cls:'lm-red',t:'30s On / 30s Off'},{cls:'lm-orange',t:'2 Rounds'}],
    emom: {reps: 25, exercise: 'Push-Ups', duration: 10, placement: 'after_ropes', note: 'EMOM — every minute on the minute · 25 push-ups · 10 minutes'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 movements × 2 rounds × 30 sec = 8 min'},
      {icon:'💪',label:'EMOM Push-Ups',value:'25 reps × 10 min = 250 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (30s × 8 sets × 2 rounds)',value:'8 min rest'},
    ],
    grand: '~31 min total',
  },
  {
    id: 'inter',
    label: 'Intermediate',
    name: 'Battle Ropes — Intermediate',
    rounds: 2,
    workOn: '1 min',
    workOff: '30 sec',
    metas: [{cls:'lm-orange',t:'Intermediate'},{cls:'lm-red',t:'1 min On / 30s Off'},{cls:'lm-orange',t:'2 Rounds'}],
    emom: {reps: 25, exercise: 'Push-Ups', duration: 10, placement: 'after_ropes', note: 'EMOM — every minute on the minute · 25 push-ups · 10 minutes'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 movements × 2 rounds × 1 min = 16 min'},
      {icon:'💪',label:'EMOM Push-Ups',value:'25 reps × 10 min = 250 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (30s × 8 sets × 2 rounds)',value:'8 min rest'},
    ],
    grand: '~39 min total',
  },
  {
    id: 'adv1',
    label: 'Advanced L1',
    name: 'Battle Ropes — Advanced Level 1',
    rounds: 2,
    workOn: '30 sec',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L1'},{cls:'lm-red',t:'30s On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Between Sets'}],
    emom: {reps: 20, exercise: 'Push-Ups', duration: null, placement: 'between_sets', note: 'EMOM 20 push-ups — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 30 sec = 8 min'},
      {icon:'💪',label:'EMOM Push-Ups (between sets)',value:'20 reps × 8 sets × 2 rounds = 320 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~37 min total',
  },
  {
    id: 'adv2',
    label: 'Advanced L2',
    name: 'Battle Ropes — Advanced Level 2',
    rounds: 2,
    workOn: '1 min',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L2'},{cls:'lm-red',t:'1 min On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Between Sets'}],
    emom: {reps: 20, exercise: 'Push-Ups', duration: null, placement: 'between_sets', note: 'EMOM 20 push-ups — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 1 min = 16 min'},
      {icon:'💪',label:'EMOM Push-Ups (between sets)',value:'20 reps × 8 sets × 2 rounds = 320 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~45 min total',
  },
  {
    id: 'adv3',
    label: 'Advanced L3',
    name: 'Battle Ropes — Advanced Level 3',
    rounds: 2,
    workOn: '30 sec',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L3'},{cls:'lm-red',t:'30s On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Burpees'}],
    emom: {reps: 8, exercise: 'Burpees', duration: null, placement: 'between_sets', note: 'EMOM 8 burpees — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 30 sec = 8 min'},
      {icon:'💀',label:'EMOM Burpees (between sets)',value:'8 burpees × 8 sets × 2 rounds = 128 burpees'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~37 min total',
  },
];

function renderLevel(lv) {
  const prefix = lv.id;

  // Rope movement cards
  const ropeCards = ROPE_MOVEMENTS.map((mv, i) => {
    const id = prefix + '-r' + i;
    const ck = checkState[id] ? 'checked' : '';
    const emomNote = (lv.emom.placement === 'between_sets' && i < 8)
      ? `<div class="ex-note">⚡ EMOM after this set: ${lv.emom.reps} ${lv.emom.exercise}</div>` : '';
    return `<div class="ex-card ${ck}" data-id="${id}">
      <div class="ex-row">
        <div class="ex-num">${i+1}</div>
        <div class="ex-content">
          <div class="ex-name">${mv}</div>
          <div class="ex-tags">
            <span class="tag tag-on">⚡ ${lv.workOn} on</span>
            <span class="tag tag-off">⏸️ ${lv.workOff} off</span>
            <span class="tag tag-rounds">${lv.rounds} rounds</span>
          </div>
          ${emomNote}
        </div>
      </div>
    </div>`;
  }).join('');

  // EMOM block
  const emomHtml = `<div class="emom-card">
    <div class="emom-title">⚡ EMOM — ${lv.emom.reps} ${lv.emom.exercise}</div>
    <div class="emom-detail">${lv.emom.note}</div>
  </div>`;

  // Finisher
  const finId = prefix + '-fin';
  const finCk = checkState[finId] ? 'checked' : '';
  const finisherHtml = `<div class="ex-card ${finCk}" data-id="${finId}">
    <div class="ex-row">
      <div class="ex-num">🏁</div>
      <div class="ex-content">
        <div class="ex-name">Jump Rope — Finisher</div>
        <div class="ex-tags"><span class="tag tag-finisher">🏁 ${lv.finisher.mins} minutes</span></div>
        <div class="ex-note">Steady pace · cool down · full ${lv.finisher.mins} minutes</div>
      </div>
    </div>
  </div>`;

  // Totals
  const totalRows = lv.totals.map(t => `
    <div class="total-row">
      <div class="total-label"><span class="total-icon">${t.icon}</span>${t.label}</div>
      <div class="total-value">${t.value}</div>
    </div>`).join('');

  const metas = lv.metas.map(m => `<span class="lmeta ${m.cls}">${m.t}</span>`).join('');

  return `
    <div class="level-header">
      <div class="level-name">${lv.name}</div>
      <div class="level-meta">${metas}</div>
    </div>
    <div class="section-head">Battle Rope Gauntlet</div>
    ${ropeCards}
    <div class="section-head">EMOM</div>
    ${emomHtml}
    <div class="section-head">Finisher</div>
    ${finisherHtml}
    <div class="section-head">Totals</div>
    <div class="totals-card">
      <div class="totals-title">📊 Workout Totals</div>
      ${totalRows}
      <div class="total-divider"></div>
      <div class="grand-row">
        <div class="grand-label">⏱️ Total Time</div>
        <div class="grand-value">${lv.grand}</div>
      </div>
    </div>`;
}

function render() {
  const lv = LEVELS[activeLevel];
  const tabs = LEVELS.map((l, i) =>
    `<button class="tab ${i === activeLevel ? 'active' : ''}" data-i="${i}">${l.label}</button>`
  ).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <a href="cat-faint.html" class="back-link">← Back</a>
      <div class="header-inner">
        <div class="eyebrow">🪢 Not for the Faint of Heart</div>
        <div class="title">Battle Ropes</div>
        <div class="overview-pills">
          <span class="pill">5 Levels</span>
          <span class="pill">2 Rounds Gauntlet</span>
          <span class="pill">EMOM Included</span>
        </div>
      </div>
    </div>
    <div class="tabs-bar"><div class="tabs">${tabs}</div></div>
    <div class="content">
      <div id="swContainer" style="max-width:680px;margin:0 auto;padding:0 16px;">

</div>
<div class="tap-hint">Tap any exercise to check off</div>
      ${renderLevel(lv)}
    </div>`;

  document.querySelectorAll('.tab').forEach(b => {
    b.addEventListener('click', () => { activeLevel = parseInt(b.dataset.i); render(); });
  });
  document.querySelectorAll('.ex-card').forEach(c => {
    c.addEventListener('click', () => {
      const id = c.dataset.id;
      checkState[id] = !checkState[id];
      c.classList.toggle('checked');
    });
  });
}
render();
if(typeof updateProgress!=="undefined")updateProgress();
buildStopwatch(document.getElementById('swContainer'));

// ── TIMER ENGINE ──────────────────────────────────────────────────
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',
  _autoDismiss: null,

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    const _sov=document.getElementById('timerOverlay');if(_sov)_sov.style.display='block';
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
        if(!this._autoDismiss)this._autoDismiss=setTimeout(()=>this.stop(),4000);
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 1000);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
    const _ov=document.getElementById('timerOverlay');if(_ov)_ov.style.display='none';
    if(this._autoDismiss){clearTimeout(this._autoDismiss);this._autoDismiss=null;}
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    this.stop();
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}if(!TMR._autoDismiss)TMR._autoDismiss=setTimeout(()=>TMR.stop(),4000);}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },1000);
  }
};

function buildTimerFloat() {
  if (document.getElementById('timerFloat')) return;
  const div = document.createElement('div');
  div.id = 'timerFloat';
  div.className = 'timer-float';
  div.innerHTML = `
    <div id="timerFloatLabel" class="timer-float-label">REST</div>
    <div id="timerFloatTime" class="timer-float-time">0s</div>
    <div id="timerFloatEx" class="timer-float-ex"></div>
    <div class="timer-float-bar"><div id="timerFloatProgress" class="timer-float-progress"></div></div>
    <div class="timer-float-actions">
      <button class="timer-float-btn timer-float-skip" onclick="TMR.stop()">✓ Done</button>
      <button class="timer-float-btn timer-float-reset" onclick="TMR.stop()">✕ Cancel</button>
    </div>`;
  document.body.appendChild(div);
  if(!document.getElementById('timerOverlay')){const _tov=document.createElement('div');_tov.id='timerOverlay';_tov.style.cssText='position:fixed;inset:0;z-index:99;display:none;cursor:pointer;';_tov.addEventListener('click',function(){TMR.stop();});document.body.insertBefore(_tov,div);}
}

function makeRestTimer(restStr, exerciseName) {
  const secs = TMR.parseSeconds(restStr);
  if (!secs) return '<span class="ex-sets" style="opacity:0.5">⏱️ ' + restStr + '</span>';
  const label = restStr;
  return '<span class="rest-timer idle" data-rest="' + restStr + '" data-label="' + label + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + secs + ',\'' + exerciseName.replace(/'/g,"\'").substring(0,30) + '...\')" ' +
    'title="Tap to start rest timer">' +
    '<span class="rest-timer-icon">⏱️</span>' +
    '<span class="rest-timer-label">' + label + '</span>' +
    '</span>';
}


// ── STOPWATCH ENGINE (cardio pages) ──────────────────────────────
const SW = {
  interval: null,
  startTime: null,
  elapsed: 0,
  running: false,

  formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  },

  toggle() {
    if (this.running) {
      clearInterval(this.interval);
      this.elapsed += Date.now() - this.startTime;
      this.running = false;
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '▶ Resume'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
    } else {
      this.startTime = Date.now();
      this.running = true;
      this.interval = setInterval(() => {
        const total = this.elapsed + (Date.now() - this.startTime);
        const el = document.getElementById('swDisplay');
        if (el) el.textContent = this.formatTime(total);
      }, 100);
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '⏸ Pause'; btn.style.background = 'rgba(251,191,36,0.15)'; btn.style.color = '#fbbf24'; }
    }
  },

  reset() {
    clearInterval(this.interval);
    this.elapsed = 0;
    this.running = false;
    const el = document.getElementById('swDisplay');
    if (el) el.textContent = '00:00';
    const btn = document.getElementById('swBtn');
    if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
  },

  lap() {
    if (!this.running && this.elapsed === 0) return;
    const total = this.elapsed + (this.running ? Date.now() - this.startTime : 0);
    const list = document.getElementById('swLaps');
    if (list) {
      const count = list.children.length + 1;
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;';
      item.innerHTML = '<span style="color:#64748b;">Lap ' + count + '</span><span style="color:#e2e8f0;font-weight:700;">' + this.formatTime(total) + '</span>';
      list.prepend(item);
    }
  }
};

<script>
// ── REPLACE EXERCISE ──
(function() {
  const _PAGE_ID = location.pathname.split('/').pop().split('?')[0];
  const REPLACE_KEY = 'mc_replacements|' + _PAGE_ID;
  // Option-B migration: copy any existing global entries into this page's scoped key
  (function(){
    try{
      var _old = JSON.parse(localStorage.getItem('mc_replacements')||'{}');
      if(Object.keys(_old).length){
        var _scoped = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
        var _merged = Object.assign({}, _old, _scoped);
        localStorage.setItem(REPLACE_KEY, JSON.stringify(_merged));
      }
    }catch(e){}
  }());
  function applyReplacements() {
    const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';
        if (!card.querySelector('.replaced-badge')) {
          const badge = document.createElement('span');
          badge.className = 'replaced-badge';
          badge.style.cssText = 'font-size:11px;font-weight:900;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:2px 5px;margin-left:6px;letter-spacing:0.06em;vertical-align:middle;';
          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // NOTE: "Replace exercise" is now triggered from the meatball (⋮) menu in
  // mc-card-actions.js (Phase 1 consolidation). applyReplacements() above is
  // kept so previously saved replacements still render with their badge.
})();
</script>

<script>
/* — WAVE3-SETLOG MODULE — */
(function(){
  var SK='mc_setlog_v1';
  var PID=location.pathname.split('/').pop().replace('.html','');
  function st(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
  function ek(id){return PID+'|'+id}
  function save(exId,sn,w,r){
    var s=st(),k=ek(exId);if(!s[k])s[k]=[];
    var d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var sess=s[k][0];
    if(!sess||sess.d!==d){sess={d:d,sets:{}};s[k].unshift(sess);s[k]=s[k].slice(0,20);}
    sess.sets[sn]={w:w,r:r};localStorage.setItem(SK,JSON.stringify(s));
  }
  function lsess(exId){var s=st();return(s[ek(exId)]||[])[0]||null;}
  function lset(exId,sn){var sess=lsess(exId);return sess?sess.sets[sn]||null:null;}
  function hist(exId){
    var el=document.getElementById('slh-'+exId);if(!el)return;
    var sess=lsess(exId);if(!sess){el.textContent='';return;}
    var ws=Object.values(sess.sets).map(function(s){return parseFloat(s.w)||0;}).filter(Boolean);
    el.textContent=ws.length?'Last: '+Math.max.apply(null,ws)+' lb \u00b7 '+sess.d:sess.d;
  }
  function cnt(s){
    if(!s)return 3;
    var x=s.match(/^(\d+)\s*[x\u00d7]/i);if(x)return Math.min(parseInt(x[1]),10);
    var c=s.split(',');if(c.length>1)return c.length;
    var n=s.match(/^(\d+)/);return n?Math.min(parseInt(n[1]),8):3;
  }
  function rep(s,i){
    if(!s)return'';
    var c=s.split(',');if(c.length>1)return(c[i]||c[c.length-1]).trim();
    var x=s.match(/[x\u00d7](\d+)/i);if(x)return x[1];return'';
  }
  function rows(exId,ss,rs){
    var n=cnt(ss),h='<div class="sl-hdr"><div class="sl-hl">SET</div><div class="sl-hl">WEIGHT</div><div class="sl-hl">REPS</div><div class="sl-hl"></div></div>';
    for(var i=0;i<n;i++){
      var sn=i+1,last=lset(exId,sn),pr=rep(ss,i);
      h+='<div class="sl-row" id="sr-'+exId+'-'+sn+'">'+
        '<div class="sl-num">'+sn+'</div>'+
        '<input class="sl-inp" id="slw-'+exId+'-'+sn+'" type="number" inputmode="decimal" placeholder="'+(last&&last.w?last.w+' lb':'lb')+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<input class="sl-inp" id="slr-'+exId+'-'+sn+'" type="number" inputmode="numeric" placeholder="'+(pr||(last&&last.r?last.r:'reps'))+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<div class="sl-ck" id="slc-'+exId+'-'+sn+'" onclick="event.stopPropagation();_SL(\''+exId+'\','+sn+','+rs+')">\u2610</div>'+
        '</div>';
    }
    return h;
  }
  window._SL=function(exId,sn,rs){
    var w=document.getElementById('slw-'+exId+'-'+sn);
    var r=document.getElementById('slr-'+exId+'-'+sn);
    var ck=document.getElementById('slc-'+exId+'-'+sn);
    var row=document.getElementById('sr-'+exId+'-'+sn);
    if(!ck)return;
    if(ck.classList.contains('done')){ck.classList.remove('done');ck.innerHTML='\u2610';if(row)row.classList.remove('sl-done');return;}
    save(exId,sn,w?w.value.trim():'',r?r.value.trim():'');
    ck.classList.add('done');ck.textContent='\u2713';if(row)row.classList.add('sl-done');
    if(rs>0&&typeof TMR!=='undefined'){var t=document.querySelector('.rest-timer');if(t)TMR.start(t,rs,'Rest');}
    hist(exId);
  };
  function grs(el){var t=el.querySelector('.rest-timer');if(t&&t.dataset&&t.dataset.rest&&typeof TMR!=='undefined')return TMR.parseSeconds(t.dataset.rest)||60;return 60;}
  function attach(el,exId,ss,rs){
    if(!el||el.querySelector('.setlog-toggle'))return;
    ['ex-notes-toggle','ex-notes-wrap','.log-row'].forEach(function(s){var o=el.querySelector(s);while(o){o.remove();o=el.querySelector(s);}});
    var tgl=document.createElement('div');
    tgl.className='setlog-toggle';
    tgl.innerHTML='<span id="sla-'+exId+'">\u25be</span>&nbsp;<span id="sll-'+exId+'">LOG SETS</span><span class="setlog-hist" id="slh-'+exId+'"></span>';
    tgl.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var wp=document.getElementById('slwp-'+exId);if(!wp)return;
      var open=wp.classList.toggle('open');
      document.getElementById('sll-'+exId).textContent=open?'HIDE':'LOG SETS';
      document.getElementById('sla-'+exId).textContent=open?'\u25b4':'\u25be';
    });
    var wp=document.createElement('div');
    wp.className='setlog-wrap';wp.id='slwp-'+exId;
    wp.innerHTML=rows(exId,ss,rs);
    wp.addEventListener('click',function(e){e.stopPropagation();});
    el.appendChild(tgl);el.appendChild(wp);hist(exId);
  }
  function run(){
    document.querySelectorAll('.ex-card[data-id]').forEach(function(c){
      var ct=c.querySelector('.ex-content');if(!ct)return;
      var se=c.querySelector('.ex-sets');
      attach(ct,c.dataset.id,se?se.textContent.trim():'3x10',grs(c));
    });
    document.querySelectorAll('.ss-ex[data-id]').forEach(function(c){
      var ct=c.querySelector('.ss-content');if(!ct)return;
      var se=c.querySelector('.ex-sets');
      attach(ct,c.dataset.id,se?se.textContent.trim():'4x12',90);
    });
    document.querySelectorAll('.ex-item[data-id]').forEach(function(c){
      var se=c.querySelector('.ex-sets');
      attach(c,c.dataset.id,se?se.textContent.trim():'3x10',grs(c));
    });
    document.querySelectorAll('.lift-card').forEach(function(c){
      var nm=c.querySelector('.lift-name');if(!nm)return;
      var exId='psu-'+nm.textContent.trim().replace(/\s+/g,'-').toLowerCase().slice(0,20);
      if(c.querySelector('.setlog-toggle'))return;
      var me=c.querySelector('.lift-meta');
      attach(c,exId,me?me.textContent.trim():'3x5',grs(c));
    });
  }
  function watch(){
    var app=document.getElementById('app');
    if(!app){setTimeout(watch,100);return;}
    if(app.querySelector('.ex-card,.ex-item,.lift-card')){run();return;}
    var obs=new MutationObserver(function(m,o){
      if(app.querySelector('.ex-card,.ex-item,.lift-card')){o.disconnect();setTimeout(run,50);}
    });
    obs.observe(app,{childList:true,subtree:true});
    setTimeout(run,600);
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',watch);}
  else{watch();}
})();
</script>

<script>
/* ── FINISH-WORKOUT MODULE ── */
(function(){
  var WL_KEY='mc_workout_log_v1';
  var SL_KEY='mc_setlog_v1';
  var startTime=Date.now();
  var pageId=location.pathname.split('/').pop().replace('.html','');

  // Get workout name from page title
  function getWorkoutName(){
    var t=document.title||pageId;
    return t.replace(' — MC Training','').replace('MC — ','').replace('PMC — ','');
  }

  // Get duration string
  function getDuration(){
    var mins=Math.round((Date.now()-startTime)/60000);
    if(mins<1)return '<1 min';
    return mins+' min';
  }

  // Count checked sets
  function getCheckedSets(){
    return document.querySelectorAll('.sl-ck.done,.set-check.done').length;
  }
  function getTotalSets(){
    return document.querySelectorAll('.sl-ck,.set-check').length;
  }

  // Get all logged set data for this session
  function getSessionSets(){
    try{
      var store=JSON.parse(localStorage.getItem(SL_KEY)||'{}');
      var today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
      var sets=[];
      Object.keys(store).forEach(function(k){
        if(!k.startsWith(pageId+'|'))return;
        var exName=k.split('|')[1]||k;
        var sess=store[k][0];
        if(sess&&sess.d===today){
          Object.keys(sess.sets).forEach(function(sn){
            var s=sess.sets[sn];
            sets.push({name:exName,setNum:parseInt(sn),weight:s.w,reps:s.r,pr:false});
          });
        }
      });
      // Detect PRs — compare to previous sessions
      sets.forEach(function(s){
        var k=pageId+'|'+s.name;
        var history=store[k]||[];
        if(history.length<2)return;
        var prevMax=0;
        history.slice(1).forEach(function(sess){
          Object.values(sess.sets).forEach(function(set){
            if(parseFloat(set.w)>prevMax)prevMax=parseFloat(set.w);
          });
        });
        if(parseFloat(s.weight)>prevMax&&prevMax>0)s.pr=true;
      });
      return sets;
    }catch(e){return[];}
  }

  // Save to workout log
  function saveWorkout(){
    var sets=getSessionSets();
    var prs=sets.filter(function(s){return s.pr;}).length;
    var entry={
      pageId:pageId,
      workoutName:getWorkoutName(),
      date:new Date().toISOString(),
      time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      duration:getDuration(),
      sets:sets,
      prs:prs,
      setsChecked:getCheckedSets()
    };
    try{
      var logs=JSON.parse(localStorage.getItem(WL_KEY)||'[]');
      logs.unshift(entry);
      logs=logs.slice(0,200);// keep last 200 workouts
      localStorage.setItem(WL_KEY,JSON.stringify(logs));
    }catch(e){}
    return entry;
  }

  // Update progress display
  function updateProgress(){
    var done=getCheckedSets();
    var total=getTotalSets();
    var el=document.getElementById('fwProgress');
    if(el)el.textContent=done+' / '+total+' sets';
    // Auto-detect all sets done
    if(total>0&&done>=total){
      var banner=document.getElementById('fwAutoBanner');
      if(banner)banner.classList.add('show');
    }
  }

  // Build the bottom bar HTML
  var barHTML='<div class="fw-bar" id="fwBar">'+
    '<span class="fw-progress" id="fwProgress">0 / 0 sets</span>'+
    '<button class="fw-btn" onclick="_FW.open()">Finish Workout ✓</button>'+
    '</div>';

  // Build modal HTML
  var modalHTML='<div class="fw-modal-overlay" id="fwModal">'+
    '<div class="fw-modal">'+
      '<div class="fw-modal-title">🏆 Finish Workout?</div>'+
      '<div class="fw-modal-sub">This will save your session to Workout Logs.</div>'+
      '<div class="fw-summary" id="fwSummary"></div>'+
      '<div class="fw-modal-btns">'+
        '<button class="fw-cancel" onclick="_FW.close()">Cancel</button>'+
        '<button class="fw-confirm" onclick="_FW.confirm()">Save & Finish</button>'+
      '</div>'+
    '</div>'+
  '</div>';

  var autoBanner='<div class="fw-auto-banner" id="fwAutoBanner" onclick="_FW.open()">'+
    '🏆 All sets complete — tap to finish workout</div>';

  // Inject UI
  function inject(){
    document.body.insertAdjacentHTML('beforeend',barHTML+modalHTML+autoBanner);
    // Watch for set check changes
    document.addEventListener('click',function(e){
      if(e.target.classList.contains('sl-ck')||
         e.target.classList.contains('set-check')||
         e.target.id==='fwAutoBanner'){
        setTimeout(updateProgress,100);
      }
    });
    updateProgress();
  }


  function getSkippedExercises(){
    var sk=[];
    document.querySelectorAll('.ex-card:not(.checked),.ss-ex:not(.checked)').forEach(function(c){
      var nm=c.querySelector('.ex-name,.ss-name');if(nm)sk.push(nm.textContent.trim());
    });
    return sk;
  }
  window._FW={
    open:function(){
      var sets=getSessionSets();
      var prs=sets.filter(function(s){return s.pr;}).length;
      var summary=document.getElementById('fwSummary');
      if(summary){
        summary.innerHTML=
          '<div class="fw-summary-row"><span class="fw-summary-label">Workout</span><span class="fw-summary-val">'+getWorkoutName()+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Duration</span><span class="fw-summary-val">'+getDuration()+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Sets checked</span><span class="fw-summary-val">'+getCheckedSets()+' / '+getTotalSets()+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Sets logged</span><span class="fw-summary-val">'+sets.length+'</span></div>'+
          (prs?'<div class="fw-summary-row"><span class="fw-summary-label">PRs set</span><span class="fw-summary-val" style="color:#d4af37;">🏆 '+prs+'</span></div>':'')+
          (function(){var sk=getSkippedExercises();return sk.length?'<div class="fw-summary-row"><span class="fw-summary-label" style="color:#f87171;">Skipped</span><span class="fw-summary-val" style="color:#f87171;font-size:11px;">'+sk.join(', ')+'</span></div>':'';}());
      }
      var m=document.getElementById('fwModal');
      if(m)m.classList.add('open');
    },
    close:function(){
      var m=document.getElementById('fwModal');
      if(m)m.classList.remove('open');
    },
    confirm:function(){
      saveWorkout();
      window._FW.close();
      // Flash confirmation
      var btn=document.querySelector('.fw-btn');
      if(btn){btn.textContent='✓ Saved!';btn.style.background='#34d399';}
      var banner=document.getElementById('fwAutoBanner');
      if(banner)banner.classList.remove('show');
      setTimeout(function(){
        if(btn){btn.textContent='Finish Workout ✓';btn.style.background='';}
      },2000);
    }
  };

  // Run after DOM ready
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',inject);
  }else{
    inject();
  }
})();
</script>
