<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battle Ropes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#001a1a;min-height:100vh;padding-bottom:48px;}
.back-link{position:absolute;top:18px;left:18px;color:#2dd4bf;text-decoration:none;font-size:13px;font-weight:700;background:rgba(45,212,191,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(45,212,191,0.35);z-index:10;}
.header{background:linear-gradient(135deg,#00302e,#001a1a);padding:58px 20px 22px;border-bottom:1px solid rgba(45,212,191,0.15);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#2dd4bf;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.overview-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.35);border-radius:6px;padding:5px 12px;font-size:11px;color:#99f6e4;font-weight:700;}
/* LEVEL TABS */
.tabs-bar{background:#001a1a;border-bottom:1px solid rgba(45,212,191,0.1);padding:0 8px;position:sticky;top:0;z-index:8;overflow-x:auto;}
.tabs{display:flex;gap:2px;max-width:680px;margin:0 auto;min-width:max-content;}
.tab{padding:11px 10px;border:none;cursor:pointer;font-weight:900;font-size:10px;background:transparent;color:#4a1515;border-bottom:3px solid transparent;text-align:center;letter-spacing:0.04em;white-space:nowrap;}
.tab.active{color:#2dd4bf;border-bottom-color:#14b8a6;}
.content{max-width:680px;margin:20px auto 0;padding:0 16px;}
.section-head{font-size:10px;font-weight:900;letter-spacing:0.2em;color:#2dd4bf;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px;opacity:0.8;}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(239,68,68,0.3),transparent);}
/* LEVEL HEADER */
.level-header{background:rgba(45,212,191,0.05);border:1px solid rgba(45,212,191,0.15);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.level-name{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;}
.level-meta{display:flex;gap:8px;flex-wrap:wrap;}
.lmeta{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;}
.lm-green{background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.2);}
.lm-red{background:rgba(45,212,191,0.12);color:#2dd4bf;border:1px solid rgba(45,212,191,0.22);}
.lm-orange{background:rgba(45,212,191,0.08);color:#99f6e4;border:1px solid rgba(45,212,191,0.2);}
.lm-blue{background:rgba(56,189,248,0.12);color:#38bdf8;border:1px solid rgba(56,189,248,0.2);}
/* EXERCISE CARDS */
.ex-card{background:#002a28;border-radius:12px;border:1.5px solid rgba(45,212,191,0.18);margin-bottom:8px;cursor:pointer;transition:all 0.15s;overflow:hidden;}
.ex-card:active{transform:scale(0.99);}
.ex-card.checked{background:#001f1e;border-color:rgba(45,212,191,0.45);}
.ex-card.checked .ex-name{text-decoration:line-through;color:#34d399;}
.ex-card.checked .ex-num{background:#065f46;border-color:transparent;}
.ex-row{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;}
.ex-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;width:26px;height:26px;background:rgba(45,212,191,0.15);color:#2dd4bf;border-radius:50%;font-size:11px;font-weight:900;border:1px solid rgba(45,212,191,0.28);margin-top:1px;flex-shrink:0;}
.ex-content{flex:1;}
.ex-name{font-weight:700;font-size:13px;color:#e2e8f0;line-height:1.4;margin-bottom:5px;}
.ex-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;}
.tag-on{background:rgba(45,212,191,0.12);color:#2dd4bf;border:1px solid rgba(45,212,191,0.22);}
.tag-off{background:rgba(45,212,191,0.06);color:#5eead4;border:1px solid rgba(45,212,191,0.15);}
.tag-emom{background:rgba(45,212,191,0.15);color:#14b8a6;border:1px solid rgba(45,212,191,0.3);}
.tag-finisher{background:rgba(45,212,191,0.2);color:#2dd4bf;border:1px solid rgba(45,212,191,0.35);}
.tag-rounds{background:rgba(45,212,191,0.08);color:#99f6e4;border:1px solid rgba(45,212,191,0.2);}
.ex-note{font-size:11px;color:#99f6e4;margin-top:3px;font-style:italic;line-height:1.4;opacity:0.85;}
/* EMOM SPECIAL CARD */
.emom-card{background:rgba(45,212,191,0.05);border:1px solid rgba(45,212,191,0.2);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
.emom-title{font-size:13px;font-weight:900;color:#2dd4bf;margin-bottom:4px;}
.emom-detail{font-size:12px;color:#5eead4;line-height:1.5;}
/* TOTALS */
.totals-card{background:linear-gradient(135deg,#00302e,#001a1a);border:1px solid rgba(239,68,68,0.3);border-radius:14px;padding:18px;margin-top:6px;}
.totals-title{font-size:12px;font-weight:900;color:#2dd4bf;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(45,212,191,0.08);}
.total-row:last-child{border-bottom:none;}
.total-label{font-size:12px;color:#e2e8f0;font-weight:600;display:flex;align-items:center;gap:7px;}
.total-icon{font-size:15px;}
.total-value{font-size:13px;font-weight:900;color:#14b8a6;text-align:right;}
.total-divider{height:1px;background:rgba(45,212,191,0.2);margin:10px 0;}
.grand-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;}
.grand-label{font-size:13px;font-weight:900;color:#fff;}
.grand-value{font-size:18px;font-weight:900;color:#14b8a6;}
.tap-hint{font-size:11px;color:#2dd4bf;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;text-align:center;opacity:0.6;}

/* ── TIMER ── */
.rest-timer{
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
  padding:4px 10px;border-radius:8px;
  transition:all 0.15s;position:relative;
}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.rest-timer-icon{font-size:13px;}
.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;}
.rest-timer.idle .rest-timer-label{color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}
.rest-timer.overtime .rest-timer-label{color:#f87171;}
.rest-timer-hint{font-size:9px;color:#475569;margin-top:2px;font-style:italic;}

/* Floating timer display — shows when running */
.timer-float{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,16,0.95);backdrop-filter:blur(16px);
  border-radius:20px;padding:14px 24px;
  display:none;flex-direction:column;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  z-index:100;min-width:200px;
}
.timer-float.visible{display:flex;}
.timer-float-label{font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.timer-float-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.timer-float-time.done{color:#34d399;}
.timer-float-time.overtime{color:#f87171;}
.timer-float-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.timer-float-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-float-progress{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;width:100%;}
.timer-float-progress.done{background:#34d399;}
.timer-float-progress.overtime{background:#f87171;}
.timer-float-actions{display:flex;gap:8px;margin-top:6px;}
.timer-float-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.timer-float-skip{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.timer-float-reset{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}

.sum-section{margin:32px 16px 0;}.sum-hd{font-size:11px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#ef4444;margin-bottom:12px;display:flex;align-items:center;gap:8px;}.sum-card{border-radius:14px;padding:16px;margin-bottom:32px;}.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;opacity:0.8;}.sum-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #ffffff08;}.sum-row:last-of-type{border-bottom:none;}.sum-ico{font-size:14px;width:22px;text-align:center;flex-shrink:0;}.sum-nm{flex:1;font-size:12px;font-weight:600;color:#e2e8f0;}.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}.sum-st{font-size:11px;font-weight:800;}.sum-rp{font-size:10px;font-weight:600;opacity:0.75;}.sum-div{height:1px;margin:14px 0;}.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.sum-tot{border-radius:10px;padding:10px 8px;text-align:center;}.sum-tv{font-size:13px;font-weight:900;letter-spacing:-0.01em;}.sum-tl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;opacity:0.7;}
.prog-bar-wrap{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:rgba(255,255,255,0.06);}
.prog-bar-fill{height:3px;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width 0.4s ease;border-radius:0 2px 2px 0;}
.timer-presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.timer-preset{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.05em;}
.timer-preset:active{background:rgba(212,175,55,0.2);color:#fbbf24;border-color:rgba(212,175,55,0.4);}

/* ── WEIGHT NOTES ── */
/* collapsed by default */
}
.setlog-wrap.open{ display:block; }

.setlog-toggle{
  display:flex;align-items:center;gap:5px;
  margin-top:6px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:900;
  color:#475569;letter-spacing:0.08em;
  text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.setlog-toggle .sl-chevron{ transition:transform 0.2s; }
.setlog-wrap.open ~ .setlog-toggle .sl-chevron,
.setlog-toggle.open .sl-chevron{ transform:rotate(180deg); }

.setlog-hist{
  font-size:10px;font-weight:700;
  color:rgba(212,175,55,0.55);
  margin-left:auto;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  max-width:140px;
}

.set-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;align-items:center;
  padding:7px 4px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.set-row:last-child{ border-bottom:none; }

.set-num{
  font-size:11px;font-weight:900;
  color:#475569;text-align:center;
}
.set-input{
  width:100%;padding:6px 4px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#e2e8f0;
  font-size:13px;font-weight:700;
  text-align:center;font-family:inherit;
  outline:none;
  -webkit-tap-highlight-color:transparent;
}
.set-input:focus{
  border-color:rgba(212,175,55,0.45);
  background:rgba(212,175,55,0.06);
}
.set-input::placeholder{ color:#2d3748;font-size:11px; }

.set-check{
  width:32px;height:32px;
  border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.set-check.done{
  background:rgba(52,211,153,0.15);
  border-color:rgba(52,211,153,0.4);
}
.set-row.done-row .set-input{
  opacity:0.45;
  text-decoration:line-through;
}

.setlog-header{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;padding:4px 4px 2px;
}
.setlog-col-label{
  font-size:9px;font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#334155;text-align:center;
}







/* ── WAVE3-SETLOG ── */
.setlog-wrap{margin-top:8px;border-top:1px solid rgba(255,255,255,0.07);padding-top:2px;display:none;}
.setlog-wrap.open{display:block;}
.setlog-toggle{display:flex;align-items:center;gap:5px;margin-top:8px;cursor:pointer;user-select:none;font-size:10px;font-weight:900;color:#475569;letter-spacing:0.08em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.setlog-hist{font-size:10px;font-weight:700;color:rgba(212,175,55,0.6);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.sl-set-row{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;align-items:center;padding:6px 2px;border-bottom:1px solid rgba(255,255,255,0.04);}
.sl-set-row:last-child{border-bottom:none;}
.sl-set-num{font-size:11px;font-weight:900;color:#475569;text-align:center;}
.sl-set-input{width:100%;padding:6px 4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#e2e8f0;font-size:13px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent;}
.sl-set-input:focus{border-color:rgba(212,175,55,0.45);background:rgba(212,175,55,0.06);}
.sl-set-input::placeholder{color:#2d3748;font-size:11px;}
.sl-set-check{width:30px;height:30px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.sl-set-check.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);}
.sl-set-row.sl-done .sl-set-input{opacity:0.4;}
.sl-hdr{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:5px;padding:3px 2px 1px;}
.sl-hl{font-size:9px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#2d3748;text-align:center;}
</style>
</head>
<body>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
<div id="app"></div>
<script>
let activeLevel = 0;
const checkState = {};

const ROPE_MOVEMENTS = [
  'Alternating Waves (Small/Fast)',
  'Double Arm Waves (Small/Fast)',
  'Alternating Waves 2.0 (Large/Exaggerated)',
  'Double Arm Waves 2.0 (Large/Exaggerated)',
  'Snake Waves (Small/Fast)',
  'Snake Waves (Large/Exaggerated)',
  'Clockwise Waves',
  'Counter-Clockwise Waves',
];

const LEVELS = [
  {
    id: 'basic',
    label: 'Basic',
    name: 'Battle Ropes Phase 1 — Basic',
    rounds: 2,
    workOn: '30 sec',
    workOff: '30 sec',
    metas: [{cls:'lm-green',t:'Phase 1 · Basic'},{cls:'lm-red',t:'30s On / 30s Off'},{cls:'lm-orange',t:'2 Rounds'}],
    emom: {reps: 25, exercise: 'Push-Ups', duration: 10, placement: 'after_ropes', note: 'EMOM — every minute on the minute · 25 push-ups · 10 minutes'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 movements × 2 rounds × 30 sec = 8 min'},
      {icon:'💪',label:'EMOM Push-Ups',value:'25 reps × 10 min = 250 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (30s × 8 sets × 2 rounds)',value:'8 min rest'},
    ],
    grand: '~31 min total',
  },
  {
    id: 'inter',
    label: 'Intermediate',
    name: 'Battle Ropes — Intermediate',
    rounds: 2,
    workOn: '1 min',
    workOff: '30 sec',
    metas: [{cls:'lm-orange',t:'Intermediate'},{cls:'lm-red',t:'1 min On / 30s Off'},{cls:'lm-orange',t:'2 Rounds'}],
    emom: {reps: 25, exercise: 'Push-Ups', duration: 10, placement: 'after_ropes', note: 'EMOM — every minute on the minute · 25 push-ups · 10 minutes'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 movements × 2 rounds × 1 min = 16 min'},
      {icon:'💪',label:'EMOM Push-Ups',value:'25 reps × 10 min = 250 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (30s × 8 sets × 2 rounds)',value:'8 min rest'},
    ],
    grand: '~39 min total',
  },
  {
    id: 'adv1',
    label: 'Advanced L1',
    name: 'Battle Ropes — Advanced Level 1',
    rounds: 2,
    workOn: '30 sec',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L1'},{cls:'lm-red',t:'30s On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Between Sets'}],
    emom: {reps: 20, exercise: 'Push-Ups', duration: null, placement: 'between_sets', note: 'EMOM 20 push-ups — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 30 sec = 8 min'},
      {icon:'💪',label:'EMOM Push-Ups (between sets)',value:'20 reps × 8 sets × 2 rounds = 320 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~37 min total',
  },
  {
    id: 'adv2',
    label: 'Advanced L2',
    name: 'Battle Ropes — Advanced Level 2',
    rounds: 2,
    workOn: '1 min',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L2'},{cls:'lm-red',t:'1 min On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Between Sets'}],
    emom: {reps: 20, exercise: 'Push-Ups', duration: null, placement: 'between_sets', note: 'EMOM 20 push-ups — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 1 min = 16 min'},
      {icon:'💪',label:'EMOM Push-Ups (between sets)',value:'20 reps × 8 sets × 2 rounds = 320 push-ups'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~45 min total',
  },
  {
    id: 'adv3',
    label: 'Advanced L3',
    name: 'Battle Ropes — Advanced Level 3',
    rounds: 2,
    workOn: '30 sec',
    workOff: '1 min',
    metas: [{cls:'lm-red',t:'Advanced L3'},{cls:'lm-red',t:'30s On / 1 min Off'},{cls:'lm-orange',t:'2 Rounds'},{cls:'lm-blue',t:'EMOM Burpees'}],
    emom: {reps: 8, exercise: 'Burpees', duration: null, placement: 'between_sets', note: 'EMOM 8 burpees — performed in between each of the 8 battle rope sets (first 8 sets only)'},
    finisher: {type:'jump_rope', mins: 5},
    totals: [
      {icon:'🪢',label:'Battle Rope Movements',value:'8 × 2 rounds × 30 sec = 8 min'},
      {icon:'💀',label:'EMOM Burpees (between sets)',value:'8 burpees × 8 sets × 2 rounds = 128 burpees'},
      {icon:'🪢',label:'Jump Rope Finisher',value:'5 minutes'},
      {icon:'⏸️',label:'Rest (1 min × 8 sets × 2 rounds)',value:'16 min rest'},
    ],
    grand: '~37 min total',
  },
];

function renderLevel(lv) {
  const prefix = lv.id;

  // Rope movement cards
  const ropeCards = ROPE_MOVEMENTS.map((mv, i) => {
    const id = prefix + '-r' + i;
    const ck = checkState[id] ? 'checked' : '';

// ── TIMER ENGINE ──────────────────────────────────────────────────
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 500);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },500);
  }
};

// ── STOPWATCH ENGINE (cardio pages) ──────────────────────────────
const SW = {
  interval: null,
  startTime: null,
  elapsed: 0,
  running: false,

  formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  },

  toggle() {
    if (this.running) {
      clearInterval(this.interval);
      this.elapsed += Date.now() - this.startTime;
      this.running = false;
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '▶ Resume'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
    } else {
      this.startTime = Date.now();
      this.running = true;
      this.interval = setInterval(() => {
        const total = this.elapsed + (Date.now() - this.startTime);
        const el = document.getElementById('swDisplay');
        if (el) el.textContent = this.formatTime(total);
      }, 100);
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '⏸ Pause'; btn.style.background = 'rgba(251,191,36,0.15)'; btn.style.color = '#fbbf24'; }
    }
  },

  reset() {
    clearInterval(this.interval);
    this.elapsed = 0;
    this.running = false;
    const el = document.getElementById('swDisplay');
    if (el) el.textContent = '00:00';
    const btn = document.getElementById('swBtn');
    if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
  },

  lap() {
    if (!this.running && this.elapsed === 0) return;
    const total = this.elapsed + (this.running ? Date.now() - this.startTime : 0);
    const list = document.getElementById('swLaps');

      item.innerHTML = '<span style="color:#64748b;">Lap ' + count + '</span><span style="color:#e2e8f0;font-weight:700;">' + this.formatTime(total) + '</span>';
      list.prepend(item);
    }
  }
};

function buildStopwatch(container) {
  const el = document.createElement('div');
  el.style.cssText = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin:16px 0;text-align:center;';
  el.innerHTML = `

(function() {
  const REPLACE_KEY = 'mc_replacements';
  function applyReplacements() {

    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';

          badge.className = 'replaced-badge';

          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // Long press to replace
  let pressTimer;
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.ex-card, .ex-item, .lift-card');

        window.location.href = url;
      }
    }, 600);
  }, {passive: true});
  document.addEventListener('touchend', function() { clearTimeout(pressTimer); }, {passive: true});
  document.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, {passive: true});
})();

<script>
/* ── WAVE3-SETLOG MODULE ── */
(function(){
  var SKEY='mc_setlog_v1';
  var PID=location.pathname.split('/').pop().replace('.html','');
  function store(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return{}}}
  function ek(id){return PID+'|'+id}
  function saveSet(exId,sn,w,r){
    var s=store(),k=ek(exId);if(!s[k])s[k]=[];
    var d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var sess=s[k][0];
    if(!sess||sess.d!==d){sess={d:d,sets:{}};s[k].unshift(sess);s[k]=s[k].slice(0,20);}
    sess.sets[sn]={w:w,r:r};localStorage.setItem(SKEY,JSON.stringify(s));
  }
  function lastSess(exId){var s=store();return(s[ek(exId)]||[])[0]||null;}
  function lastSet(exId,sn){var sess=lastSess(exId);return sess?sess.sets[sn]||null:null;}
  function renderHist(exId){
    var el=document.getElementById('slh-'+exId);if(!el)return;
    var sess=lastSess(exId);if(!sess){el.textContent='';return;}
    var ws=Object.values(sess.sets).map(function(s){return parseFloat(s.w)||0;}).filter(Boolean);
    el.textContent=ws.length?'Last: '+Math.max.apply(null,ws)+' lb \u00b7 '+sess.d:sess.d;
  }
  function pCount(s){
    if(!s)return 3;
    var x=s.match(/^(\d+)\s*[x\u00d7]/i);if(x)return Math.min(parseInt(x[1]),10);
    var c=s.split(',');if(c.length>1)return c.length;
    var n=s.match(/^(\d+)/);return n?Math.min(parseInt(n[1]),8):3;
  }
  function pReps(s,i){
    if(!s)return'';
    var c=s.split(',');if(c.length>1)return(c[i]||c[c.length-1]).trim();
    var x=s.match(/[x\u00d7](\d+)/i);if(x)return x[1];return'';
  }
  function buildRows(exId,setsStr,restSecs){
    var n=pCount(setsStr),h='';
    h+='<div class="sl-hdr"><div class="sl-hl">SET</div><div class="sl-hl">WEIGHT</div><div class="sl-hl">REPS</div><div class="sl-hl"></div></div>';
    for(var i=0;i<n;i++){
      var sn=i+1,last=lastSet(exId,sn),pr=pReps(setsStr,i);
      var wp=last&&last.w?last.w+' lb':'lb';
      var rp=pr||(last&&last.r?last.r:'reps');
      h+='<div class="sl-set-row" id="sr-'+exId+'-'+sn+'">'+
        '<div class="sl-set-num">'+sn+'</div>'+
        '<input class="sl-set-input" id="slw-'+exId+'-'+sn+'" type="number" inputmode="decimal" placeholder="'+wp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<input class="sl-set-input" id="slr-'+exId+'-'+sn+'" type="number" inputmode="numeric" placeholder="'+rp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<div class="sl-set-check" id="slc-'+exId+'-'+sn+'" onclick="event.stopPropagation();_SL(\''+exId+'\','+sn+','+restSecs+')" title="Done">\u2610</div>'+
        '</div>';
    }
    return h;
  }
  function checkSet(exId,sn,restSecs){
    var wEl=document.getElementById('slw-'+exId+'-'+sn);
    var rEl=document.getElementById('slr-'+exId+'-'+sn);
    var ck=document.getElementById('slc-'+exId+'-'+sn);
    var row=document.getElementById('sr-'+exId+'-'+sn);
    if(!ck)return;
    if(ck.classList.contains('done')){
      ck.classList.remove('done');ck.innerHTML='\u2610';
      if(row)row.classList.remove('sl-done');return;
    }
    saveSet(exId,sn,wEl?wEl.value.trim():'',rEl?rEl.value.trim():'');
    ck.classList.add('done');ck.textContent='\u2713';
    if(row)row.classList.add('sl-done');
    if(restSecs>0&&typeof TMR!=='undefined'){
      var t=document.querySelector('.rest-timer');
      if(t)TMR.start(t,restSecs,'Rest');
    }
    renderHist(exId);
  }
  window._SL=checkSet;
  function getRestSecs(card){
    var t=card.querySelector('.rest-timer');
    if(t&&t.dataset&&t.dataset.rest&&typeof TMR!=='undefined')return TMR.parseSeconds(t.dataset.rest)||60;
    return 60;
  }
  function attachLogger(content,exId,setsStr,restSecs){
    if(!content||content.querySelector('.setlog-toggle'))return;
    // Remove old notes UI
    ['ex-notes-toggle','ex-notes-wrap','.log-row'].forEach(function(sel){
      var el=content.querySelector(sel);while(el){el.remove();el=content.querySelector(sel);}
    });
    var tgl=document.createElement('div');
    tgl.className='setlog-toggle';tgl.id='slt-'+exId;
    tgl.innerHTML='<span id="sla-'+exId+'">\u25be</span>&nbsp;<span id="sll-'+exId+'">LOG SETS</span><span class="setlog-hist" id="slh-'+exId+'"></span>';
    tgl.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var wrap=document.getElementById('slwrap-'+exId);if(!wrap)return;
      var open=wrap.classList.toggle('open');
      document.getElementById('sll-'+exId).textContent=open?'HIDE':'LOG SETS';
      document.getElementById('sla-'+exId).textContent=open?'\u25b4':'\u25be';
    });
    var wrap=document.createElement('div');
    wrap.className='setlog-wrap';wrap.id='slwrap-'+exId;
    wrap.innerHTML=buildRows(exId,setsStr,restSecs);
    wrap.addEventListener('click',function(e){e.stopPropagation();});
    content.appendChild(tgl);
    content.appendChild(wrap);
    renderHist(exId);
  }
  function initLogger(){
    // ex-card — MC, PMC, Pump programs
    document.querySelectorAll('.ex-card[data-id]').forEach(function(card){
      var exId=card.dataset.id;
      var content=card.querySelector('.ex-content');if(!content)return;
      var setsEl=card.querySelector('.ex-sets');
      attachLogger(content,exId,setsEl?setsEl.textContent.trim():'3x10',getRestSecs(card));
    });
    // ss-ex — superset rows
    document.querySelectorAll('.ss-ex[data-id]').forEach(function(row){
      var exId=row.dataset.id;
      var content=row.querySelector('.ss-content');if(!content)return;
      var setsEl=row.querySelector('.ex-sets');
      attachLogger(content,exId,setsEl?setsEl.textContent.trim():'4x12',90);
    });
    // ex-item — Daily Gainz, STNDR programs
    document.querySelectorAll('.ex-item[data-id]').forEach(function(item){
      var exId=item.dataset.id;
      var setsEl=item.querySelector('.ex-sets');
      var setsStr=setsEl?setsEl.textContent.trim():'3x10';
      // ex-item doesn't have ex-content wrapper — append directly to item
      attachLogger(item,exId,setsStr,getRestSecs(item));
    });
    // lift-card — PSU Football
    document.querySelectorAll('.lift-card').forEach(function(card){
      var nameEl=card.querySelector('.lift-name');if(!nameEl)return;
      var exId='psu-'+nameEl.textContent.trim().replace(/\s+/g,'-').toLowerCase().slice(0,20);
      if(card.querySelector('.setlog-toggle'))return;
      var schemeEl=card.querySelector('.lift-meta');
      var setsStr=schemeEl?schemeEl.textContent.trim():'3x5';
      attachLogger(card,exId,setsStr,getRestSecs(card));
    });
  }
  function watchForCards(){
    var app=document.getElementById('app');
    if(!app){setTimeout(watchForCards,100);return;}
    var hasCards=app.querySelector('.ex-card,.ex-item,.lift-card');
    if(hasCards){initLogger();return;}
    var obs=new MutationObserver(function(muts,o){
      if(app.querySelector('.ex-card,.ex-item,.lift-card')){o.disconnect();setTimeout(initLogger,50);}
    });
    obs.observe(app,{childList:true,subtree:true});
    setTimeout(initLogger,600);
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',watchForCards);
  }else{
    watchForCards();
  }
})();
</script>

</html>
