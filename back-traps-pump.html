:root{--accent:#34d399;--accent-rgb:52,211,153;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);}
.schedule{display:inline-block;background:rgba(var(--accent-rgb),0.15);border:1px solid rgba(var(--accent-rgb),0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:700;}
.tabs-bar{background:var(--body-bg);border-bottom:1px solid rgba(var(--accent-rgb),0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;border:none;cursor:pointer;font-weight:800;font-size:12px;background:transparent;color:#334155;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.04em;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.workout-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.01em;}
.workout-note{font-size:12px;color:#94a3b8;margin-bottom:16px;line-height:1.5;background:rgba(var(--accent-rgb),0.06);border-left:3px solid rgba(var(--accent-rgb),0.4);padding:10px 14px;border-radius:0 6px 6px 0;}
.section-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:900;letter-spacing:0.2em;padding:5px 14px;border-radius:6px;margin:18px 0 12px;text-transform:uppercase;color:#fff;}
.ex-sets-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ex-tempo{display:inline-block;background:rgba(255,255,255,0.05);color:var(--muted);font-size:11px;font-weight:800;padding:3px 7px;border-radius:5px;font-family:monospace;border:1px solid rgba(255,255,255,0.08);}
.rest-pill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);color:var(--muted);transition:all 0.15s;vertical-align:middle;}
.rest-pill:active{transform:scale(0.95);}
.rest-pill.running{background:rgba(var(--accent-rgb),0.15);border-color:rgba(var(--accent-rgb),0.35);color:var(--accent);animation:rp 1s ease-in-out infinite;}
.rest-pill.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.35);color:#34d399;}
.rest-pill.over{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.35);color:#f87171;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.65;}}

<script>// ── TIMER ENGINE ──
buildTimerFloat();

function makeRestTimer(r, n) {
  var s = TMR.parseSeconds(r);
  if (!s) return '<span style="opacity:0.5">' + r + '</span>';
  var nm = (n||'').substring(0,25).replace(/['"/\\]/g,'');
  return '<span class="rest-timer idle" data-rest="' + r + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + s + ',&quot;' + nm + '&quot;)" ' +
    'title="Tap to start">' +
    '<span class="rest-timer-label">' + r + '</span></span>';
}

let activeIdx = 0;
const checkState = {};

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderExercise(ex, prefix, idx, isTraps) {
  const id = `${activeIdx}-${prefix}-${idx}`;
  const checked = checkState[id] ? "checked" : "";
  const tempoHtml = ex.tempo ? `<span class="ex-tempo">${escapeHtml(ex.tempo)}</span>` : "";
  return `<div class="ex-card ${isTraps?'traps':''} ${checked}" data-id="${id}">
    <div class="ex-row">
      <div class="ex-num">${idx+1}</div>
      <div class="ex-content">
        <div class="ex-name">${escapeHtml(ex.name)}</div>
        <div class="ex-sets-row">
          <span class="ex-sets">${escapeHtml(ex.sets)}</span>
          ${tempoHtml}
        </div>
        <div style="margin-top:6px;">${makeRestTimer(ex.rest||"60 sec",ex.name)}</div>
      </div>
    </div>
  </div>`;
}


function _restFor(name, tag){
  const compounds=['squat','deadlift','bench','barbell row','pendlay','rdl','romanian',
    'hack squat','leg press','military','overhead press','pull-up','pullup','chin','high pull',
    'hang clean','power clean','trap bar','incline press','decline press','stiff leg'];
  if(tag==='SUPERSET'||tag==='TRI-SET'||tag==='superset'||tag==='triset') return {secs:120,lbl:'120 sec'};
  const n=(name||'').toLowerCase();
  for(const c of compounds){if(n.includes(c))return {secs:105,lbl:'90-120 sec'};}
  return {secs:60,lbl:'60 sec'};
}
function render() {
  const w = WORKOUTS[activeIdx];
  const tabsHtml = WORKOUTS.map((wo, i) =>
    `<button class="tab ${i===activeIdx?'active':''}" data-i="${i}">${escapeHtml(wo.label)}</button>`
  ).join("");
  const backHtml = w.back.map((e,i) => renderExercise(e,"b",i,false)).join("");
  const trapsHtml = w.traps.map((e,i) => renderExercise(e,"t",i,true)).join("");

  document.getElementById("app").innerHTML = `
    <div class="header">
      <a href="cat-pump-new4.html" class="back-link">← Back</a>
      <div class="header-inner">
        <div class="eyebrow">🔙 Back · Pump</div>
        <div class="title">Back & Traps</div>
        <div><span class="schedule">7 Workout Variations</span></div>
      </div>
    </div>
    <div class="tabs-bar"><div class="tabs">${tabsHtml}</div></div>
    <div class="content">
      <div class="workout-title">${escapeHtml(w.title)}</div>
      <div class="tap-hint">Tap any exercise to check off</div>
      <div class="section-label">Back</div>
      ${backHtml}
      <div class="section-label traps">Traps</div>
      ${trapsHtml}
    </div>`;

  document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => {
    activeIdx = parseInt(b.dataset.i); render();
  }));
  document.querySelectorAll(".ex-card").forEach(c => c.addEventListener("click", () => {
    const id = c.dataset.id;
    checkState[id] = !checkState[id];
    c.classList.toggle("checked");
  }));
}

render();
if(typeof updateProgress!=="undefined")updateProgress();

const _T={iv:null,st:null,dur:0,el:null,nm:'',
  fmt(s){const n=s<0,a=Math.abs(s),m=Math.floor(a/60),sc=a%60;return(n?'+':'')+(m>0?m+':'+String(sc).padStart(2,'0'):sc+'s');},
  parse(s){if(!s||s==='—')return 0;s=s.toLowerCase();
    let r=0;const mm=s.match(/(\d+)\s*min/),ss=s.match(/(\d+)\s*sec/);
    if(mm)r+=parseInt(mm[1])*60;if(ss)r+=parseInt(ss[1]);
    if(!r){const p=s.match(/^(\d+)/);if(p)r=parseInt(p[1]);}return r;},
  buzz(){try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=i===2?880:660;
      g.gain.setValueAtTime(0.4,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.25);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+0.25);});}catch(e){}},
  stop(){clearInterval(this.iv);this.iv=null;
    if(this.el){this.el.className='rest-pill';this.el.querySelector('span').textContent=this.el.dataset.lbl;this.el=null;}
    const f=document.getElementById('_tf');if(f)f.classList.remove('on');},
  start(el,secs,nm){this.stop();this.dur=secs;this.st=Date.now();this.el=el;this.nm=nm;
    el.className='rest-pill running';
    const f=document.getElementById('_tf');
    if(f){f.querySelector('._tf_lbl').textContent='REST';
      f.querySelector('._tf_ex').textContent=nm;
      f.querySelector('._tf_time').className='tf-time';
      f.querySelector('._tf_prog').className='tf-prog';
      f.querySelector('._tf_prog').style.width='100%';
      f.classList.add('on');}
    this.iv=setInterval(()=>{
      const rem=Math.ceil(this.dur-(Date.now()-this.st)/1000);
      if(el)el.querySelector('span').textContent=this.fmt(rem);
      const ft=document.querySelector('._tf_time'),fp=document.querySelector('._tf_prog'),fl=document.querySelector('._tf_lbl');
      if(ft)ft.textContent=this.fmt(rem);
      if(rem>0){const p=(rem/this.dur)*100;if(fp)fp.style.width=p+'%';
        if(ft)ft.className='tf-time';if(fp)fp.className='tf-prog';if(el)el.className='rest-pill running';}
      else if(rem===0){this.buzz();if(ft)ft.className='tf-time done';if(fp)fp.className='tf-prog done';
        if(fp)fp.style.width='100%';if(fl)fl.textContent='DONE!';if(el)el.className='rest-pill done';}
      else{if(ft){ft.textContent='+'+this.fmt(-rem);ft.className='tf-time over';}
        if(fp)fp.className='tf-prog over';if(fl)fl.textContent='OVERTIME';if(el)el.className='rest-pill over';}
    },1000);},
  toggle(el,secs,nm){this.el===el&&this.iv?this.stop():this.start(el,secs,nm);}};

function _initTF(){if(document.getElementById('_tf'))return;
  const d=document.createElement('div');d.id='_tf';d.className='tf';
  d.innerHTML='<div class="_tf_lbl tf-lbl">REST</div><div class="_tf_time tf-time">0s</div>'+
    '<div class="_tf_ex tf-ex"></div><div class="tf-bar"><div class="_tf_prog tf-prog"></div></div>'+
    '<div class="tf-btns"><button class="tf-btn tf-done" onclick="_T.stop()">✓ Done</button>'+
    '<button class="tf-btn tf-cancel" onclick="_T.stop()">✕ Cancel</button></div>';
  document.body.appendChild(d);}

function _rp(secs,label,name){
  return '<span class="rest-pill" data-lbl="'+label+'" '+
    'onclick="_initTF();_T.toggle(this,'+secs+',\''+name.replace(/'/g,"\'").substring(0,25)+'\')" '+
    'title="Tap to start rest timer">⏱ <span>'+label+'</span></span>';}

</script>
