<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Full Body Pyramid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#010920;min-height:100vh;padding-bottom:40px;}
.app{background:linear-gradient(160deg,#010920,#061540,#010920);min-height:100vh;}
.back-link{position:absolute;top:18px;left:18px;color:#60a5fa;text-decoration:none;font-size:13px;font-weight:700;background:rgba(96,165,250,0.12);padding:6px 14px;border-radius:20px;border:1px solid rgba(96,165,250,0.35);z-index:10;}
.back-link:active{background:rgba(239,68,68,0.25);}
.header{background:linear-gradient(90deg,#061540,#010920);padding:60px 20px 24px;border-bottom:1px solid rgba(96,165,250,0.12);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#60a5fa;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.schedule{display:inline-block;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:#bfdbfe;font-weight:700;}
.tabs-bar{background:#010920;border-bottom:1px solid rgba(96,165,250,0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:4px;}
.tab{flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:12px;background:transparent;color:#1e3a6e;border-bottom:3px solid transparent;text-align:center;letter-spacing:0.05em;}
.tab.active{color:#60a5fa;border-bottom-color:#3b82f6;}
.content{max-width:680px;margin:24px auto 0;padding:0 16px;}
.option-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;}
.option-sub{font-size:12px;color:#f87171;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;opacity:0.8;}
.warning-box{background:rgba(96,165,250,0.06);border-left:3px solid #3b82f6;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:20px;color:#bfdbfe;font-size:12px;line-height:1.6;}
.warning-box strong{color:#fff;}
.section-head{font-size:11px;font-weight:800;letter-spacing:0.18em;color:#f87171;text-transform:uppercase;margin:20px 0 12px;opacity:0.8;}
.pyramid-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin:8px 0 16px;}
.pyr-row{display:flex;align-items:center;justify-content:center;border-radius:8px;padding:10px 16px;}
.pyr-label{font-weight:800;color:#fff;font-size:13px;text-align:center;line-height:1.3;}
.pyr-val{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;font-weight:600;text-align:center;}
.pyr-direction{font-size:10px;font-weight:900;color:#f87171;letter-spacing:0.15em;text-align:center;margin:6px 0 4px;text-transform:uppercase;opacity:0.8;}
.round-block{background:#1a0505;border-radius:14px;border:1px solid rgba(239,68,68,0.2);padding:18px;margin-bottom:14px;}
.round-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.round-num{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;font-size:12px;font-weight:900;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.round-title{font-size:15px;font-weight:900;color:#fff;}
.round-dir{font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:0.1em;}
.totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.total-card{background:#061540;border-radius:10px;border:1px solid rgba(239,68,68,0.2);padding:12px 14px;text-align:center;}
.total-icon{font-size:20px;margin-bottom:4px;}
.total-val{font-size:18px;font-weight:900;color:#3b82f6;}
.total-label{font-size:10px;color:#fca5a5;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}

.sum-section{margin-top:28px;padding:0 16px 24px;}
.sum-hd{font-size:10px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;opacity:0.85;}
.sum-hd::after{content:'';flex:1;height:1px;}
.sum-card{border-radius:14px;padding:16px 18px;margin-bottom:8px;}
.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;opacity:0.75;}
.sum-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid;}
.sum-row:last-of-type{border-bottom:none;}
.sum-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.sum-nm{font-size:12px;font-weight:700;color:#e2e8f0;flex:1;line-height:1.3;}
.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.sum-st{font-size:11px;font-weight:900;text-align:right;}
.sum-rp{font-size:10px;text-align:right;opacity:0.75;}
.sum-div{height:1px;margin:12px 0;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
.sum-tot{border-radius:8px;padding:10px;text-align:center;}
.sum-tv{font-size:15px;font-weight:900;}
.sum-tl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;opacity:0.7;}


/* ── TIMER ── */
.rest-timer{
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
  padding:4px 10px;border-radius:8px;
  transition:all 0.15s;position:relative;
}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.rest-timer-icon{font-size:13px;}
.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;}
.rest-timer.idle .rest-timer-label{color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}
.rest-timer.overtime .rest-timer-label{color:#f87171;}
.rest-timer-hint{font-size:9px;color:#475569;margin-top:2px;font-style:italic;}

/* Floating timer display — shows when running */
.timer-float{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,16,0.95);backdrop-filter:blur(16px);
  border-radius:20px;padding:14px 24px;
  display:none;flex-direction:column;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  z-index:100;min-width:200px;
}
.timer-float.visible{display:flex;}
.timer-float-label{font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.timer-float-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.timer-float-time.done{color:#34d399;}
.timer-float-time.overtime{color:#f87171;}
.timer-float-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.timer-float-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-float-progress{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;width:100%;}
.timer-float-progress.done{background:#34d399;}
.timer-float-progress.overtime{background:#f87171;}
.timer-float-actions{display:flex;gap:8px;margin-top:6px;}
.timer-float-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.timer-float-skip{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.timer-float-reset{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}


.prog-bar-wrap{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:rgba(255,255,255,0.06);}
.prog-bar-fill{height:3px;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width 0.4s ease;border-radius:0 2px 2px 0;}
.timer-presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.timer-preset{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.05em;}
.timer-preset:active{background:rgba(212,175,55,0.2);color:#fbbf24;border-color:rgba(212,175,55,0.4);}

/* ── WEIGHT NOTES ── */
.ex-notes-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:6px;cursor:pointer;font-size:10px;font-weight:800;color:#475569;letter-spacing:0.06em;text-transform:uppercase;user-select:none;}
.ex-notes-toggle:active{color:#94a3b8;}
.ex-notes-wrap{display:none;margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08);}
.ex-notes-wrap.open{display:block;}
.ex-notes-input{width:100%;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:12px;font-weight:600;font-family:inherit;resize:none;line-height:1.5;}
.ex-notes-input::placeholder{color:#334155;}
.ex-notes-label{font-size:9px;font-weight:800;letter-spacing:0.15em;color:#475569;text-transform:uppercase;margin-bottom:4px;}



/* collapsed by default */
}
.setlog-wrap.open{ display:block; }

.setlog-toggle{
  display:flex;align-items:center;gap:5px;
  margin-top:6px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:900;
  color:#475569;letter-spacing:0.08em;
  text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.setlog-toggle .sl-chevron{ transition:transform 0.2s; }
.setlog-wrap.open ~ .setlog-toggle .sl-chevron,
.setlog-toggle.open .sl-chevron{ transform:rotate(180deg); }

.setlog-hist{
  font-size:10px;font-weight:700;
  color:rgba(212,175,55,0.55);
  margin-left:auto;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  max-width:140px;
}

.set-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;align-items:center;
  padding:7px 4px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.set-row:last-child{ border-bottom:none; }

.set-num{
  font-size:11px;font-weight:900;
  color:#475569;text-align:center;
}
.set-input{
  width:100%;padding:6px 4px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#e2e8f0;
  font-size:13px;font-weight:700;
  text-align:center;font-family:inherit;
  outline:none;
  -webkit-tap-highlight-color:transparent;
}
.set-input:focus{
  border-color:rgba(212,175,55,0.45);
  background:rgba(212,175,55,0.06);
}
.set-input::placeholder{ color:#2d3748;font-size:11px; }

.set-check{
  width:32px;height:32px;
  border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.set-check.done{
  background:rgba(52,211,153,0.15);
  border-color:rgba(52,211,153,0.4);
}
.set-row.done-row .set-input{
  opacity:0.45;
  text-decoration:line-through;
}

.setlog-header{
  display:grid;
  grid-template-columns:28px 1fr 1fr 36px;
  gap:6px;padding:4px 4px 2px;
}
.setlog-col-label{
  font-size:9px;font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#334155;text-align:center;
}


/* ── WAVE3-SETLOG ── */
.setlog-wrap{
  margin-top:8px;
  border-top:1px solid rgba(255,255,255,0.07);
  padding-top:2px;
  display:none;
}
.setlog-wrap.open{ display:block; }
.setlog-toggle{
  display:flex;align-items:center;gap:5px;
  margin-top:6px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:900;
  color:#475569;letter-spacing:0.08em;text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.setlog-hist{
  font-size:10px;font-weight:700;
  color:rgba(212,175,55,0.6);
  margin-left:auto;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:150px;
}
.set-row{
  display:grid;
  grid-template-columns:24px 1fr 1fr 34px;
  gap:5px;align-items:center;
  padding:6px 2px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.set-row:last-child{ border-bottom:none; }
.set-num{font-size:11px;font-weight:900;color:#475569;text-align:center;}
.set-input{
  width:100%;padding:6px 4px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#e2e8f0;
  font-size:13px;font-weight:700;text-align:center;
  font-family:inherit;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.set-input:focus{border-color:rgba(212,175,55,0.45);background:rgba(212,175,55,0.06);}
.set-input::placeholder{color:#2d3748;font-size:11px;}
.set-check{
  width:30px;height:30px;border-radius:7px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
}
.set-check.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);}
.set-row.done-row .set-input{opacity:0.4;}
.setlog-col-hdr{
  display:grid;grid-template-columns:24px 1fr 1fr 34px;
  gap:5px;padding:4px 2px 2px;
}
.setlog-col-label{
  font-size:9px;font-weight:900;letter-spacing:0.1em;
  text-transform:uppercase;color:#2d3748;text-align:center;
}

</style>
</head>
<body>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
<div class="app" id="app"></div>
<script>
let activeTab = 0;

const TIMED_DOWN = [
  {icon:"🦵", label:"Walking Lunges", val:"50–100 reps", width:100, color:"#7f1d1d"},
  {icon:"🪢", label:"Jump Rope", val:"5 minutes", width:80, color:"#991b1b"},
  {icon:"⭐", label:"Jumping Jacks", val:"3 minutes", width:60, color:"#b91c1c"},
  {icon:"🏔️", label:"Mountain Climbers", val:"2 minutes", width:40, color:"#dc2626"},
  {icon:"💀", label:"Burpees", val:"1 minute", width:22, color:"#ef4444"},
];

const TIMED_UP = [
  {icon:"💀", label:"Burpees", val:"1 minute", width:22, color:"#ef4444"},
  {icon:"🏔️", label:"Mountain Climbers", val:"2 minutes", width:40, color:"#dc2626"},
  {icon:"⭐", label:"Jumping Jacks", val:"3 minutes", width:60, color:"#b91c1c"},
  {icon:"🪢", label:"Jump Rope", val:"5 minutes", width:80, color:"#991b1b"},
  {icon:"🦵", label:"Walking Lunges", val:"50–100 reps", width:100, color:"#7f1d1d"},
];

const REPS_DOWN = [
  {icon:"🪢", label:"Jump Rope", val:"3 min", width:100, color:"#7f1d1d"},
  {icon:"⭐", label:"Jumping Jacks", val:"100 reps", width:80, color:"#991b1b"},
  {icon:"🦵", label:"Walking Lunges", val:"75 reps", width:60, color:"#b91c1c"},
  {icon:"💪", label:"Push-ups", val:"50 reps", width:40, color:"#dc2626"},
  {icon:"💀", label:"Burpees", val:"25 reps", width:22, color:"#ef4444"},
];

const REPS_UP = [
  {icon:"💀", label:"Burpees", val:"25 reps", width:22, color:"#ef4444"},
  {icon:"💪", label:"Push-ups", val:"50 reps", width:40, color:"#dc2626"},
  {icon:"🦵", label:"Walking Lunges", val:"75 reps", width:60, color:"#b91c1c"},
  {icon:"⭐", label:"Jumping Jacks", val:"100 reps", width:80, color:"#991b1b"},
  {icon:"🪢", label:"Jump Rope", val:"3 min", width:100, color:"#7f1d1d"},
];

function pyramid(rows, dir) {
  const html = rows.map(function(r) {
    return '<div class="pyr-row" style="width:' + r.width + '%;background:' + r.color + ';min-width:140px;">' +
      '<div><div class="pyr-label">' + r.icon + ' ' + r.label + '</div>' +
      '<div class="pyr-val">' + r.val + '</div></div></div>';
  }).join('');
  return '<div class="pyr-direction">' + dir + '</div><div class="pyramid-wrap">' + html + '</div>';
}

function roundBlock(num, title, dir, rows, dirLabel) {
  return '<div class="round-block">' +
    '<div class="round-header">' +
    '<div class="round-num">' + num + '</div>' +
    '<div><div class="round-title">' + title + '</div><div class="round-dir">' + dir + '</div></div>' +
    '</div>' +
    pyramid(rows, dirLabel) +
    '</div>';
}

function renderTimed() {
  return '<div class="option-title">Timed Pyramid</div>' +
    '<div class="option-sub">3 rounds · 90 sec–2 min rest between rounds</div>' +
    '<div class="warning-box"><strong>3 rounds total.</strong> Complete all 5 exercises per round. Rest 90 seconds to 2 minutes between rounds.</div>' +
    roundBlock(1, 'Round 1', '▼ Descending', TIMED_DOWN, '▼ Top to Bottom') +
    roundBlock(2, 'Round 2', '▲ Ascending', TIMED_UP, '▲ Bottom to Top') +
    roundBlock(3, 'Round 3', '▼ Mirrors Round 1', TIMED_DOWN, '▼ Top to Bottom') +
    '<div class="section-head">Total Workout Volume</div>' +
    '<div class="totals-grid">' +
    '<div class="total-card"><div class="total-icon">🦵</div><div class="total-val">150–300</div><div class="total-label">Walking Lunges</div></div>' +
    '<div class="total-card"><div class="total-icon">🪢</div><div class="total-val">15 min</div><div class="total-label">Jump Rope</div></div>' +
    '<div class="total-card"><div class="total-icon">⭐</div><div class="total-val">9 min</div><div class="total-label">Jumping Jacks</div></div>' +
    '<div class="total-card"><div class="total-icon">🏔️</div><div class="total-val">6 min</div><div class="total-label">Mountain Climbers</div></div>' +
    '<div class="total-card"><div class="total-icon">💀</div><div class="total-val">3 min</div><div class="total-label">Burpees</div></div>' +
    '</div>';
}

function renderReps() {
  return '<div class="option-title">Reps Pyramid</div>' +
    '<div class="option-sub">4 rounds · alternating direction</div>' +
    '<div class="warning-box"><strong>Odd rounds (1 & 3):</strong> Descending — top to bottom.<br><strong>Even rounds (2 & 4):</strong> Ascending — bottom to top.</div>' +
    roundBlock(1, 'Round 1', '▼ Descending', REPS_DOWN, '▼ Top to Bottom') +
    roundBlock(2, 'Round 2', '▲ Ascending', REPS_UP, '▲ Bottom to Top') +
    roundBlock(3, 'Round 3', '▼ Mirrors Round 1', REPS_DOWN, '▼ Top to Bottom') +
    roundBlock(4, 'Round 4', '▲ Mirrors Round 2', REPS_UP, '▲ Bottom to Top') +
    '<div class="section-head">Total Workout Volume</div>' +
    '<div class="totals-grid">' +
    '<div class="total-card"><div class="total-icon">🪢</div><div class="total-val">12 min</div><div class="total-label">Jump Rope</div></div>' +
    '<div class="total-card"><div class="total-icon">⭐</div><div class="total-val">400</div><div class="total-label">Jumping Jacks</div></div>' +
    '<div class="total-card"><div class="total-icon">🦵</div><div class="total-val">300</div><div class="total-label">Walking Lunges</div></div>' +
    '<div class="total-card"><div class="total-icon">💪</div><div class="total-val">200</div><div class="total-label">Push-ups</div></div>' +
    '<div class="total-card"><div class="total-icon">💀</div><div class="total-val">100</div><div class="total-label">Burpees</div></div>' +
    '</div>';
}

function render() {
  var tab0 = activeTab === 0 ? 'active' : '';
  var tab1 = activeTab === 1 ? 'active' : '';
  document.getElementById("app").innerHTML =
    '<div class="header">' +
    '<a href="cat-faint.html" class="back-link">← Back</a>' +
    '<div class="header-inner">' +
    '<div class="eyebrow">🔺 Full Body · Pyramid</div>' +
    '<div class="title">Full Body Pyramid</div>' +
    '<div><span class="schedule">Timed + Reps Options</span></div>' +
    '</div></div>' +
    '<div class="tabs-bar"><div class="tabs">' +
    '<button class="tab ' + tab0 + '" data-t="0">TIMED</button>' +

// ── TIMER ENGINE ──────────────────────────────────────────────────
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 500);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },500);
  }
};

// ── STOPWATCH ENGINE (cardio pages) ──────────────────────────────
const SW = {
  interval: null,
  startTime: null,
  elapsed: 0,
  running: false,

  formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  },

  toggle() {
    if (this.running) {
      clearInterval(this.interval);
      this.elapsed += Date.now() - this.startTime;
      this.running = false;
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '▶ Resume'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
    } else {
      this.startTime = Date.now();
      this.running = true;
      this.interval = setInterval(() => {
        const total = this.elapsed + (Date.now() - this.startTime);
        const el = document.getElementById('swDisplay');
        if (el) el.textContent = this.formatTime(total);
      }, 100);
      const btn = document.getElementById('swBtn');
      if (btn) { btn.textContent = '⏸ Pause'; btn.style.background = 'rgba(251,191,36,0.15)'; btn.style.color = '#fbbf24'; }
    }
  },

  reset() {
    clearInterval(this.interval);
    this.elapsed = 0;
    this.running = false;
    const el = document.getElementById('swDisplay');
    if (el) el.textContent = '00:00';
    const btn = document.getElementById('swBtn');
    if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'rgba(52,211,153,0.15)'; btn.style.color = '#34d399'; }
  },

  lap() {
    if (!this.running && this.elapsed === 0) return;
    const total = this.elapsed + (this.running ? Date.now() - this.startTime : 0);
    const list = document.getElementById('swLaps');
    if (list) {
      const count = list.children.length + 1;
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;';
      item.innerHTML = '<span style="color:#64748b;">Lap ' + count + '</span><span style="color:#e2e8f0;font-weight:700;">' + this.formatTime(total) + '</span>';
      list.prepend(item);
    }
  }
};

function buildStopwatch(container) {
  const el = document.createElement('div');
  el.style.cssText = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin:16px 0;text-align:center;';
  el.innerHTML = `

      <button onclick="SW.lap()" style="padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:12px;font-weight:800;background:transparent;color:#64748b;letter-spacing:0.06em;">Lap</button>

}

(function() {
  const REPLACE_KEY = 'mc_replacements';
  function applyReplacements() {
    const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';
        if (!card.querySelector('.replaced-badge')) {
          const badge = document.createElement('span');
          badge.className = 'replaced-badge';
          badge.style.cssText = 'font-size:9px;font-weight:900;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:2px 5px;margin-left:6px;letter-spacing:0.06em;vertical-align:middle;';
          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // Long press to replace
  let pressTimer;
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.ex-card, .ex-item, .lift-card');
    if (!card) return;
    pressTimer = setTimeout(function() {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.dataset.orig || nameEl.textContent.trim();
      nameEl.dataset.orig = origName;
      // Navigate to library with exercise pre-selected
      const url = 'exercise-library.html?replace=' + encodeURIComponent(origName);
      if (confirm('Replace "' + origName.substring(0,40) + '"?\nTap OK to open Exercise Library.')) {
        window.location.href = url;
      }
    }, 600);
  }, {passive: true});
  document.addEventListener('touchend', function() { clearTimeout(pressTimer); }, {passive: true});
  document.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, {passive: true});
})();
</script>


<script>
/* ── WAVE3-SETLOG MODULE ── */
(function(){
  const STORE_KEY = 'mc_setlog_v1';
  const PAGE_ID   = location.pathname.split('/').pop().replace('.html','');

  function store(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; } }
  function exKey(id){ return PAGE_ID+'|'+id; }

  function saveSet(exId,setNum,weight,reps){
    const s=store(), k=exKey(exId);
    if(!s[k]) s[k]=[];
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    let sess=s[k][0];
    if(!sess||sess.d!==today){ sess={d:today,sets:{}}; s[k].unshift(sess); s[k]=s[k].slice(0,20); }
    sess.sets[setNum]={w:weight,r:reps};
    localStorage.setItem(STORE_KEY,JSON.stringify(s));
  }

  function getLastSession(exId){ const s=store(); return (s[exKey(exId)]||[])[0]||null; }
  function getLastSet(exId,setNum){ const sess=getLastSession(exId); return sess?sess.sets[setNum]||null:null; }

  function renderHist(exId){
    const el=document.getElementById('sl-hist-'+exId);
    if(!el) return;
    const sess=getLastSession(exId);
    if(!sess){ el.textContent=''; return; }
    const ws=Object.values(sess.sets).map(s=>parseFloat(s.w)||0).filter(Boolean);
    el.textContent=ws.length?'Last: '+Math.max(...ws)+' lb \u00b7 '+sess.d:sess.d;
  }

  function parseSetCount(s){
    if(!s) return 3;
    const x=s.match(/^(\d+)\s*[x\u00d7]/i); if(x) return Math.min(parseInt(x[1]),10);
    const c=s.split(','); if(c.length>1) return c.length;
    const n=s.match(/^(\d+)/); return n?Math.min(parseInt(n[1]),8):3;
  }

  function parseReps(s,i){
    if(!s) return '';
    const c=s.split(','); if(c.length>1) return (c[i]||c[c.length-1]).trim();
    const x=s.match(/[x\u00d7](\d+)/i); if(x) return x[1];
    return '';
  }

  function buildRows(exId,setsStr,restSecs){
    const n=parseSetCount(setsStr);
    let h='<div class="setlog-col-hdr"><div class="setlog-col-label">SET</div><div class="setlog-col-label">WEIGHT</div><div class="setlog-col-label">REPS</div><div class="setlog-col-label"></div></div>';
    for(let i=0;i<n;i++){
      const sn=i+1;
      const last=getLastSet(exId,sn);
      const pr=parseReps(setsStr,i);
      const wp=last&&last.w?last.w+' lb':'lb';
      const rp=pr||(last&&last.r?last.r:'reps');
      h+='<div class="set-row" id="sr-'+exId+'-'+sn+'">'+
        '<div class="set-num">'+sn+'</div>'+
        '<input class="set-input" id="sl-w-'+exId+'-'+sn+'" type="number" inputmode="decimal" placeholder="'+wp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<input class="set-input" id="sl-r-'+exId+'-'+sn+'" type="number" inputmode="numeric" placeholder="'+rp+'" onclick="event.stopPropagation()" onfocus="this.select()">'+
        '<div class="set-check" id="sl-ck-'+exId+'-'+sn+'" onclick="event.stopPropagation();_SL.ck(\''+exId+'\','+sn+','+restSecs+')">&#9744;</div>'+
        '</div>';
    }
    return h;
  }

  function ck(exId,setNum,restSecs){
    const wEl=document.getElementById('sl-w-'+exId+'-'+setNum);
    const rEl=document.getElementById('sl-r-'+exId+'-'+setNum);
    const ckEl=document.getElementById('sl-ck-'+exId+'-'+setNum);
    const rowEl=document.getElementById('sr-'+exId+'-'+setNum);
    if(!ckEl) return;
    if(ckEl.classList.contains('done')){
      ckEl.classList.remove('done'); ckEl.innerHTML='&#9744;';
      if(rowEl) rowEl.classList.remove('done-row'); return;
    }
    saveSet(exId,setNum,wEl?wEl.value.trim():'',rEl?rEl.value.trim():'');
    ckEl.classList.add('done'); ckEl.textContent='\u2713';
    if(rowEl) rowEl.classList.add('done-row');
    // Fire rest timer if available
    if(restSecs>0&&typeof TMR!=='undefined'){
      const existing=document.querySelector('.rest-timer.idle, .rest-timer[data-rest]');
      if(existing) TMR.start(existing,restSecs,'Rest');
    }
    renderHist(exId);
  }

  function getRestSecs(card){
    const t=card.querySelector('.rest-timer');
    if(t&&t.dataset&&t.dataset.rest&&typeof TMR!=='undefined'){
      return TMR.parseSeconds(t.dataset.rest)||60;
    }
    return 60;
  }

  function addLogger(el, exId, setsStr, restSecs, isSS){
    if(el.querySelector('.setlog-wrap')) return;
    // Clean up old loggers
    ['ex-notes-toggle','ex-notes-wrap','.log-row'].forEach(sel=>{
      const old=el.querySelector(sel); if(old) old.remove();
    });
    const histId='sl-hist-'+exId;
    const tgl=document.createElement('div');
    tgl.className='setlog-toggle';
    tgl.id='sl-tgl-'+exId;
    tgl.innerHTML='<span class="sl-arr">\u25be</span>\u00a0<span class="sl-lbl">LOG SETS</span><span class="setlog-hist" id="'+histId+'"></span>';
    tgl.addEventListener('click',function(e){
      e.stopPropagation();
      const wrap=document.getElementById('sl-wrap-'+exId);
      if(!wrap) return;
      const open=wrap.classList.toggle('open');
      tgl.querySelector('.sl-lbl').textContent=open?'HIDE':'LOG SETS';
      tgl.querySelector('.sl-arr').textContent=open?'\u25b4':'\u25be';
    });
    const wrap=document.createElement('div');
    wrap.className='setlog-wrap'; wrap.id='sl-wrap-'+exId;
    wrap.innerHTML=buildRows(exId,setsStr,restSecs);
    el.appendChild(tgl);
    el.appendChild(wrap);
    renderHist(exId);
  }

  function initLogger(){
    // Single exercise cards
    document.querySelectorAll('.ex-card[data-id]').forEach(card=>{
      const exId=card.dataset.id;
      const content=card.querySelector('.ex-content');
      if(!content) return;
      const setsStr=(card.querySelector('.ex-sets')||{}).textContent||'3x10';
      const restSecs=getRestSecs(card);
      addLogger(content,exId,setsStr.trim(),restSecs,false);
    });
    // Superset exercise rows
    document.querySelectorAll('.ss-ex[data-id]').forEach(row=>{
      const exId=row.dataset.id;
      const content=row.querySelector('.ss-content');
      if(!content) return;
      const setsStr=(row.querySelector('.ex-sets')||{}).textContent||'4x12';
      addLogger(content,exId,setsStr.trim(),90,true);
    });
  }

  window._SL={ck,initLogger};

  // Hook into existing render()
  const _origRender=window.render;
  if(typeof _origRender==='function'){
    window.render=function(){
      _origRender.apply(this,arguments);
      setTimeout(initLogger,250);
    };
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){ setTimeout(initLogger,350); });
  } else {
    setTimeout(initLogger,350);
  }
})();
</script>

</body>
</html>
