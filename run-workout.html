<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Custom Workout &mdash; MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#050d1a;min-height:100vh;padding-bottom:150px;color:#e2e8f0;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);padding:58px 20px 22px;border-bottom:1px solid rgba(52,211,153,0.18);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#34d399;text-decoration:none;font-size:13px;font-weight:700;background:rgba(52,211,153,0.12);padding:6px 14px;border-radius:20px;border:1px solid rgba(52,211,153,0.35);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.22em;color:#34d399;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px;word-break:break-word;}
.subtitle{font-size:12px;color:#64748b;font-weight:600;}
.content{max-width:680px;margin:0 auto;padding:6px 16px 0;}
.ex-card{background:#0d1f3c;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:0;margin:10px 0;overflow:hidden;transition:border-color .2s,background .2s;}
.ex-card.checked{border-color:rgba(52,211,153,0.5);background:rgba(52,211,153,0.06);}
.ex-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ex-head:active{background:rgba(255,255,255,0.03);}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#04121f;}
.ex-card.checked .ex-check{background:#34d399;border-color:#34d399;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:800;color:#e2e8f0;line-height:1.3;}
.ex-card.checked .ex-name{text-decoration:line-through;opacity:0.65;}
.ex-muscle{font-size:11px;color:#64748b;font-weight:600;margin-top:2px;}
.ex-sets{font-size:12px;font-weight:800;color:#34d399;flex-shrink:0;white-space:nowrap;}
.ex-content{padding:0 14px 4px;}
.fw-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;gap:10px;align-items:center;
  background:linear-gradient(180deg,rgba(5,13,26,0.3),#050d1a 35%);border-top:1px solid rgba(255,255,255,0.08);
  padding:12px 16px calc(14px + env(safe-area-inset-bottom));}
.fw-inner{max-width:680px;margin:0 auto;width:100%;display:flex;gap:10px;align-items:center;}
.finish-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;letter-spacing:0.03em;
  background:linear-gradient(90deg,#22d3ee,#34d399);color:#04121f;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.finish-btn:active{transform:scale(0.98);}
.miss{text-align:center;padding:70px 24px;color:#64748b;}
.miss a{color:#34d399;font-weight:800;text-decoration:none;}
</style>
<link rel="stylesheet" href="mc-nav.css"/>
<link rel="stylesheet" href="mc-setlog.css"/>
<link rel="stylesheet" href="mc-summary.css"/>
<script>
// Namespace this run's persistence per custom workout BEFORE the shared
// logger/summary modules read it (they capture window.MC_PID_OVERRIDE on load).
(function(){
  var id = new URLSearchParams(location.search).get('id') || 'unknown';
  window.__CW_ID = id;
  window.MC_PID_OVERRIDE = 'custom-' + id;
})();
</script>
</head>
<body>
<div class="header">
  <a href="build-workout.html" class="back-link">&larr; Builder</a>
  <div class="header-inner">
    <div class="eyebrow">&#128295; Custom Workout</div>
    <div class="title" id="wkTitle">Workout</div>
    <div class="subtitle" id="wkSub"></div>
  </div>
</div>

<div class="content" id="cards"></div>

<div class="fw-bar" id="fwBar" style="display:none;">
  <div class="fw-inner">
    <button class="finish-btn" onclick="finishWorkout()">🏁 Finish Workout</button>
  </div>
</div>

<script>
var CW_KEY = 'mc_custom_workouts_v1';
var SL_KEY = 'mc_setlog_v1';
var WL_KEY = 'mc_workout_log_v1';
var PID = window.MC_PID_OVERRIDE;

function getWorkout(){
  var id = window.__CW_ID;
  var all; try{ all = JSON.parse(localStorage.getItem(CW_KEY)||'[]'); }catch(e){ all = []; }
  return all.filter(function(w){ return w.id===id; })[0] || null;
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function slug(s){ return String(s).trim().replace(/\s+/g,'-').toLowerCase().replace(/[^a-z0-9_-]/g,'').slice(0,24)||'ex'; }

function render(){
  var wk = getWorkout();
  var cards = document.getElementById('cards');
  if(!wk){
    document.getElementById('wkTitle').textContent = 'Workout not found';
    cards.innerHTML = '<div class="miss">This custom workout could not be found.<br><br><a href="build-workout.html">← Back to Builder</a></div>';
    return;
  }
  document.getElementById('wkTitle').textContent = wk.name;
  document.title = wk.name + ' — MC Training';
  document.getElementById('wkSub').textContent = wk.exercises.length + ' exercises';

  cards.innerHTML = wk.exercises.map(function(ex, i){
    var scheme = (ex.sets||3) + ' × ' + (ex.reps||'10');
    var did = 'cw' + i + '-' + slug(ex.name);
    return '<div class="ex-card" data-id="'+did+'">'
      + '<div class="ex-head" data-toggle="1">'
      +   '<div class="ex-check">✓</div>'
      +   '<div class="ex-info"><div class="ex-name">'+esc(ex.name)+'</div>'
      +     '<div class="ex-muscle">'+esc(ex.muscle||'')+'</div></div>'
      +   '<div class="ex-sets">'+esc(scheme)+'</div>'
      + '</div>'
      + '<div class="ex-content"></div>'
      + '</div>';
  }).join('');

  // tap header to toggle completion (drives the live summary + daily tracking)
  Array.prototype.forEach.call(cards.querySelectorAll('.ex-head[data-toggle]'), function(h){
    h.addEventListener('click', function(){ h.closest('.ex-card').classList.toggle('checked'); });
  });
  document.getElementById('fwBar').style.display = 'block';
}

function finishWorkout(){
  var wk = getWorkout(); if(!wk) return;
  var sl; try{ sl = JSON.parse(localStorage.getItem(SL_KEY)||'{}'); }catch(e){ sl = {}; }
  var cards = document.querySelectorAll('.ex-card');
  var sets = [];
  Array.prototype.forEach.call(cards, function(c){
    var name = (c.querySelector('.ex-name')||{}).textContent || '';
    var arr = sl[PID + '|' + c.dataset.id];
    var sess = arr && arr[0];
    if(sess && sess.sets){
      Object.keys(sess.sets).forEach(function(sn){
        var v = sess.sets[sn];
        if((v.w && v.w!=='') || (v.r && v.r!=='')) sets.push({ name:name, weight:v.w||'', reps:v.r||'' });
      });
    }
  });
  var done = document.querySelectorAll('.ex-card.checked').length;
  var log; try{ log = JSON.parse(localStorage.getItem(WL_KEY)||'[]'); }catch(e){ log = []; }
  log.push({
    date: new Date().toISOString(),
    time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    workoutName: wk.name, pageId: PID, sets: sets, prs: 0,
    duration: '', custom: true
  });
  try{ localStorage.setItem(WL_KEY, JSON.stringify(log)); }catch(e){}
  alert('🏁 "' + wk.name + '" logged — ' + done + '/' + cards.length + ' exercises, ' + sets.length + ' sets recorded.');
  location.href = 'workout-logs.html';
}

render();
</script>
<script src="mc-setlog.js"></script>
<script src="mc-summary.js"></script>
<script src="mc-nav.js"></script>
</body>
</html>
