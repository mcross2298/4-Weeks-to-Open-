<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Custom Workout &mdash; MC Training</title>
<style>
:root{--accent:#34d399;--accent-rgb:52,211,153;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);}
.hint{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin:6px 0 14px;text-align:center;opacity:0.6;}
.miss{padding:40px 20px;text-align:center;color:#64748b;line-height:1.6;}
.miss a{color:var(--accent);font-weight:800;text-decoration:none;}
.fw-inner{max-width:680px;margin:0 auto;width:100%;}
.finish-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;letter-spacing:0.03em;cursor:pointer;background:linear-gradient(90deg,#22d3ee,#34d399);color:#04121f;-webkit-tap-highlight-color:transparent;}
.finish-btn:active{transform:scale(0.98);}
</style>
<link rel="stylesheet" href="base.css"/>
<link rel="stylesheet" href="mc-card-actions.css"/>
<link rel="stylesheet" href="mc-nav.css"/>
<link rel="stylesheet" href="mc-summary.css"/>
<link rel="stylesheet" href="mc-setlog.css"/>
<script>
// Namespace this run's persistence per custom workout BEFORE the shared
// logger/summary modules read it (they capture window.MC_PID_OVERRIDE on load).
(function(){
  var id = new URLSearchParams(location.search).get('id') || 'unknown';
  window.__CW_ID = id;
  window.MC_PID_OVERRIDE = 'custom-' + id;
})();
</script>
</head>
<body>
<div class="header">
  <a href="build-workout.html" class="back-link">&larr; Builder</a>
  <div class="header-inner">
    <div class="eyebrow">&#128295; Custom Workout</div>
    <div class="title" id="wkTitle">Workout</div>
    <div class="subtitle" id="wkSub"></div>
  </div>
</div>

<div class="content" id="cards"></div>

<div class="fw-bar" id="fwBar" style="display:none;">
  <div class="fw-inner">
    <button class="finish-btn" onclick="finishWorkout()">🏁 Finish Workout</button>
  </div>
</div>

<script>
// ===== ported rest-timer engine (verbatim from the programmed pages) =====
// ── TIMER ENGINE (hoisted) ──
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',
  _autoDismiss: null,

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    const _sov=document.getElementById('timerOverlay');if(_sov)_sov.style.display='block';
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
        if(!this._autoDismiss)this._autoDismiss=setTimeout(()=>this.stop(),4000);
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 1000);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
    const _ov=document.getElementById('timerOverlay');if(_ov)_ov.style.display='none';
    if(this._autoDismiss){clearTimeout(this._autoDismiss);this._autoDismiss=null;}
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    this.stop();
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}if(!TMR._autoDismiss)TMR._autoDismiss=setTimeout(()=>TMR.stop(),4000);}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },1000);
  }
};

function buildTimerFloat() {
  if (document.getElementById('timerFloat')) return;
  const div = document.createElement('div');
  div.id = 'timerFloat';
  div.className = 'timer-float';
  div.innerHTML = `
    <div id="timerFloatLabel" class="timer-float-label">REST</div>
    <div id="timerFloatTime" class="timer-float-time">0s</div>
    <div id="timerFloatEx" class="timer-float-ex"></div>
    <div class="timer-float-bar"><div id="timerFloatProgress" class="timer-float-progress"></div></div>
    <div class="timer-float-actions">
      <button class="timer-float-btn timer-float-skip" onclick="TMR.stop()">✓ Done</button>
      <button class="timer-float-btn timer-float-reset" onclick="TMR.stop()">✕ Cancel</button>
    </div>`;
  document.body.appendChild(div);
  if(!document.getElementById('timerOverlay')){const _tov=document.createElement('div');_tov.id='timerOverlay';_tov.style.cssText='position:fixed;inset:0;z-index:99;display:none;cursor:pointer;';_tov.addEventListener('click',function(){TMR.stop();});document.body.insertBefore(_tov,div);}
}

function makeRestTimer(restStr, exerciseName) {
  const secs = TMR.parseSeconds(restStr);
  if (!secs) return '<span class="ex-sets" style="opacity:0.5">⏱️ ' + restStr + '</span>';
  const label = restStr;
  return '<span class="rest-timer idle" data-rest="' + restStr + '" data-label="' + label + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + secs + ',\'' + exerciseName.replace(/'/g,"\'").substring(0,30) + '...\')" ' +
    'title="Tap to start rest timer">' +
    '<span class="rest-timer-icon">⏱️</span>' +
    '<span class="rest-timer-label">' + label + '</span>' +
    '</span>';
}
buildTimerFloat();

// ===== ported escapeHtml + Concept-A renderExercise (shared card markup) =====
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderExercise(ex,dIdx,eIdx){
  // Concept A — accent-driven exercise card. Preserves all behavioural hooks
  // (.ex-card/.ex-body/.ex-name/[data-field=sets|name|rest]/.rest-timer) that
  // mc-setlog.js, mc-card-actions.js, mc-summary.js and stndr-checkoff.js use.
  const grouped=ex.tag==="SUPERSET"||ex.tag==="TRI-SET";
  const ssCls=ex.tag==="TRI-SET"?" is-tri":(ex.tag==="SUPERSET"?" is-ss":(ex.tag==="CLUSTER"?" is-cluster":""));
  const legsArr=String(ex.sets||"—").split("/").map(s=>s.trim());
  const repsHtml=legsArr.map((part,pi)=>{
    const reps=part.split(",").map(r=>r.trim());
    const legTag=legsArr.length>1?`<span class="a-legtag">${pi===0?"A":"B"}</span>`:"";
    const chips=reps.map((rep,ri)=>{
      const special=rep.toUpperCase().includes("AMRAP")||rep.includes("Drop")||rep.includes("×");
      const cls=special?"a-rep special":(ri===0?"a-rep live":"a-rep");
      const sep=ri<reps.length-1?'<span class="a-sep">·</span>':"";
      return `<span class="${cls}">${escapeHtml(rep)}</span>${sep}`;
    }).join("");
    return `<div class="a-leg">${legTag}${chips}</div>`;
  }).join("");
  const badges=[];
  if(ex.tag)badges.push(`<span class="a-pill grp">${escapeHtml(ex.tag)}</span>`);
  if(ex.tempo)ex.tempo.split("/").forEach(t=>badges.push(`<span class="a-pill tempo">⏱ ${escapeHtml(t.trim())}</span>`));
  const badgeHtml=badges.length?`<div class="a-badges">${badges.join("")}</div>`:"";
  const notesHtml=ex.notes?`<div class="a-notes">📝 ${escapeHtml(ex.notes)}</div>`:"";
  return `<div class="ex-card a-card${ssCls}"><div class="ex-body">
    <div class="a-top">
      <div class="a-idx">${eIdx+1}</div>
      <div class="a-head">
        <div class="ex-name a-name"><span class="editable" data-field="name" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.name)}</span></div>
        ${badgeHtml}
      </div>
    </div>
    <div class="a-reps">${repsHtml}</div>
    <div class="a-strip">
      <div class="a-cell"><span class="k">Sets</span><span class="v"><span class="editable" data-field="sets" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.sets)}</span></span></div>
      <div class="a-cell"><span class="k">Rest</span><span class="v"><span class="editable" data-field="rest" data-d="${dIdx}" data-e="${eIdx}">${escapeHtml(ex.rest)}</span></span></div>
    </div>
    <div class="a-timerbar">${makeRestTimer(ex.rest||'60 sec',ex.name)}</div>
    ${notesHtml}
  </div></div>`;
}
</script>

<script>
var CW_KEY = 'mc_custom_workouts_v1';
var SL_KEY = 'mc_setlog_v1';
var WL_KEY = 'mc_workout_log_v1';
var PID = window.MC_PID_OVERRIDE;

function getWorkout(){
  var id = window.__CW_ID;
  var all; try{ all = JSON.parse(localStorage.getItem(CW_KEY)||'[]'); }catch(e){ all = []; }
  return all.filter(function(w){ return w.id===id; })[0] || null;
}
function slug(s){ return String(s).trim().replace(/\s+/g,'-').toLowerCase().replace(/[^a-z0-9_-]/g,'').slice(0,24)||'ex'; }

// Map a builder exercise {name,muscle,sets:int,reps:string} onto the program
// exercise shape {name,sets,rest,tempo,tag} the shared card renderer expects.
// A comma-list in reps is honoured as-is; otherwise reps are repeated `sets`
// times so the rep chips and the set-logger row count line up.
function setsStrOf(ex){
  var rep = ('' + (ex.reps==null ? '10' : ex.reps)).trim();
  if(rep.indexOf(',') >= 0)
    return rep.split(',').map(function(s){return s.trim();}).filter(Boolean).join(', ');
  var n = parseInt(ex.sets,10) || 3;
  var out = []; for(var i=0;i<n;i++) out.push(rep || '10');
  return out.join(', ');
}

function render(){
  var wk = getWorkout();
  var cards = document.getElementById('cards');
  if(!wk){
    document.getElementById('wkTitle').textContent = 'Workout not found';
    cards.innerHTML = '<div class="miss">This custom workout could not be found.<br><br><a href="build-workout.html">← Back to Builder</a></div>';
    return;
  }
  document.getElementById('wkTitle').textContent = wk.name;
  document.title = wk.name + ' — MC Training';
  document.getElementById('wkSub').textContent = wk.exercises.length + ' exercise' + (wk.exercises.length!==1?'s':'');

  cards.innerHTML = '<div class="hint">Tap ⋯ for options · Log your sets · Tap ⏱ to rest</div>'
    + wk.exercises.map(function(ex, i){
        var pe = { name:ex.name, sets:setsStrOf(ex), rest:(ex.rest||'90 sec'), tempo:null, tag:null };
        var did = 'cw' + i + '-' + slug(ex.name);
        // Inject a stable data-id so mc-setlog + finishWorkout share the same key.
        return renderExercise(pe, 0, i)
          .replace('<div class="ex-card a-card', '<div data-id="' + did + '" class="ex-card a-card');
      }).join('');

  document.getElementById('fwBar').style.display = 'block';
}

function finishWorkout(){
  var wk = getWorkout(); if(!wk) return;
  var sl; try{ sl = JSON.parse(localStorage.getItem(SL_KEY)||'{}'); }catch(e){ sl = {}; }
  var cards = document.querySelectorAll('.ex-card');
  var sets = [];
  Array.prototype.forEach.call(cards, function(c){
    var name = (c.querySelector('.ex-name')||{}).textContent || '';
    var arr = sl[PID + '|' + c.dataset.id];
    var sess = arr && arr[0];
    if(sess && sess.sets){
      Object.keys(sess.sets).forEach(function(sn){
        var v = sess.sets[sn];
        if((v.w && v.w!=='') || (v.r && v.r!=='')) sets.push({ name:name.trim(), weight:v.w||'', reps:v.r||'' });
      });
    }
  });
  var done = document.querySelectorAll('.ex-card.checked').length;
  var log; try{ log = JSON.parse(localStorage.getItem(WL_KEY)||'[]'); }catch(e){ log = []; }
  log.push({
    date: new Date().toISOString(),
    time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    workoutName: wk.name, pageId: PID, sets: sets, prs: 0,
    duration: '', custom: true
  });
  try{ localStorage.setItem(WL_KEY, JSON.stringify(log)); }catch(e){}
  alert('🏁 "' + wk.name + '" logged — ' + done + '/' + cards.length + ' exercises, ' + sets.length + ' sets recorded.');
  location.href = 'workout-logs.html';
}

render();
</script>

<script src="mc-setlog.js"></script>
