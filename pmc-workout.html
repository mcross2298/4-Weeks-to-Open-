<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMC Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0d0618;min-height:100vh;padding-bottom:60px;}
/* ── LAYOUT ── */
.prog-bar-wrap{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:rgba(255,255,255,0.06);}
.prog-bar-fill{height:3px;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width 0.4s ease;border-radius:0 2px 2px 0;}
.back-link{position:absolute;top:18px;left:18px;text-decoration:none;font-size:13px;font-weight:700;background:rgba(192,132,252,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(192,132,252,0.3);z-index:10;color:#c084fc;}
.header{padding:60px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-0.02em;}
.week-badge{display:inline-block;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;border:1px solid;}
/* ── WEEK TABS ── */
.week-tabs{position:sticky;top:0;z-index:8;background:#0d0618;padding:0 12px;}
.wtabs{max-width:680px;margin:0 auto;display:flex;}
.wtab{flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:12px;background:transparent;border-bottom:3px solid transparent;text-align:center;letter-spacing:0.06em;color:#334155;transition:color 0.15s,border-color 0.15s;}
/* ── CONTENT ── */
.content{max-width:680px;margin:20px auto 0;padding:0 16px;}
.tap-hint{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;text-align:center;opacity:0.5;}
/* ── CONFUSION BANNER ── */
.confusion-banner{background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#fb923c;font-weight:700;line-height:1.5;}
.confusion-banner span{opacity:0.7;font-weight:500;}
/* ── WARMUP CARD ── */
.warmup-card{border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;}
.wu-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.wu-text{font-size:13px;font-weight:700;line-height:1.4;}
.wu-sub{font-size:11px;opacity:0.8;margin-top:3px;}
/* ── EXERCISE CARDS ── */
.ex-card{border-radius:14px;border:1.5px solid rgba(255,255,255,0.1);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.03);}
.ex-card:active{transform:scale(0.99);}
.ex-card.checked{background:#0a2a1a!important;border-color:rgba(52,211,153,0.45)!important;}
.ex-card.checked .ex-name{text-decoration:line-through;color:#34d399;}
.ex-card.checked .ex-num{background:#065f46!important;border-color:transparent!important;color:#fff!important;}
.ex-row{display:flex;gap:10px;align-items:flex-start;padding:13px 14px;}
.ex-num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:900;margin-top:1px;flex-shrink:0;background:rgba(255,255,255,0.1);color:#94a3b8;border:1px solid rgba(255,255,255,0.15);}
.ex-content{flex:1;min-width:0;}
.ex-name{font-weight:700;font-size:13px;color:#e2e8f0;line-height:1.4;margin-bottom:7px;}
.ex-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:4px;}
.ex-sets{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,0.08);color:#cbd5e1;border:1px solid rgba(255,255,255,0.12);}
.ex-note{font-size:11px;margin-top:5px;font-style:italic;opacity:0.75;line-height:1.4;color:#94a3b8;}
/* ── SUPERSET CARDS ── */
.ss-card{border-radius:14px;border:1.5px solid rgba(168,85,247,0.3);margin-bottom:12px;overflow:hidden;background:rgba(168,85,247,0.04);}
.ss-header{background:rgba(168,85,247,0.12);padding:7px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(168,85,247,0.15);}
.ss-label{font-size:10px;font-weight:900;letter-spacing:0.18em;color:#c084fc;text-transform:uppercase;}
.ss-ex{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;cursor:pointer;}
.ss-ex:not(:last-of-type){border-bottom:1px solid rgba(168,85,247,0.1);}
.ss-ex.checked .ss-name{text-decoration:line-through;color:#34d399;}
.ss-ex.checked .ss-num{background:#065f46!important;border-color:transparent!important;color:#fff!important;}
.ss-num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;width:28px;height:28px;background:rgba(168,85,247,0.18);color:#c084fc;border-radius:50%;font-size:12px;font-weight:900;border:1px solid rgba(168,85,247,0.28);margin-top:1px;flex-shrink:0;}
.ss-content{flex:1;min-width:0;}
.ss-name{font-weight:700;font-size:13px;color:#e2e8f0;line-height:1.4;margin-bottom:6px;}
.ss-divider{display:flex;align-items:center;justify-content:center;padding:4px 0;background:rgba(168,85,247,0.06);}
.ss-x{font-size:11px;font-weight:900;color:#a855f7;letter-spacing:0.12em;}
/* ── UGEE / BLOCKS CARDS ── */
.block-card{border-radius:14px;margin-bottom:14px;overflow:hidden;border:1.5px solid rgba(251,146,60,0.3);background:rgba(251,146,60,0.04);}
.block-header{background:rgba(251,146,60,0.12);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(251,146,60,0.15);}
.block-title{font-size:13px;font-weight:900;color:#fb923c;}
.block-rounds{font-size:11px;font-weight:800;color:#fb923c;background:rgba(251,146,60,0.15);padding:3px 10px;border-radius:20px;border:1px solid rgba(251,146,60,0.3);}
.block-note{font-size:11px;color:#94a3b8;padding:8px 16px;border-bottom:1px solid rgba(251,146,60,0.1);font-style:italic;}
.block-warmup{font-size:11px;font-weight:700;color:#fb923c;padding:6px 16px;border-bottom:1px solid rgba(251,146,60,0.1);background:rgba(251,146,60,0.06);}
.block-warmup-label{font-size:9px;font-weight:900;letter-spacing:0.15em;color:#fb923c;opacity:0.6;margin-right:6px;}
.block-ex{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);}
.block-ex:last-of-type{border-bottom:none;}
.block-ex.checked .block-ex-name{text-decoration:line-through;color:#34d399;}
.block-ex-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(251,146,60,0.5);flex-shrink:0;transition:all 0.15s;}
.block-ex.checked .block-ex-dot{background:#34d399;border-color:#34d399;}
.block-ex-name{font-size:13px;font-weight:600;color:#e2e8f0;}
.block-rounds-btns{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 14px;}
.round-btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(251,146,60,0.35);background:rgba(251,146,60,0.08);color:#fb923c;font-size:11px;font-weight:800;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;}
.round-btn.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);color:#34d399;}
.round-btn:active{transform:scale(0.97);}
/* ── TYPE BADGES ── */
.type-badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:5px;letter-spacing:0.05em;text-transform:uppercase;}
.tb-pyramid{background:rgba(249,115,22,0.15);color:#fb923c;border:1px solid rgba(249,115,22,0.25);}
.tb-lowrep{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.tb-tempo{background:rgba(6,182,212,0.15);color:#22d3ee;border:1px solid rgba(6,182,212,0.25);}
.tb-highrep12{background:rgba(234,179,8,0.15);color:#fbbf24;border:1px solid rgba(234,179,8,0.25);}
.tb-highrep20{background:rgba(217,119,6,0.2);color:#fb923c;border:1px solid rgba(217,119,6,0.3);}
.tb-drop{background:rgba(244,63,94,0.15);color:#fb7185;border:1px solid rgba(244,63,94,0.25);}
.tb-amrap{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.35);}
.tb-minrest{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.25);}
.tb-optional{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.25);}
.tb-finisher{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.tb-superset{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.25);}
.tb-dumbbell{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.25);}
.tb-cable{background:rgba(34,211,238,0.12);color:#22d3ee;border:1px solid rgba(34,211,238,0.25);}
/* ── REST TIMER ── */
.rest-timer{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:4px 10px;border-radius:8px;transition:all 0.15s;margin-top:5px;}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.rest-timer-icon{font-size:13px;}
.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}
.rest-timer.overtime .rest-timer-label{color:#f87171;}
/* ── FLOATING TIMER ── */
.timer-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(10,10,16,0.97);backdrop-filter:blur(16px);border-radius:20px;padding:14px 24px;display:none;flex-direction:column;align-items:center;gap:4px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.7);z-index:100;min-width:200px;}
.timer-float.visible{display:flex;}
.timer-float-label{font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#475569;}
.timer-float-time{font-size:42px;font-weight:900;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:#fbbf24;}
.timer-float-time.done{color:#34d399;}
.timer-float-time.overtime{color:#f87171;}
.timer-float-ex{font-size:11px;color:#64748b;text-align:center;max-width:180px;line-height:1.4;}
.timer-float-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-float-progress{height:100%;background:#fbbf24;border-radius:2px;transition:width 0.5s linear;width:100%;}
.timer-float-progress.done{background:#34d399;}
.timer-float-progress.overtime{background:#f87171;}
.timer-float-actions{display:flex;gap:8px;margin-top:6px;}
.timer-float-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.06em;}
.timer-float-skip{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3);}
.timer-float-reset{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
.timer-presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.timer-preset{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;}
.timer-preset:active{background:rgba(212,175,55,0.2);color:#fbbf24;border-color:rgba(212,175,55,0.4);}
/* ── NOTES ── */
.ex-notes-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:6px;cursor:pointer;font-size:10px;font-weight:800;color:#475569;letter-spacing:0.06em;text-transform:uppercase;user-select:none;}
.ex-notes-wrap{display:none;margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08);}
.ex-notes-wrap.open{display:block;}
.ex-notes-input{width:100%;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:12px;font-weight:600;font-family:inherit;resize:none;line-height:1.5;}
.ex-notes-input::placeholder{color:#334155;}
.ex-notes-label{font-size:9px;font-weight:800;letter-spacing:0.15em;color:#475569;text-transform:uppercase;margin-bottom:4px;}
/* ── SUMMARY ── */
.sum-section{max-width:680px;margin:28px auto 0;padding:0 16px 32px;}
.sum-card{border-radius:14px;padding:16px;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.sum-tot{border-radius:8px;padding:10px;text-align:center;}
.sum-tv{font-size:15px;font-weight:900;}
.sum-tl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;opacity:0.7;}

/* ── PICKER ── */
.picker-header{padding:60px 20px 24px;background:linear-gradient(135deg,#1a0040,#0d0618);text-align:center;border-bottom:1px solid rgba(192,132,252,0.15);}
.picker-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:6px;}
.picker-sub{font-size:12px;color:#475569;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;}
.picker-content{max-width:680px;margin:0 auto;padding:20px 16px 48px;}
.picker-split{margin-bottom:24px;}
.picker-split-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
.picker-split-name{font-size:15px;font-weight:900;}
.picker-split-label{font-size:10px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;opacity:0.6;}
.picker-workout{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.picker-workout:active{transform:scale(0.98);}
.picker-icon{font-size:18px;flex-shrink:0;}
.picker-name{flex:1;font-size:13px;font-weight:700;color:#e2e8f0;}
.picker-arrow{font-size:16px;font-weight:900;}
/* ── NOT FOUND ── */
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#475569;text-align:center;gap:12px;}
.not-found h2{font-size:20px;font-weight:900;color:#64748b;}
</style>
</head>

<script>
// ── TIMER ENGINE ──────────────────────────────────────────────────
const TMR={
  interval:null,startTime:null,duration:0,activeEl:null,
  parseSeconds(str){if(!str||str==='—')return 0;str=str.toLowerCase().trim();const mn=str.match(/(\d+)\s*min/),sc=str.match(/(\d+)\s*sec/);let s=0;if(mn)s+=parseInt(mn[1])*60;if(sc)s+=parseInt(sc[1]);if(!s){const p=str.match(/^(\d+)/);if(p)s=parseInt(p[1]);}return s;},
  formatTime(secs){const neg=secs<0,abs=Math.abs(secs),m=Math.floor(abs/60),s=abs%60;return(neg?'+':'')+(m>0?m+':'+String(s).padStart(2,'0'):String(s)+'s');},
  buzz(){if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,0.3,0.6].forEach((t,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=i===2?880:660;o.type='sine';g.gain.setValueAtTime(0.4,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.25);});}catch(e){}},
  start(el,dur,name){
    this.stop();this.duration=dur;this.startTime=Date.now();this.activeEl=el;
    el.className='rest-timer running';el.querySelector('.rest-timer-label').textContent=this.formatTime(dur);
    const fl=document.getElementById('timerFloat'),ft=document.getElementById('timerFloatTime'),fp=document.getElementById('timerFloatProgress'),fe=document.getElementById('timerFloatEx'),fla=document.getElementById('timerFloatLabel');
    fl.classList.add('visible');fe.textContent=name;fla.textContent='REST';ft.className='timer-float-time';fp.className='timer-float-progress';fp.style.width='100%';
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      if(el)el.querySelector('.rest-timer-label').textContent=this.formatTime(rem);
      ft.textContent=this.formatTime(rem);
      if(rem>0){fp.style.width=((rem/this.duration)*100)+'%';ft.className='timer-float-time';fp.className='timer-float-progress';if(el)el.className='rest-timer running';}
      else if(rem===0){this.buzz();ft.className='timer-float-time done';fp.className='timer-float-progress done';fp.style.width='100%';fla.textContent='DONE!';if(el)el.className='rest-timer done';}
      else{ft.textContent='+'+this.formatTime(-rem);ft.className='timer-float-time overtime';fp.className='timer-float-progress overtime';fla.textContent='OVERTIME';if(el)el.className='rest-timer overtime';}
    },500);
  },
  stop(){if(this.interval)clearInterval(this.interval);this.interval=null;if(this.activeEl){this.activeEl.querySelector('.rest-timer-label').textContent=this.activeEl.dataset.label;this.activeEl.className='rest-timer idle';this.activeEl=null;}const fl=document.getElementById('timerFloat');if(fl)fl.classList.remove('visible');},
  toggle(el,dur,name){if(this.activeEl===el&&this.interval)this.stop();else this.start(el,dur,name);},
  setTime(secs,label){if(this.interval){clearInterval(this.interval);this.interval=null;}this.duration=secs;this.startTime=Date.now();const ft=document.getElementById('timerFloat');if(ft){const tl=ft.querySelector('.timer-float-label'),tt=ft.querySelector('.timer-float-time'),tp=ft.querySelector('.timer-float-progress');if(tl)tl.textContent=label||(secs+'s');if(tt){tt.textContent=secs+'s';tt.className='timer-float-time';}if(tp){tp.style.width='100%';tp.className='timer-float-progress';}ft.classList.add('visible');}this.activeEl=null;this.interval=setInterval(()=>{const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);const ft2=document.getElementById('timerFloat');if(!ft2)return;const tt2=ft2.querySelector('.timer-float-time'),tp2=ft2.querySelector('.timer-float-progress'),tl2=ft2.querySelector('.timer-float-label');if(rem>0){if(tt2){tt2.textContent=rem+'s';tt2.className='timer-float-time';}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+'%';tp2.className='timer-float-progress';}}else if(rem===0){if(tt2){tt2.textContent='DONE!';tt2.className='timer-float-time done';}if(tp2){tp2.style.width='100%';tp2.className='timer-float-progress done';}if(tl2)tl2.textContent='DONE ✓';try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}else{if(tt2){tt2.textContent='+'+Math.abs(rem)+'s';tt2.className='timer-float-time overtime';}if(tp2)tp2.className='timer-float-progress overtime';}},500);}
};

// Build floating timer DOM once
(function(){
  const div=document.createElement('div');div.id='timerFloat';div.className='timer-float';
  div.innerHTML=`<div id="timerFloatLabel" class="timer-float-label">REST</div><div id="timerFloatTime" class="timer-float-time">0s</div><div id="timerFloatEx" class="timer-float-ex"></div><div class="timer-float-bar"><div id="timerFloatProgress" class="timer-float-progress"></div></div><div class="timer-float-actions"><button class="timer-float-btn timer-float-skip" onclick="TMR.stop()">✓ Done</button><button class="timer-float-btn timer-float-reset" onclick="TMR.stop()">✕ Cancel</button></div><div class="timer-presets"></div>`;
  document.body.appendChild(div);
  ['45s','60s','90s','2min'].forEach(l=>{const s=l==='2min'?120:parseInt(l);const b=document.createElement('button');b.className='timer-preset';b.textContent=l;b.onclick=()=>TMR.setTime(s,l);div.querySelector('.timer-presets').appendChild(b);});
})();

function makeRestTimer(r,n){
  const s=TMR.parseSeconds(r);
  if(!s)return `<span class="ex-sets" style="opacity:0.5">⏱️ ${r}</span>`;
  const safe=n.replace(/'/g,"\\'").substring(0,30);
  return `<span class="rest-timer idle" data-rest="${r}" data-label="${r}" onclick="TMR.toggle(this,${s},'${safe}')" title="Tap to start rest timer"><span class="rest-timer-icon">⏱️</span><span class="rest-timer-label">${r}</span></span>`;
}

  'tb-pyramid':'📈 Pyramid','tb-lowrep':'🏋️ Low Rep','tb-tempo':'⏱️ Tempo',
  'tb-highrep12':'🔥 12–15 Reps','tb-highrep20':'🔥 20–30 Reps','tb-drop':'↘️ Drop Set',
  'tb-amrap':'💀 AMRAP','tb-minrest':'⚡ 20s Rest','tb-optional':'⭐ Optional',
  'tb-finisher':'🏁 Finisher','tb-superset':'⚡ Superset','tb-dumbbell':'🏋️ Dumbbell',
  'tb-cable':'🔗 Cable',
};
function badges(arr){
  return (arr||[]).map(b=>`<span class="type-badge ${b}">${BADGE_LABELS[b]||b}</span>`).join('');
}

// ── RENDER HELPERS ────────────────────────────────────────────────
function renderSingle(ex, wk){
  const id=`${wk}-s-${ex.num}`, ck=checkState[id]?'checked':'';
  const rest=ex.rest||'90 sec';
  return `<div class="ex-card ${ck}" data-id="${id}" data-type="single">
    <div class="ex-row"><div class="ex-num">${ex.num}</div>
    <div class="ex-content"><div class="ex-name">${ex.name}</div>
    <div class="ex-tags"><span class="ex-sets">${ex.sets}</span>${badges(ex.badges)}</div>
    ${makeRestTimer(rest,ex.name)}
    ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
    </div></div></div>`;
}

function renderSS(ex, wk){
  const ida=`${wk}-ss-${ex.num}a`, idb=`${wk}-ss-${ex.num}b`;
  const cka=checkState[ida]?'checked':'', ckb=checkState[idb]?'checked':'';
  return `<div class="ss-card">
    <div class="ss-header"><span class="ss-label">⚡ Superset #${ex.num}</span></div>
    <div class="ss-ex ${cka}" data-id="${ida}" data-type="ssex">
      <div class="ss-num">A</div><div class="ss-content">
      <div class="ss-name">${ex.a.name}</div>
      <div class="ex-tags"><span class="ex-sets">${ex.a.sets}</span>${badges(ex.a.badges)}</div>
      ${ex.a.note?`<div class="ex-note">${ex.a.note}</div>`:''}
      </div></div>
    <div class="ss-divider"><span class="ss-x">× SUPERSET ×</span></div>
    <div class="ss-ex ${ckb}" data-id="${idb}" data-type="ssex">
      <div class="ss-num">B</div><div class="ss-content">
      <div class="ss-name">${ex.b.name}</div>
      <div class="ex-tags"><span class="ex-sets">${ex.b.sets}</span>${badges(ex.b.badges)}</div>
      ${makeRestTimer('120 sec',ex.b.name)}
      ${ex.b.note?`<div class="ex-note">${ex.b.note}</div>`:''}
      </div></div></div>`;
}

function renderEx(ex, wk){
  return ex.type==='superset' ? renderSS(ex,wk) : renderSingle(ex,wk);
}

function renderBlocks(blocks, wid){
  return blocks.map((block, bi)=>{
    const rounds = block.rounds || 5;
    const exHtml = block.exercises.map((name, ei)=>{
      const id=`${wid}-b${bi}-e${ei}`, ck=checkState[id]?'checked':'';
      return `<div class="block-ex ${ck}" data-id="${id}" data-type="bex"><div class="block-ex-dot"></div><div class="block-ex-name">${name}</div></div>`;
    }).join('');
    const roundBtns = Array.from({length:rounds},(_,i)=>{
      const rid=`${wid}-b${bi}-r${i}`, ck=roundState[rid]?'done':'';
      return `<button class="round-btn ${ck}" data-rid="${rid}" onclick="toggleRound(this,'${rid}')">${ck?'✓ ':''} Round ${i+1}</button>`;
    }).join('');
    return `<div class="block-card">
      <div class="block-header"><span class="block-title">${block.title}</span><span class="block-rounds">${rounds} ROUNDS</span></div>
      ${block.note?`<div class="block-note">${block.note}</div>`:''}
      ${block.warmup?`<div class="block-warmup"><span class="block-warmup-label">WARMUP</span>${block.warmup}</div>`:''}
      ${exHtml}
      <div class="block-rounds-btns">${roundBtns}</div>
    </div>`;
  }).join('');
}

function toggleRound(btn, rid){
  roundState[rid] = !roundState[rid];
  btn.classList.toggle('done', roundState[rid]);
  btn.textContent = roundState[rid] ? `✓ ${btn.textContent.replace('✓ ','')}` : btn.textContent.replace('✓ ','');
  updateProgress();
}

// ── AUTO CONFUSION GENERATOR (for splits without manual maps) ─────
// Applies generic lift type rotation rules to any week 1/2 data
function autoConfusion(exercises, sourceWeek){
  return exercises.map(ex => {
    if(ex.type === 'superset'){
      // Break superset into individual cards with swapped types
      return [
        Object.assign({}, ex.a, {type:'single', num:ex.num+'a',
          sets: swapSets(ex.a.sets, ex.a.badges),
          badges: swapBadges(ex.a.badges),
          note: '🔀 was superset → ' + (ex.a.note||'').substring(0,40)
        }),
        Object.assign({}, ex.b, {type:'single', num:ex.num+'b',
          sets: swapSets(ex.b.sets, ex.b.badges),
          badges: swapBadges(ex.b.badges),
          note: '🔀 was superset → ' + (ex.b.note||'').substring(0,40)
        }),
      ];
    }
    return Object.assign({}, ex, {
      sets: swapSets(ex.sets, ex.badges),
      badges: swapBadges(ex.badges),
      note: '🔀 ' + (ex.note||'').substring(0,50),
    });
  }).flat();
}

function swapSets(sets, badges){
  if(!badges) return sets;
  if(badges.includes('tb-lowrep'))    return '4×8';       // low rep → tempo
  if(badges.includes('tb-pyramid'))   return '4×20';      // pyramid → high rep
  if(badges.includes('tb-drop'))      return '4×20';      // drop → high rep
  if(badges.includes('tb-tempo'))     return 'AMRAP';     // tempo → AMRAP
  if(badges.includes('tb-highrep20')) return '4×6';       // high rep → low rep
  if(badges.includes('tb-highrep12')) return '4×6';       // high rep → low rep
  if(badges.includes('tb-amrap'))     return '12,10,8,8'; // AMRAP → pyramid
  return sets;
}
function swapBadges(badges){
  if(!badges) return [];
  if(badges.includes('tb-lowrep'))    return ['tb-tempo'];
  if(badges.includes('tb-pyramid'))   return ['tb-highrep20'];
  if(badges.includes('tb-drop'))      return ['tb-highrep20'];
  if(badges.includes('tb-tempo'))     return ['tb-amrap'];
  if(badges.includes('tb-highrep20')) return ['tb-lowrep'];
  if(badges.includes('tb-highrep12')) return ['tb-lowrep'];
  if(badges.includes('tb-amrap'))     return ['tb-pyramid'];
  return badges;
}

// ── GET EXERCISES FOR WEEK ─────────────────────────────────────────
function getWeekData(workout, week){
  const raw = workout.data;
  if(workout.type === 'blocks') return null; // blocks handled separately

  // Normalize data structure (some files wrap in {warmup, exercises})
  function getExercises(weekData){
    if(!weekData) return [];
    if(Array.isArray(weekData)) return weekData;
    if(weekData.exercises) return weekData.exercises;
    return [];
  }
  function hasWarmup(weekData){
    if(!weekData) return false;
    return weekData.warmup === true;
  }

  if(week <= 2){
    const wd = raw[week] || raw[1];
    return { exercises: getExercises(wd), warmup: hasWarmup(wd) };
  }

  // Weeks 3–4: check manual map first, then auto-generate
  const manualKey = workout.id;
  if(CONFUSION_SWAPS[manualKey] && CONFUSION_SWAPS[manualKey][week]){
    const backWeek = week === 3 ? 1 : 2;
    const bwd = raw[backWeek] || raw[1];
    return { exercises: CONFUSION_SWAPS[manualKey][week], warmup: hasWarmup(bwd) };
  }

  // Auto-generate from base week
  const baseWeek = week === 3 ? 1 : 2;
  const bwd = raw[baseWeek] || raw[1];
  const baseExercises = getExercises(bwd);
  return { exercises: autoConfusion(baseExercises, baseWeek), warmup: hasWarmup(bwd) };
}

// ── APPLY THEME ───────────────────────────────────────────────────
function applyTheme(workout){
  const c = workout.color || '#c084fc';
  const bg = workout.bg || '#1a0040';
  document.querySelector('.header').style.background = `linear-gradient(135deg,${bg},#0d0618)`;
  document.querySelector('.header').style.borderBottomColor = c+'33';
  document.querySelector('.eyebrow').style.color = c;
  document.querySelector('.week-badge').style.color = c;
  document.querySelector('.week-badge').style.background = c+'22';
  document.querySelector('.week-badge').style.borderColor = c+'55';
  document.querySelector('.week-tabs').style.borderBottomColor = c+'1a';
  document.querySelectorAll('.wtab.active').forEach(t=>{t.style.color=c;t.style.borderBottomColor=c;});
  document.querySelectorAll('.ex-num').forEach(n=>{n.style.background=c+'2e';n.style.color=c;n.style.borderColor=c+'44';});
  document.querySelectorAll('.ex-sets').forEach(s=>{s.style.background=c+'1a';s.style.borderColor=c+'33';});
  document.querySelectorAll('.ex-note').forEach(n=>{n.style.color=c+'cc';});
  document.querySelector('.tap-hint').style.color = c;
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function render(){
  const workout = PMC_SPLITS[currentWorkoutId];
  if(!workout){ renderNotFound(); return; }

  const tabs = [1,2,3,4].map(w=>
    `<button class="wtab${activeWeek===w?' active':''}" data-w="${w}" style="${activeWeek===w?`color:${workout.color};border-bottom-color:${workout.color}`:''}">WEEK ${w}</button>`
  ).join('');

  let contentHtml = '';

  if(workout.type === 'blocks'){
    // UGEE SETS / Core / Abs — block format, no week tabs
    const wid = `${currentWorkoutId}-${activeWeek}`;
    contentHtml = renderBlocks(workout.data, wid);
    document.getElementById('app').innerHTML = `
      <div class="header">
        <a href="${workout.backUrl}" class="back-link">← ${workout.split}</a>
        <div class="header-inner">
          <div class="eyebrow">${workout.icon} PMC · ${workout.split}</div>
          <div class="title">${workout.title}</div>
          <span class="week-badge">complete 5–10 rounds per lift</span>
        </div>
      </div>
      <div class="content">
        <div class="tap-hint">Tap exercises to check off · tap round buttons when complete</div>
        ${contentHtml}
      </div>`;
  } else {
    const weekData = getWeekData(workout, activeWeek);
    const exercises = weekData ? weekData.exercises : [];
    const showWarmup = weekData ? weekData.warmup : false;

    const warmupHtml = showWarmup ? `
      <div class="warmup-card" style="background:${workout.color}14;border:1px solid ${workout.color}4d;">
        <div class="wu-icon">🔥</div>
        <div><div class="wu-text" style="color:${workout.color}">WARMUP: Pull-Ups (AMRAP)</div>
        <div class="wu-sub" style="color:${workout.color}cc">max reps · full hang · no kipping</div></div>
      </div>` : '';

    contentHtml = warmupHtml + confusionBanner(activeWeek) + exercises.map(e=>renderEx(e,activeWeek)).join('');

    document.getElementById('app').innerHTML = `
      <div class="header">
        <a href="${workout.backUrl}" class="back-link">← ${workout.split}</a>
        <div class="header-inner">
          <div class="eyebrow">${workout.icon} PMC · ${workout.split}</div>
          <div class="title">${workout.title}</div>
          <span class="week-badge">Week ${activeWeek}</span>
        </div>
      </div>
      <div class="week-tabs" style="border-bottom:1px solid ${workout.color}1a;">
        <div class="wtabs">${tabs}</div>
      </div>
      <div class="content">
        <div class="tap-hint">Tap any exercise to check off</div>
        ${contentHtml}
      </div>`;
  }

  attachEvents();
  applyTheme(workout);
  setTimeout(initNotes, 200);
  updateProgress();
}

function renderNotFound(){
  // Show a full split/workout picker
  const splitOrder = ['split1','split2','split3','split4','split5','split6','split7'];
  const splitCards = splitOrder.map(sid => {
    const meta = PMC_SPLIT_META[sid];
    if(!meta) return '';
    const workoutLinks = meta.workouts.map(wid => {
      const w = PMC_SPLITS[wid];
      if(!w) return '';
      return `<div class="picker-workout" onclick="selectWorkout('${wid}')" style="border-color:${meta.color}33;background:${meta.color}08;">
        <span class="picker-icon">${w.icon}</span>
        <span class="picker-name">${w.title}</span>
        <span class="picker-arrow" style="color:${meta.color}">→</span>
      </div>`;
    }).join('');
    return `<div class="picker-split">
      <div class="picker-split-header" style="color:${meta.color}">
        <span class="picker-split-name">${meta.name}</span>
        <span class="picker-split-label">PMC · ${sid.replace('split','Split ')}</span>
      </div>
      ${workoutLinks}
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="picker-header">
      <div class="picker-title">⚡ Project Muscle Confusion</div>
      <div class="picker-sub">Select a split and workout</div>
    </div>
    <div class="picker-content">${splitCards}</div>`;
}

function selectWorkout(wid){
  currentWorkoutId = wid;
  activeWeek = 1;
  history.pushState(null,'',`#${wid}`);
  render();
}

// ── EVENTS ────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('[data-type="single"]').forEach(c=>{
    c.addEventListener('click',()=>{const id=c.dataset.id;checkState[id]=!checkState[id];c.classList.toggle('checked');updateProgress();});
  });
  document.querySelectorAll('[data-type="ssex"]').forEach(c=>{
    c.addEventListener('click',e=>{e.stopPropagation();const id=c.dataset.id;checkState[id]=!checkState[id];c.classList.toggle('checked');updateProgress();});
  });
  document.querySelectorAll('[data-type="bex"]').forEach(c=>{
    c.addEventListener('click',()=>{const id=c.dataset.id;checkState[id]=!checkState[id];c.classList.toggle('checked');updateProgress();});
  });
  document.querySelectorAll('.wtab').forEach(b=>{
    b.addEventListener('click',()=>{activeWeek=parseInt(b.dataset.w);render();});
  });
}

// ── PROGRESS BAR ──────────────────────────────────────────────────
function updateProgress(){
  const all=document.querySelectorAll('.ex-card,.ss-ex,.block-ex');
  const done=document.querySelectorAll('.ex-card.checked,.ss-ex.checked,.block-ex.checked');
  const pct=all.length?Math.round((done.length/all.length)*100):0;
  const fill=document.getElementById('progFill');
  if(fill)fill.style.width=pct+'%';
}

// ── NOTES ─────────────────────────────────────────────────────────
function initNotes(){
  const NOTES_KEY='pmc_notes_'+currentWorkoutId;
  let notes={};try{notes=JSON.parse(localStorage.getItem(NOTES_KEY)||'{}');}catch(e){}
  document.querySelectorAll('.ex-card[data-id]').forEach(card=>{
    const id=card.dataset.id;if(!id||card.querySelector('.ex-notes-wrap'))return;
    const existing=notes[id]||'';
    const toggle=document.createElement('div');toggle.className='ex-notes-toggle';
    toggle.innerHTML=existing?`✏️ ${existing.substring(0,20)}${existing.length>20?'…':''}`:'✚ Add weight/notes';
    const wrap=document.createElement('div');wrap.className=`ex-notes-wrap${existing?' open':''}`;
    wrap.innerHTML=`<div class="ex-notes-label">Weight / Notes</div><textarea class="ex-notes-input" rows="1" placeholder="e.g. 135 lbs · felt strong">${existing}</textarea>`;
    toggle.addEventListener('click',e=>{e.stopPropagation();wrap.classList.toggle('open');});
    const ta=wrap.querySelector('textarea');
    ta.addEventListener('input',function(){
      notes[id]=this.value.trim();
      if(!notes[id])delete notes[id];
      localStorage.setItem(NOTES_KEY,JSON.stringify(notes));
      toggle.innerHTML=this.value.trim()?`✏️ ${this.value.trim().substring(0,20)}${this.value.trim().length>20?'…':''}`:'✚ Add weight/notes';
    });
    const content=card.querySelector('.ex-content');
    if(content){content.appendChild(toggle);content.appendChild(wrap);}
  });
}

// ── ROUTING ───────────────────────────────────────────────────────
function route(){
  const hash = location.hash.replace('#','');
  const parts = hash.split('-w');
  const workoutId = parts[0];
  const weekParam = parts[1] ? parseInt(parts[1]) : 1;

  if(workoutId && PMC_SPLITS[workoutId]){
    currentWorkoutId = workoutId;
    activeWeek = weekParam;
    document.title = `PMC — ${PMC_SPLITS[workoutId].title}`;
  } else {
    currentWorkoutId = null;
    document.title = 'PMC — Project Muscle Confusion';
  }
  render();
}

window.addEventListener('hashchange', route);

// Also support ?id= param for backward compat
const urlParams = new URLSearchParams(location.search);
const idParam = urlParams.get('id');
if(idParam && !location.hash){
  history.replaceState(null,'',`#${idParam}`);
}

route();
</script>
