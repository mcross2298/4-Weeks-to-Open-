<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Push — Chest / Shoulders / Triceps · Split #4 TUT</title>
<style>
:root{--accent:#f472b6;--accent-rgb:244,114,182;}
.header{background:linear-gradient(90deg,#12050d,#050d1a);}
.schedule{display:inline-block;background:rgba(var(--accent-rgb),0.15);border:1px solid rgba(var(--accent-rgb),0.4);border-radius:6px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:700;}
.tabs-bar{background:var(--body-bg);border-bottom:1px solid rgba(var(--accent-rgb),0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;border:none;cursor:pointer;font-weight:800;font-size:12px;background:transparent;color:#334155;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.04em;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.workout-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.01em;}
.workout-note{font-size:12px;color:#94a3b8;margin-bottom:16px;line-height:1.5;background:rgba(var(--accent-rgb),0.06);border-left:3px solid rgba(var(--accent-rgb),0.4);padding:10px 14px;border-radius:0 6px 6px 0;}
.section-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:900;letter-spacing:0.2em;padding:5px 14px;border-radius:6px;margin:18px 0 12px;text-transform:uppercase;color:#fff;}
.ex-sets-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ex-tempo{display:inline-block;background:rgba(255,255,255,0.05);color:#64748b;font-size:11px;font-weight:800;padding:3px 7px;border-radius:5px;font-family:monospace;border:1px solid rgba(255,255,255,0.08);}
.rest-pill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);color:#64748b;transition:all 0.15s;vertical-align:middle;}
.rest-pill:active{transform:scale(0.95);}
.rest-pill.running{background:rgba(var(--accent-rgb),0.15);border-color:rgba(var(--accent-rgb),0.35);color:var(--accent);animation:rp 1s ease-in-out infinite;}
.rest-pill.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.35);color:#34d399;}
.rest-pill.over{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.35);color:#f87171;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.65;}}
</style>

<script src="mc-timer.js"></script>
<script>// ── TIMER ENGINE ──
buildTimerFloat();

function makeRestTimer(r, n) {
  var s = TMR.parseSeconds(r);
  if (!s) return '<span style="opacity:0.5">' + r + '</span>';
  var nm = (n||'').substring(0,25).replace(/['"/\\]/g,'');
  return '<span class="rest-timer idle" data-rest="' + r + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + s + ',&quot;' + nm + '&quot;)" ' +
    'title="Tap to start">' +
    '<span class="rest-timer-label">' + r + '</span></span>';
}


const WORKOUTS = [
  {
    id:"w1", label:"W1",
    title:"Push — Tempo Strength",
    note:"4:0:1:0 is the baseline tempo. Slow the eccentric, be explosive on the concentric. Every rep controlled.",
    chest:[
      {name:"Flat Barbell Bench Press", sets:"12, 10, 8, 6", tempo:"4:0:1:0", note:"Touch chest at bottom — no bounce, drive up explosively"},
      {name:"Incline DB Press", sets:"4×10", tempo:"4:0:1:2", note:"2-second squeeze at top — full contraction before lowering"},
      {name:"Cable Fly (chest height)", sets:"3×15", tempo:"4:0:1:2", note:"Constant tension — don't open arms past a slight bend"},
      {name:"Decline Push-Up", sets:"3 sets to failure", note:"Elevate feet — targets upper chest and builds control"},
    ],
    shoulders:[
      {name:"Seated DB Military Press", sets:"12, 10, 8, 6", tempo:"4:0:1:0"},
      {name:"Seated DB Side Lateral Raise", sets:"4×12", tempo:"4:0:1:2", note:"Slight forward lean — raise to shoulder height, squeeze at top"},
      {name:"Cable Front Raise", sets:"3×15", tempo:"3:0:1:2"},
    ],
    triceps:[
      {name:"Skull Crushers (EZ bar)", sets:"12, 10, 8, 6", tempo:"4:0:1:0"},
      {name:"Tricep Pushdown (rope)", sets:"4×12", tempo:"4:0:1:2", note:"Full extension at bottom — squeeze hard, slow return"},
      {name:"Overhead Tricep Extension (cable)", sets:"3×15", tempo:"4:0:1:2"},
    ]
  },
  {
    id:"w2", label:"W2",
    title:"Push — Cable Focus",
    note:"Cables maintain constant tension through the entire range of motion. Perfect for TUT work.",
    chest:[
      {name:"Low Cable Fly (cross-body)", sets:"4×12", tempo:"4:0:1:2", note:"Pull from low to high — targets upper chest"},
      {name:"High Cable Fly (cross-body)", sets:"4×12", tempo:"4:0:1:2", note:"Pull from high to low — targets lower/inner chest"},
      {name:"Cable Chest Press (standing)", sets:"4×10", tempo:"4:0:1:2"},
      {name:"Incline DB Press", sets:"3×10", tempo:"4:0:1:2"},
    ],
    shoulders:[
      {name:"Cable Shoulder Press (single arm)", sets:"4×10 per side", tempo:"4:0:1:0"},
      {name:"Cable Side Lateral Raise", sets:"4×15", tempo:"4:0:1:2", note:"Slow, controlled — full range with squeeze at top"},
      {name:"Cable Rear Delt Fly (face pull variation)", sets:"3×15", tempo:"1:2:1:2"},
    ],
    triceps:[
      {name:"Tricep Pushdown (V-bar)", sets:"4×12", tempo:"4:0:1:2"},
      {name:"Overhead Tricep Extension (cable rope)", sets:"4×12", tempo:"4:0:1:2"},
      {name:"Single Arm Tricep Pushdown (D-handle)", sets:"3×15 per arm", tempo:"4:0:1:2", note:"Full lockout each rep — control the return"},
    ]
  },
  {
    id:"w3", label:"W3",
    title:"Push — Drop Set Circuit",
    note:"Drop sets on every compound movement. Strip weight immediately — no rest between drops.",
    chest:[
      {name:"Flat DB Press", sets:"12, 10, 8 drop 12", tempo:"4:0:1:0", note:"Drop set final set — drop 20–25%, no rest, pump out 12"},
      {name:"Incline Cable Fly", sets:"3×12 drop 15", tempo:"4:0:1:2"},
      {name:"Decline Push-Up", sets:"3 sets to failure drop regular push-up failure", note:"Technical failure on decline then drop to flat immediately"},
    ],
    shoulders:[
      {name:"DB Military Press", sets:"12, 10, 8 drop 12", tempo:"4:0:1:0"},
      {name:"Side Lateral Raise", sets:"15, 12, 10 drop 15", tempo:"3:0:1:2", note:"Drop set — lighter weight, constant squeeze"},
      {name:"Front Raise (alternating DB)", sets:"3×12 per arm drop 15", tempo:"2:0:1:0"},
    ],
    triceps:[
      {name:"Skull Crushers", sets:"12, 10, 8 drop 12", tempo:"4:0:1:0"},
      {name:"Tricep Pushdown (rope)", sets:"15, 12, 10 drop 15", tempo:"3:0:1:2"},
      {name:"Overhead DB Extension (two hands)", sets:"3×10 drop 15", tempo:"4:0:1:0"},
    ]
  },
  {
    id:"w4", label:"W4",
    title:"Push — Superset Pump",
    note:"No rest between paired exercises. Rest 90–120 sec between superset pairs. Constant pump.",
    chest:[
      {name:"Flat Barbell Bench / Cable Fly (superset)", sets:"4×10 / 15", tempo:"4:0:1:0 / 4:0:1:2", note:"Bench to cables — no rest between"},
      {name:"Incline DB Press / Low Cable Fly (superset)", sets:"4×10 / 12", tempo:"4:0:1:2 / 4:0:1:2"},
      {name:"Push-Up / Cable Chest Press (superset)", sets:"3×failure / 15", note:"Failure on push-ups, immediately into cable press"},
    ],
    shoulders:[
      {name:"DB Military Press / Side Lateral (superset)", sets:"4×10 / 15", tempo:"4:0:1:0 / 3:0:1:2"},
      {name:"Cable Front Raise / Rear Delt Fly (superset)", sets:"3×12 / 15", tempo:"3:0:1:2 / 1:2:1:2"},
    ],
    triceps:[
      {name:"Skull Crusher / Tricep Pushdown (superset)", sets:"4×10 / 15", tempo:"4:0:1:0 / 3:0:1:2"},

    ]
  },

    id:"w5", label:"W5",

    note:"Compound loading takes center stage. Isolations are finishers only — earn them.",
    chest:[
      {name:"Flat Barbell Bench Press", sets:"5×5", tempo:"4:0:1:0", note:"Working weight — each set hard but technically clean"},
      {name:"Incline DB Press", sets:"4×8", tempo:"4:0:1:2"},
      {name:"Weighted Dip", sets:"4×6", note:"Add weight via belt — full range, chest forward"},
      {name:"Cable Fly", sets:"3×15", tempo:"3:0:1:2", note:"Finisher only — constant tension, squeeze every rep"},
    ],
    shoulders:[
      {name:"Barbell Military Press (standing)", sets:"5×5", tempo:"4:0:1:0"},
      {name:"Seated DB Press", sets:"4×8", tempo:"4:0:1:0"},
      {name:"Side Lateral Raise", sets:"3×15", tempo:"3:0:1:2", note:"Finisher — lighter weight, full squeeze"},
    ],
    triceps:[
      {name:"Close Grip Bench Press", sets:"5×5", tempo:"4:0:1:0", note:"Hands shoulder width — elbows tucked, lower to chest"},
      {name:"Skull Crushers", sets:"4×8", tempo:"4:0:1:0"},
      {name:"Tricep Pushdown (rope)", sets:"3×20", tempo:"2:0:1:2", note:"High rep burnout finisher"},
    ]
  },
  {
    id:"w6", label:"W6",
    title:"Push — High Rep Pump Finisher",
    note:"Moderate weight, maximum volume. No locking out — constant tension, constant pump.",
    chest:[
      {name:"Flat DB Press", sets:"4×20", tempo:"2:0:1:0"},
      {name:"Incline DB Press", sets:"4×20", tempo:"2:0:1:0"},
      {name:"Cable Fly (chest height)", sets:"4×20", tempo:"2:0:1:2", note:"Constant tension — slight bend in elbows throughout"},
      {name:"Push-Up", sets:"3 sets to failure", note:"High rep — no rest between sets"},
    ],
    shoulders:[
      {name:"Seated DB Side Lateral Raise", sets:"4×20", tempo:"2:0:1:2"},
      {name:"DB Front Raise (alternating)", sets:"3×15 per arm", tempo:"2:0:1:0"},
      {name:"Cable Rear Delt Fly", sets:"3×20", tempo:"1:0:1:2"},
    ],
    triceps:[
      {name:"Tricep Pushdown (rope)", sets:"4×20", tempo:"2:0:1:2"},
      {name:"Overhead Tricep Extension (cable)", sets:"4×20", tempo:"2:0:1:2"},
      {name:"Diamond Push-Up", sets:"3 sets to failure", note:"Hands close together — feel the tricep fully contract at top"},
    ]
  },
];

let activeIdx = 0;
const checkState = {};

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function aReps(setsStr){
  var legs=String(setsStr==null?'—':setsStr).split('/').map(s=>s.trim());
  return legs.map((part,pi)=>{
    var reps=part.split(',').map(r=>r.trim());
    var chips;
    if(reps.length>1&&reps.every(r=>r===reps[0])){
      var rep=reps[0],sp=/amrap/i.test(rep)||/drop/i.test(rep)||rep.indexOf('×')>=0;
      chips=`<span class="${sp?'a-rep special':'a-rep live'}">${reps.length}× ${rep}</span>`;
    }else{
      chips=reps.map((rep,ri)=>{var sp=/amrap/i.test(rep)||/drop/i.test(rep);var cls=sp?'a-rep special':(ri===0?'a-rep live':'a-rep');var sep=ri<reps.length-1?'<span class="a-sep">·</span>':'';return `<span class="${cls}">${rep}</span>${sep}`;}).join('');
    }
    var lt=legs.length>1?`<span class="a-legtag">${pi===0?'A':'B'}</span>`:'';
    return `<div class="a-leg">${lt}${chips}</div>`;
  }).join('');
}
function renderEx(ex, prefix, idx) {
  const id = `${activeIdx}-${prefix}-${idx}`;
  const checked = checkState[id] ? "checked" : "";
  const rest = ex.rest || "60 sec";
  const badgeHtml = ex.tempo ? `<div class="a-badges"><span class="ex-tempo">${esc(ex.tempo)}</span></div>` : "";
  const noteHtml = ex.note ? `<div class="a-notes">📝 ${esc(ex.note)}</div>` : "";
  return `<div class="ex-card a-card ${checked}" data-id="${id}" data-type="single">
    <div class="ex-body">
      <div class="a-top"><div class="a-idx">${idx+1}</div><div class="a-head"><div class="ex-name a-name">${esc(ex.name)}</div>${badgeHtml}</div></div>
      <div class="a-reps">${aReps(ex.sets)}</div>
      <div class="a-strip"><div class="a-cell"><span class="k">Sets</span><span class="v"><span data-field="sets">${esc(ex.sets)}</span></span></div><div class="a-cell"><span class="k">Rest</span><span class="v">${esc(rest)}</span></div></div>
      <div class="a-timerbar">${makeRestTimer(rest, ex.name)}</div>
      ${noteHtml}
    </div>
  </div>`;
}

function render() {
  const w = WORKOUTS[activeIdx];
  const tabsHtml = WORKOUTS.map((wo,i) =>
    `<button class="tab ${i===activeIdx?'active':''}" data-i="${i}">${esc(wo.label)}</button>`
  ).join("");
  const noteHtml = w.note ? `<div class="workout-note">${esc(w.note)}</div>` : "";
  const chestHtml = w.chest.map((e,i) => renderEx(e,"c",i)).join("");
  const shouldersHtml = w.shoulders.map((e,i) => renderEx(e,"s",i)).join("");
  const tricepsHtml = w.triceps.map((e,i) => renderEx(e,"t",i)).join("");

  document.getElementById("app").innerHTML = `
    <div class="header">
      <a href="cat-pump.html" class="back-link">← Back</a>
      <div class="header-inner">
        <div class="eyebrow">⏱️ Split #4 · Time Under Tension</div>
        <div class="title">Push — Chest /<br>Shoulders / Triceps</div>
        <div><span class="schedule">6 Workout Variations</span></div>
      </div>
    </div>
    <div class="tabs-bar"><div class="tabs">${tabsHtml}</div></div>
    <div class="content">
      <div class="workout-title">${esc(w.title)}</div>
      ${noteHtml}
      <div class="tap-hint">Tap any exercise to check off</div>
      <div class="section-label" style="background:rgba(244,114,182,0.15);color:#f472b6;">🫁 CHEST</div>
      ${chestHtml}
      <div class="section-label" style="background:rgba(244,114,182,0.1);color:#f9a8d4;">🏔️ SHOULDERS</div>
      ${shouldersHtml}
      <div class="section-label" style="background:rgba(244,114,182,0.08);color:#fbcfe8;">💥 TRICEPS</div>
      ${tricepsHtml}
    </div>`;

  document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => {
    activeIdx = parseInt(b.dataset.i); render();
  }));
  document.querySelectorAll(".ex-card").forEach(c => c.addEventListener("click", () => {
    const id = c.dataset.id; checkState[id] = !checkState[id]; c.classList.toggle("checked");
  }));
}

render();
if(typeof updateProgress!=="undefined")updateProgress();

const _T={iv:null,st:null,dur:0,el:null,nm:'',
  fmt(s){const n=s<0,a=Math.abs(s),m=Math.floor(a/60),sc=a%60;return(n?'+':'')+(m>0?m+':'+String(sc).padStart(2,'0'):sc+'s');},
  buzz(){try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=i===2?880:660;
      g.gain.setValueAtTime(0.4,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.25);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+0.25);});}catch(e){}},
  stop(){clearInterval(this.iv);this.iv=null;
    if(this.el){this.el.className='rest-pill';this.el.querySelector('span').textContent=this.el.dataset.lbl;this.el=null;}
    const f=document.getElementById('_tf');if(f)f.classList.remove('on');},
  start(el,secs,nm){this.stop();this.dur=secs;this.st=Date.now();this.el=el;this.nm=nm;
    el.className='rest-pill running';
    const f=document.getElementById('_tf');
    if(f){f.querySelector('._tf_lbl').textContent='REST';
      f.querySelector('._tf_ex').textContent=nm;
      f.querySelector('._tf_time').className='tf-time';
      f.querySelector('._tf_prog').className='tf-prog';
      f.querySelector('._tf_prog').style.width='100%';
      f.classList.add('on');}
    this.iv=setInterval(()=>{
      const rem=Math.ceil(this.dur-(Date.now()-this.st)/1000);
      if(el)el.querySelector('span').textContent=this.fmt(rem);
      const ft=document.querySelector('._tf_time'),fp=document.querySelector('._tf_prog'),fl=document.querySelector('._tf_lbl');
      if(ft)ft.textContent=this.fmt(rem);
      if(rem>0){const p=(rem/this.dur)*100;if(fp)fp.style.width=p+'%';
        if(ft)ft.className='tf-time';if(fp)fp.className='tf-prog';if(el)el.className='rest-pill running';}
      else if(rem===0){this.buzz();if(ft)ft.className='tf-time done';if(fp)fp.className='tf-prog done';
        if(fp)fp.style.width='100%';if(fl)fl.textContent='DONE!';if(el)el.className='rest-pill done';}
      else{if(ft){ft.textContent='+'+this.fmt(-rem);ft.className='tf-time over';}
        if(fp)fp.className='tf-prog over';if(fl)fl.textContent='OVERTIME';if(el)el.className='rest-pill over';}
    },1000);},
  toggle(el,secs,nm){this.el===el&&this.iv?this.stop():this.start(el,secs,nm);}};

function _initTF(){if(document.getElementById('_tf'))return;
  const d=document.createElement('div');d.id='_tf';d.className='tf';
  d.innerHTML='<div class="_tf_lbl tf-lbl">REST</div><div class="_tf_time tf-time">0s</div>'+
    '<div class="_tf_ex tf-ex"></div><div class="tf-bar"><div class="_tf_prog tf-prog"></div></div>'+
    '<div class="tf-btns"><button class="tf-btn tf-done" onclick="_T.stop()">✓ Done</button>'+
    '<button class="tf-btn tf-cancel" onclick="_T.stop()">✕ Cancel</button></div>';
  document.body.appendChild(d);}
</script>
