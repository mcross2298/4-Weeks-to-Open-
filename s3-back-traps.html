<script>// ── TIMER ENGINE ──
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 500);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },500);
  }
};

function buildTimerFloat() {
  if (document.getElementById('timerFloat')) return;
  const div = document.createElement('div');
  div.id = 'timerFloat';
  div.className = 'timer-float';
  div.innerHTML = `
    <div id="timerFloatLabel" class="timer-float-label">REST</div>
    <div id="timerFloatTime" class="timer-float-time">0s</div>
    <div id="timerFloatEx" class="timer-float-ex"></div>
    <div class="timer-float-bar"><div id="timerFloatProgress" class="timer-float-progress"></div></div>
    <div class="timer-float-actions">
      <button class="timer-float-btn timer-float-skip" onclick="TMR.stop()">✓ Done</button>
      <button class="timer-float-btn timer-float-reset" onclick="TMR.stop()">✕ Cancel</button>
    </div>`;
  document.body.appendChild(div);
}
buildTimerFloat();

function makeRestTimer(r, n) {
  var s = TMR.parseSeconds(r);
  if (!s) return '<span style="opacity:0.5">' + r + '</span>';
  var nm = (n||'').substring(0,25).replace(/['"/\\]/g,'');
  return '<span class="rest-timer idle" data-rest="' + r + '" ' +
    'onclick="buildTimerFloat();TMR.toggle(this,' + s + ',&quot;' + nm + '&quot;)" ' +
    'title="Tap to start">' +
    '<span class="rest-timer-label">' + r + '</span></span>';
}

let activeIdx = 0;
const checkState = {};
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}


function _restFor(name, tag){
  const compounds=['squat','deadlift','bench','barbell row','pendlay','rdl','romanian',
    'hack squat','leg press','military','overhead press','pull-up','pullup','chin','high pull',
    'hang clean','power clean','trap bar','incline press','decline press','stiff leg'];
  if(tag==='SUPERSET'||tag==='TRI-SET'||tag==='superset'||tag==='triset') return {secs:120,lbl:'120 sec'};
  const n=(name||'').toLowerCase();
  for(const c of compounds){if(n.includes(c))return {secs:105,lbl:'90-120 sec'};}
  return {secs:60,lbl:'60 sec'};
}
function renderEx(ex, idx, isTrap) {
  const id = `${activeIdx}-${isTrap?'t':'b'}-${idx}`;
  const checked = checkState[id] ? "checked" : "";
  const tempoHtml = ex.tempo ? `<span class="ex-tempo">${escapeHtml(ex.tempo)}</span>` : "";
  return `<div class="ex-card ${checked}" data-id="${id}">

      <div style="margin-top:6px;">${makeRestTimer(ex.rest||"60 sec",ex.name)}</div>

}


function _restFor(name, tag){
  const compounds=['squat','deadlift','bench','barbell row','pendlay','rdl','romanian',

  for(const c of compounds){if(n.includes(c))return {secs:105,lbl:'90-120 sec'};}

}

const _T={iv:null,st:null,dur:0,el:null,nm:'',
  fmt(s){const n=s<0,a=Math.abs(s),m=Math.floor(a/60),sc=a%60;return(n?'+':'')+(m>0?m+':'+String(sc).padStart(2,'0'):sc+'s');},
  parse(s){if(!s||s==='—')return 0;s=s.toLowerCase();
    let r=0;const mm=s.match(/(\d+)\s*min/),ss=s.match(/(\d+)\s*sec/);
    if(mm)r+=parseInt(mm[1])*60;if(ss)r+=parseInt(ss[1]);
    if(!r){const p=s.match(/^(\d+)/);if(p)r=parseInt(p[1]);}return r;},
  buzz(){try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=i===2?880:660;
      g.gain.setValueAtTime(0.4,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.25);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+0.25);});}catch(e){}},
  stop(){clearInterval(this.iv);this.iv=null;
    if(this.el){this.el.className='rest-pill';this.el.querySelector('span').textContent=this.el.dataset.lbl;this.el=null;}
    const f=document.getElementById('_tf');if(f)f.classList.remove('on');},
  start(el,secs,nm){this.stop();this.dur=secs;this.st=Date.now();this.el=el;this.nm=nm;
    el.className='rest-pill running';
    const f=document.getElementById('_tf');
    if(f){f.querySelector('._tf_lbl').textContent='REST';
      f.querySelector('._tf_ex').textContent=nm;
      f.querySelector('._tf_time').className='tf-time';
      f.querySelector('._tf_prog').className='tf-prog';
      f.querySelector('._tf_prog').style.width='100%';
      f.classList.add('on');}
    this.iv=setInterval(()=>{
      const rem=Math.ceil(this.dur-(Date.now()-this.st)/1000);
      if(el)el.querySelector('span').textContent=this.fmt(rem);
      const ft=document.querySelector('._tf_time'),fp=document.querySelector('._tf_prog'),fl=document.querySelector('._tf_lbl');
      if(ft)ft.textContent=this.fmt(rem);
      if(rem>0){const p=(rem/this.dur)*100;if(fp)fp.style.width=p+'%';
        if(ft)ft.className='tf-time';if(fp)fp.className='tf-prog';if(el)el.className='rest-pill running';}
      else if(rem===0){this.buzz();if(ft)ft.className='tf-time done';if(fp)fp.className='tf-prog done';
        if(fp)fp.style.width='100%';if(fl)fl.textContent='DONE!';if(el)el.className='rest-pill done';}
      else{if(ft){ft.textContent='+'+this.fmt(-rem);ft.className='tf-time over';}
        if(fp)fp.className='tf-prog over';if(fl)fl.textContent='OVERTIME';if(el)el.className='rest-pill over';}
    },500);},
  toggle(el,secs,nm){this.el===el&&this.iv?this.stop():this.start(el,secs,nm);}};

function _initTF(){if(document.getElementById('_tf'))return;
  const d=document.createElement('div');d.id='_tf';d.className='tf';
  d.innerHTML='<div class="_tf_lbl tf-lbl">REST</div><div class="_tf_time tf-time">0s</div>'+
    '<div class="_tf_ex tf-ex"></div><div class="tf-bar"><div class="_tf_prog tf-prog"></div></div>'+
    '<div class="tf-btns"><button class="tf-btn tf-done" onclick="_T.stop()">✓ Done</button>'+
    '<button class="tf-btn tf-cancel" onclick="_T.stop()">✕ Cancel</button></div>';
  document.body.appendChild(d);}

function _rp(secs,label,name){
  return '<span class="rest-pill" data-lbl="'+label+'" '+
    'onclick="_initTF();_T.toggle(this,'+secs+',\''+name.replace(/'/g,"\'").substring(0,25)+'\')" '+
    'title="Tap to start rest timer">⏱ <span>'+label+'</span></span>';}

</script>

<script>
// ── SESSION PROGRESS BAR ──
function updateProgress() {
  const all = document.querySelectorAll('.ex-card, .ss-ex');
  const done = document.querySelectorAll('.ex-card.checked, .ss-ex.checked');
  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;
  const fill = document.getElementById('progFill');
  if (fill) fill.style.width = pct + '%';
}
// Observe DOM for check changes
const _progObs = new MutationObserver(updateProgress);
document.addEventListener('DOMContentLoaded', function() {
  const app = document.getElementById('app');
  if (app) _progObs.observe(app, {subtree:true, attributes:true, attributeFilter:['class']});
  updateProgress();
});

// ── TIMER PRESETS ──
function addTimerPresets() {
  const tf = document.getElementById('timerFloat');
  if (!tf || tf.querySelector('.timer-presets')) return;
  const presets = document.createElement('div');
  presets.className = 'timer-presets';
  presets.innerHTML = ['45s','60s','90s','2min'].map(function(l) {
    const s = l==='2min'?120:parseInt(l);
    return '<button class="timer-preset" onclick="TMR.setTime && TMR.setTime('+s+',\''+l+'\')" >' + l + '</button>';
  }).join('');
  tf.appendChild(presets);
}
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(addTimerPresets, 500);
});
</script>
<script>
// ── WEIGHT / NOTES PER EXERCISE ──
const NOTES_KEY = 'mc_notes';
function getNotes() { try { return JSON.parse(localStorage.getItem(NOTES_KEY)||'{}'); } catch(e) { return {}; } }
function saveNote(exId, val) {
  const notes = getNotes();
  if (val.trim()) notes[exId] = val.trim();
  else delete notes[exId];
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}
function initNotes() {
  const notes = getNotes();
  document.querySelectorAll('.ex-card[data-id]').forEach(card => {
    const id = card.dataset.id;
    if (!id || card.querySelector('.ex-notes-wrap')) return;
    const existing = notes[id] || '';
    const toggle = document.createElement('div');
    toggle.className = 'ex-notes-toggle';
    toggle.innerHTML = existing ? '✏️ ' + existing.substring(0,20) + (existing.length>20?'…':'') : '✚ Add weight/notes';
    const wrap = document.createElement('div');
    wrap.className = 'ex-notes-wrap' + (existing ? ' open' : '');
    wrap.innerHTML = '<div class="ex-notes-label">Weight / Notes</div><textarea class="ex-notes-input" rows="1" placeholder="e.g. 135 lbs · 3x10 felt easy">' + existing + '</textarea>';
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      wrap.classList.toggle('open');
    });
    const textarea = wrap.querySelector('textarea');
    textarea.addEventListener('input', function() {
      saveNote(id, this.value);
      toggle.innerHTML = this.value.trim() ? '✏️ ' + this.value.trim().substring(0,20) + (this.value.trim().length>20?'…':'') : '✚ Add weight/notes';
    });
    const content = card.querySelector('.ex-content');
    if (content) { content.appendChild(toggle); content.appendChild(wrap); }
  });
}
// Run after every render
const _notesOrig = window._notesInit;
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(initNotes, 300);
});
// Also expose for manual call after tab switches
window.initNotes = initNotes;
</script>

<script>
// ── REPLACE EXERCISE ──
(function() {
  const REPLACE_KEY = 'mc_replacements';
  function applyReplacements() {
    const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';
        if (!card.querySelector('.replaced-badge')) {
          const badge = document.createElement('span');
          badge.className = 'replaced-badge';
          badge.style.cssText = 'font-size:9px;font-weight:900;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:2px 5px;margin-left:6px;letter-spacing:0.06em;vertical-align:middle;';
          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // Long press to replace
  let pressTimer;
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.ex-card, .ex-item, .lift-card');
    if (!card) return;
    pressTimer = setTimeout(function() {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.dataset.orig || nameEl.textContent.trim();
      nameEl.dataset.orig = origName;
      // Navigate to library with exercise pre-selected
      const url = 'exercise-library.html?replace=' + encodeURIComponent(origName);
      if (confirm('Replace "' + origName.substring(0,40) + '"?\nTap OK to open Exercise Library.')) {
        window.location.href = url;
      }
    }, 600);
  }, {passive: true});
  document.addEventListener('touchend', function() { clearTimeout(pressTimer); }, {passive: true});
  document.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, {passive: true});
})();
</script>
