/* ── TIMER ── */

  transition:all 0.15s;position:relative;
}
.rest-timer:active{transform:scale(0.96);}
.rest-timer.idle{background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.2);}
.rest-timer.running{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.35);animation:timerPulse 1s ease-in-out infinite;}
.rest-timer.done{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.35);}
.rest-timer.overtime{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);}

.rest-timer-label{font-size:11px;font-weight:800;letter-spacing:0.04em;}
.rest-timer.idle .rest-timer-label{color:#64748b;}
.rest-timer.running .rest-timer-label{color:#fbbf24;}
.rest-timer.done .rest-timer-label{color:#34d399;}

/* Floating timer display — shows when running */

/* ── WEIGHT NOTES ── */

<body>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
<div id="app"></div>
<script>
// ── TIMER ENGINE (hoisted) ──
const TMR = {
  interval: null,
  startTime: null,
  duration: 0,
  activeEl: null,
  activeName: '',

  parseSeconds(str) {
    if (!str || str === '—') return 0;
    str = str.toLowerCase().trim();
    // e.g. "90 sec", "2 min", "75 sec between & after", "30, 30, 30 sec"
    const minMatch = str.match(/(\d+)\s*min/);
    const secMatch = str.match(/(\d+)\s*sec/);
    let secs = 0;
    if (minMatch) secs += parseInt(minMatch[1]) * 60;
    if (secMatch) secs += parseInt(secMatch[1]);
    if (!secs) {
      // plain number
      const plain = str.match(/^(\d+)/);
      if (plain) secs = parseInt(plain[1]);
    }
    return secs;
  },

  formatTime(secs) {
    const neg = secs < 0;
    const abs = Math.abs(secs);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '+' : '') + (m > 0 ? m + ':' + String(s).padStart(2,'0') : String(s) + 's');
  },

  buzz() {
    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    // Sound — Web Audio API beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6];
      times.forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = i === 2 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    } catch(e) {}
  },

  start(el, durationSecs, exerciseName) {
    this.stop();
    this.duration = durationSecs;
    this.startTime = Date.now();
    this.activeEl = el;
    this.activeName = exerciseName;

    el.className = 'rest-timer running';
    el.querySelector('.rest-timer-label').textContent = this.formatTime(durationSecs);

    const float = document.getElementById('timerFloat');
    const floatTime = document.getElementById('timerFloatTime');
    const floatProgress = document.getElementById('timerFloatProgress');
    const floatEx = document.getElementById('timerFloatEx');
    const floatLabel = document.getElementById('timerFloatLabel');

    float.classList.add('visible');
    floatEx.textContent = exerciseName;
    floatLabel.textContent = 'REST';
    floatTime.className = 'timer-float-time';
    floatProgress.className = 'timer-float-progress';
    floatProgress.style.width = '100%';

    this.interval = setInterval(() => {
      const elapsed = (Date.now() - this.startTime) / 1000;
      const remaining = Math.ceil(this.duration - elapsed);

      // Update card badge
      if (el) {
        el.querySelector('.rest-timer-label').textContent = this.formatTime(remaining);
      }

      // Update float
      floatTime.textContent = this.formatTime(remaining);

      if (remaining > 0) {
        const pct = (remaining / this.duration) * 100;
        floatProgress.style.width = pct + '%';
        floatTime.className = 'timer-float-time';
        floatProgress.className = 'timer-float-progress';
        if (el) el.className = 'rest-timer running';
      } else if (remaining === 0 || remaining === -0) {
        this.buzz();
        floatTime.className = 'timer-float-time done';
        floatProgress.className = 'timer-float-progress done';
        floatProgress.style.width = '100%';
        floatLabel.textContent = 'DONE!';
        if (el) el.className = 'rest-timer done';
      } else {
        // Overtime
        floatTime.textContent = '+' + this.formatTime(-remaining);
        floatTime.className = 'timer-float-time overtime';
        floatProgress.className = 'timer-float-progress overtime';
        floatLabel.textContent = 'OVERTIME';
        if (el) el.className = 'rest-timer overtime';
      }
    }, 500);
  },

  stop() {
    if (this.interval) clearInterval(this.interval);
    this.interval = null;
    if (this.activeEl) {
      const secs = this.parseSeconds(this.activeEl.dataset.rest);
      this.activeEl.querySelector('.rest-timer-label').textContent = this.activeEl.dataset.label;
      this.activeEl.className = 'rest-timer idle';
      this.activeEl = null;
    }
    const float = document.getElementById('timerFloat');
    if (float) float.classList.remove('visible');
  },

  toggle(el, durationSecs, exerciseName) {
    if (this.activeEl === el && this.interval) {
      this.stop();
    } else {
      this.start(el, durationSecs, exerciseName);
    }
  },
  setTime(secs,label){
    if(this.interval){clearInterval(this.interval);this.interval=null;}
    this.duration=secs;this.startTime=Date.now();
    const ft=document.getElementById("timerFloat");
    if(ft){
      const tl=ft.querySelector(".timer-float-label"),tt=ft.querySelector(".timer-float-time"),tp=ft.querySelector(".timer-float-progress");
      if(tl)tl.textContent=label||(secs+"s");
      if(tt){tt.textContent=secs+"s";tt.className="timer-float-time";}
      if(tp){tp.style.width="100%";tp.className="timer-float-progress";}
      ft.classList.add("visible");
    }
    this.activeEl=null;
    this.interval=setInterval(()=>{
      const rem=Math.ceil(this.duration-(Date.now()-this.startTime)/1000);
      const ft2=document.getElementById("timerFloat");if(!ft2)return;
      const tt2=ft2.querySelector(".timer-float-time"),tp2=ft2.querySelector(".timer-float-progress"),tl2=ft2.querySelector(".timer-float-label");
      if(rem>0){if(tt2){tt2.textContent=rem+"s";tt2.className="timer-float-time";}if(tp2){tp2.style.width=Math.round((rem/this.duration)*100)+"%";tp2.className="timer-float-progress";}}
      else if(rem===0){if(tt2){tt2.textContent="DONE!";tt2.className="timer-float-time done";}if(tp2){tp2.style.width="100%";tp2.className="timer-float-progress done";}if(tl2)tl2.textContent="DONE ✓";try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}}
      else{if(tt2){tt2.textContent="+"+Math.abs(rem)+"s";tt2.className="timer-float-time overtime";}if(tp2)tp2.className="timer-float-progress overtime";}
    },500);
  }
};

function buildTimerFloat() {
  if (document.getElementById('timerFloat')) return;
  const div = document.createElement('div');
  div.id = 'timerFloat';
  div.className = 'timer-float';
  div.innerHTML = `

function updateProgress() {

  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;
  const fill = document.getElementById('progFill');
  if (fill) fill.style.width = pct + '%';
}
// Observe DOM for check changes
const _progObs = new MutationObserver(updateProgress);

  const app = document.getElementById('app');
  if (app) _progObs.observe(app, {subtree:true, attributes:true, attributeFilter:['class']});

});

  const tf = document.getElementById('timerFloat');

// ── REPLACE EXERCISE ──
(function() {
  const REPLACE_KEY = 'mc_replacements';
  function applyReplacements() {
    const replacements = JSON.parse(localStorage.getItem(REPLACE_KEY)||'{}');
    if (!Object.keys(replacements).length) return;
    document.querySelectorAll('.ex-card, .ex-item, .lift-card').forEach(card => {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.textContent.trim();
      const replacement = replacements[origName.toLowerCase()];
      if (replacement) {
        nameEl.textContent = replacement;
        nameEl.style.color = '#22d3ee';
        if (!card.querySelector('.replaced-badge')) {
          const badge = document.createElement('span');
          badge.className = 'replaced-badge';
          badge.style.cssText = 'font-size:9px;font-weight:900;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:2px 5px;margin-left:6px;letter-spacing:0.06em;vertical-align:middle;';
          badge.textContent = 'REPLACED';
          nameEl.parentNode.insertBefore(badge, nameEl.nextSibling);
        }
      }
    });
  }
  // Run after render
  if (typeof render === 'function') {
    const origRender = render;
    window.render = function() { origRender.apply(this, arguments); setTimeout(applyReplacements, 100); };
  }
  document.addEventListener('DOMContentLoaded', function() { setTimeout(applyReplacements, 400); });
  // Long press to replace
  let pressTimer;
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.ex-card, .ex-item, .lift-card');
    if (!card) return;
    pressTimer = setTimeout(function() {
      const nameEl = card.querySelector('.ex-name, .lift-name');
      if (!nameEl) return;
      const origName = nameEl.dataset.orig || nameEl.textContent.trim();
      nameEl.dataset.orig = origName;
      // Navigate to library with exercise pre-selected
      const url = 'exercise-library.html?replace=' + encodeURIComponent(origName);
      if (confirm('Replace "' + origName.substring(0,40) + '"?\nTap OK to open Exercise Library.')) {
        window.location.href = url;
      }
    }, 600);
  }, {passive: true});
  document.addEventListener('touchend', function() { clearTimeout(pressTimer); }, {passive: true});
  document.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, {passive: true});
})();
</script>


<script>
/* ── WAVE3-SETLOG MODULE ── */
(function(){
  const STORE_KEY = 'mc_setlog_v1';
  const PAGE_ID   = location.pathname.split('/').pop().replace('.html','');

  function store(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; } }
  function exKey(exId){ return PAGE_ID + '|' + exId; }

  function saveSet(exId, setNum, weight, reps){
    const s = store();
    const k = exKey(exId);
    if(!s[k]) s[k] = [];
    // find today's entry or create
    const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    let session = s[k][0];
    if(!session || session.d !== today){
      session = { d: today, sets: {} };
      s[k].unshift(session);
      s[k] = s[k].slice(0,20);
    }
    session.sets[setNum] = { w: weight, r: reps };
    localStorage.setItem(STORE_KEY, JSON.stringify(s));
  }

  function getLastSession(exId){
    const s = store();
    const history = s[exKey(exId)] || [];
    return history[0] || null;
  }

  function getLastSetData(exId, setNum){
    const session = getLastSession(exId);
    if(!session) return null;
    return session.sets[setNum] || null;
  }

  function renderHistBadge(exId, el){
    const session = getLastSession(exId);
    if(!session || !el) return;
    const sets = Object.values(session.sets);
    if(!sets.length) return;
    const weights = sets.map(s=>s.w).filter(Boolean);
    const maxW = weights.length ? Math.max(...weights.map(w=>parseFloat(w)||0)) : null;
    el.textContent = maxW ? 'Last: ' + maxW + ' lb · ' + session.d : session.d;
  }

  // Parse set count from sets string e.g. "5x5" → 5, "12,10,8,8" → 4, "4x12" → 4
  function parseSetCount(setsStr){
    if(!setsStr) return 3;
    const xMatch = setsStr.match(/^(\d+)\s*[x×]/i);
    if(xMatch) return parseInt(xMatch[1]);
    const commas = setsStr.split(',');
    if(commas.length > 1) return commas.length;
    const numMatch = setsStr.match(/^(\d+)/);
    return numMatch ? Math.min(parseInt(numMatch[1]), 8) : 3;
  }

  // Parse prescribed reps for each set
  function parseReps(setsStr, setIndex){
    if(!setsStr) return '';
    // pyramid: "12,10,8,8"
    const commas = setsStr.split(',');
    if(commas.length > 1) return commas[setIndex] ? commas[setIndex].trim() : commas[commas.length-1].trim();
    // "4x12" or "5x5"
    const xMatch = setsStr.match(/[x×](\d+)/i);
    if(xMatch) return xMatch[1];
    return '';
  }

  function buildSetRows(exId, setsStr, restSecs){
    const count = parseSetCount(setsStr);
    let html = '<div class="setlog-header">' +
      '<div class="setlog-col-label">SET</div>' +
      '<div class="setlog-col-label">WEIGHT</div>' +
      '<div class="setlog-col-label">REPS</div>' +
      '<div class="setlog-col-label"></div>' +
      '</div>';
    for(let i=0;i<count;i++){
      const setNum = i+1;
      const lastData = getLastSetData(exId, setNum);
      const prescribedReps = parseReps(setsStr, i);
      const wPlaceholder = lastData && lastData.w ? lastData.w + ' lb' : 'lb';
      const rPlaceholder = prescribedReps || (lastData && lastData.r ? lastData.r : 'reps');
      html += '<div class="set-row" id="set-row-'+exId+'-'+setNum+'">' +
        '<div class="set-num">'+setNum+'</div>' +
        '<input class="set-input" id="sl-w-'+exId+'-'+setNum+'" ' +
        'type="number" inputmode="decimal" placeholder="'+wPlaceholder+'" ' +
        'onclick="event.stopPropagation()" onfocus="this.select()">' +
        '<input class="set-input" id="sl-r-'+exId+'-'+setNum+'" ' +
        'type="number" inputmode="numeric" placeholder="'+rPlaceholder+'" ' +
        'onclick="event.stopPropagation()" onfocus="this.select()">' +
        '<div class="set-check" id="sl-ck-'+exId+'-'+setNum+'" ' +
        'onclick="event.stopPropagation();window._SL.checkSet(''+exId+'','+setNum+','+restSecs+')" ' +
        'title="Mark set done">☐</div>' +
        '</div>';
    }
    return html;
  }

  function checkSet(exId, setNum, restSecs){
    const wEl = document.getElementById('sl-w-'+exId+'-'+setNum);
    const rEl = document.getElementById('sl-r-'+exId+'-'+setNum);
    const ckEl = document.getElementById('sl-ck-'+exId+'-'+setNum);
    const rowEl = document.getElementById('set-row-'+exId+'-'+setNum);
    if(!ckEl) return;

    const isDone = ckEl.classList.contains('done');
    if(isDone){
      ckEl.classList.remove('done');
      ckEl.textContent = '☐';
      if(rowEl) rowEl.classList.remove('done-row');
      return;
    }

    // Save the log
    const weight = wEl ? wEl.value.trim() : '';
    const reps   = rEl ? rEl.value.trim() : '';
    saveSet(exId, setNum, weight, reps);

    // Mark done
    ckEl.classList.add('done');
    ckEl.textContent = '✓';
    if(rowEl) rowEl.classList.add('done-row');

    // Auto-start rest timer if TMR exists
    if(restSecs > 0 && typeof TMR !== 'undefined'){
      // Find or create a dummy timer element
      let timerEl = document.getElementById('sl-timer-'+exId);
      if(!timerEl){
        timerEl = document.createElement('span');
        timerEl.id = 'sl-timer-'+exId;
        timerEl.className = 'rest-timer idle';
        timerEl.dataset.rest = restSecs+'s';
        timerEl.dataset.label = restSecs+'s';
        timerEl.innerHTML = '<span class="rest-timer-icon">⏱️</span><span class="rest-timer-label">'+restSecs+'s</span>';
        document.body.appendChild(timerEl);
      }
      if(typeof buildTimerFloat === 'function') buildTimerFloat();
      TMR.start(timerEl, restSecs, 'Rest after set '+setNum);
    }

    // Update hist badge
    const histEl = document.getElementById('sl-hist-'+exId);
    renderHistBadge(exId, histEl);
  }

  function initLogger(){
    // Single exercise cards
    document.querySelectorAll('.ex-card[data-id]').forEach(card => {
      if(card.querySelector('.setlog-wrap')) return;
      const exId   = card.dataset.id;
      const nameEl = card.querySelector('.ex-name');
      const setsEl = card.querySelector('.ex-sets');
      const setsStr = setsEl ? setsEl.textContent.trim() : '3x10';
      // Get rest from existing timer or default
      let restSecs = 60;
      const timerEl = card.querySelector('.rest-timer');
      if(timerEl && timerEl.dataset.rest){
        restSecs = TMR ? TMR.parseSeconds(timerEl.dataset.rest) : 60;
      }

      const content = card.querySelector('.ex-content');
      if(!content) return;

      // Remove old freeform notes
      const oldToggle = content.querySelector('.ex-notes-toggle');
      const oldWrap   = content.querySelector('.ex-notes-wrap');
      if(oldToggle) oldToggle.remove();
      if(oldWrap)   oldWrap.remove();
      // Remove old simple log row from Wave 3 pilot
      const oldLog = content.querySelector('.log-row');
      if(oldLog) oldLog.remove();

      // Build toggle button
      const histId = 'sl-hist-'+exId;
      const toggleDiv = document.createElement('div');
      toggleDiv.className = 'setlog-toggle';
      toggleDiv.id = 'sl-tgl-'+exId;
      toggleDiv.innerHTML = '▾ <span class="sl-chevron">LOG SETS</span>' +
        '<span class="setlog-hist" id="'+histId+'"></span>';
      toggleDiv.addEventListener('click', function(e){
        e.stopPropagation();
        const wrap = document.getElementById('sl-wrap-'+exId);
        if(!wrap) return;
        const isOpen = wrap.classList.toggle('open');
        toggleDiv.querySelector('.sl-chevron').textContent = isOpen ? '▴ HIDE' : '▾ LOG SETS';
      });

      // Build set rows container
      const wrapDiv = document.createElement('div');
      wrapDiv.className = 'setlog-wrap';
      wrapDiv.id = 'sl-wrap-'+exId;
      wrapDiv.innerHTML = buildSetRows(exId, setsStr, restSecs);

      content.appendChild(toggleDiv);
      content.appendChild(wrapDiv);
      renderHistBadge(exId, document.getElementById(histId));
    });

    // Superset rows
    document.querySelectorAll('.ss-ex[data-id]').forEach(row => {
      if(row.querySelector('.setlog-wrap')) return;
      const exId   = row.dataset.id;
      const setsEl = row.querySelector('.ex-sets');
      const setsStr = setsEl ? setsEl.textContent.trim() : '4x12';
      const content = row.querySelector('.ss-content');
      if(!content) return;

      // Remove old notes
      const oldToggle = content.querySelector('.ex-notes-toggle');
      const oldWrap   = content.querySelector('.ex-notes-wrap');
      if(oldToggle) oldToggle.remove();
      if(oldWrap)   oldWrap.remove();
      const oldLog = content.querySelector('.log-row');
      if(oldLog) oldLog.remove();

      const histId = 'sl-hist-'+exId;
      const toggleDiv = document.createElement('div');
      toggleDiv.className = 'setlog-toggle';
      toggleDiv.id = 'sl-tgl-'+exId;
      toggleDiv.innerHTML = '▾ <span class="sl-chevron">LOG SETS</span>' +
        '<span class="setlog-hist" id="'+histId+'"></span>';
      toggleDiv.addEventListener('click', function(e){
        e.stopPropagation();
        const wrap = document.getElementById('sl-wrap-'+exId);
        if(!wrap) return;
        const isOpen = wrap.classList.toggle('open');
        toggleDiv.querySelector('.sl-chevron').textContent = isOpen ? '▴ HIDE' : '▾ LOG SETS';
      });

      const wrapDiv = document.createElement('div');
      wrapDiv.className = 'setlog-wrap';
      wrapDiv.id = 'sl-wrap-'+exId;
      wrapDiv.innerHTML = buildSetRows(exId, setsStr, 90);

      content.appendChild(toggleDiv);
      content.appendChild(wrapDiv);
      renderHistBadge(exId, document.getElementById(histId));
    });
  }

  // Expose
  window._SL = { checkSet, initLogger };

  // Hook into render() for JS-rendered pages
  if(typeof render === 'function'){
    const _orig = render;
    window.render = function(){
      _orig.apply(this, arguments);
      setTimeout(initLogger, 200);
    };
  }

  // DOMContentLoaded for static pages
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(initLogger, 300); });
  } else {
    setTimeout(initLogger, 300);
  }
})();
</script>

</body>
</html>
